<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="automatic">
<meta name="apple-mobile-web-app-title" content="Presupuesto">
<link rel="apple-touch-icon" href="icon.png">
<title>Presupuesto Tracker</title>
<style>
:root{
  --bg:#f2f2f7;--bg2:#fff;--bg3:#f9f9f9;--bg4:#e5e5ea;--bg5:#f2f2f7;
  --text1:#1c1c1e;--text2:#8e8e93;--text3:#c7c7cc;
  --border:#e5e5ea;--border2:#f2f2f7;--modal-bg:#f2f2f7;
  --green:#34c759;--green-bg:#d1fae5;--green-text:#065f46;
  --red:#ff3b30;--orange:#ff9500;--blue:#007aff;--blue-bg:#f0f6ff;
  --purple-bg:#ede9fe;--purple-text:#5b21b6;
  --yellow-bg:#fff3cd;--yellow-text:#856404;
  --pink-bg:#fce7f3;--pink-text:#9d174d;--pink-border:#f9a8d4;
  --tue-bg:#f9f9f9;--inc-bg:#f0fdf4;--inc-border:#bbf7d0;
  --memo-bg:#fdf2f8;--memo-border:#f9a8d4;
  --shadow:0 1px 3px rgba(0,0,0,.06);--shadow2:0 1px 2px rgba(0,0,0,.05);
  --renta-bg:#fff7ed;--renta-border:#fed7aa;--renta-text:#c2410c;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;--bg5:#1c1c1e;
    --text1:#fff;--text2:#8e8e93;--text3:#48484a;
    --border:#38383a;--border2:#2c2c2e;--modal-bg:#1c1c1e;
    --green:#30d158;--green-bg:#0a2e1a;--green-text:#30d158;
    --red:#ff453a;--orange:#ff9f0a;--blue:#0a84ff;--blue-bg:#001a3d;
    --purple-bg:#1e1040;--purple-text:#bf83ff;
    --yellow-bg:#2e2000;--yellow-text:#ffd60a;
    --pink-bg:#2e0a1a;--pink-text:#ff6b9d;--pink-border:#7a2040;
    --tue-bg:#2c2c2e;--inc-bg:#0a2e1a;--inc-border:#0a5c2a;
    --memo-bg:#2e0a1a;--memo-border:#7a2040;
    --shadow:0 1px 3px rgba(0,0,0,.4);--shadow2:0 1px 2px rgba(0,0,0,.3);
    --renta-bg:#1a0e00;--renta-border:#7c3406;--renta-text:#fb923c;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text1)}
.wrap{padding:.75rem .3rem 5rem;max-width:100%;margin:0 auto;width:100%}
.inner{padding:0 .8rem}
.top-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.month-nav{display:flex;align-items:center;justify-content:space-between}
.nav-btn{background:none;border:0.5px solid var(--border);border-radius:10px;padding:6px 16px;cursor:pointer;font-size:15px;color:var(--text1);min-height:38px;font-family:inherit}
.nav-btn:active{background:var(--bg4)}
.month-title{font-size:17px;font-weight:600;color:var(--text1)}
.view-toggle{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:var(--bg4);border-radius:10px;padding:2px}
.vbtn{background:none;border:none;border-radius:8px;padding:7px 2px;cursor:pointer;font-size:10px;color:var(--text2);text-align:center;min-height:32px;font-family:inherit;font-weight:500}
.view-toggle{display:flex;flex-direction:column;gap:3px;background:var(--bg4);border-radius:12px;padding:3px}
.view-row{display:grid;gap:3px}
.view-row-1{grid-template-columns:repeat(3,1fr)}
.view-row-2{grid-template-columns:repeat(2,1fr);max-width:280px;margin:0 auto}
/* Summary toggle */
.sum-toggle{display:flex;gap:4px;margin-bottom:8px}
.sum-tog-btn{flex:1;padding:6px;border:0.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:11px;color:var(--text2);font-family:inherit;font-weight:500}
.sum-tog-btn.active{background:var(--bg2);color:var(--text1);font-weight:700;border-color:var(--blue)}
/* Charts */
.charts-view{display:flex;flex-direction:column;gap:10px}
.chart-seg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:var(--bg4);border-radius:10px;padding:2px;margin-bottom:2px}
.chart-seg-btn{padding:7px 4px;border:none;border-radius:8px;background:none;cursor:pointer;font-size:10px;color:var(--text2);font-family:inherit;font-weight:500;text-align:center}
.chart-seg-btn.active{background:var(--bg2);color:var(--text1);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.chart-card{background:var(--bg2);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:700;color:var(--text1);margin-bottom:14px}
.pie-wrap{position:relative;width:180px;height:180px;margin:0 auto 16px}
.pie-canvas{width:180px;height:180px}
.pie-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.pie-center-val{font-size:16px;font-weight:700;color:var(--text1)}
.pie-center-lbl{font-size:10px;color:var(--text2)}
.cat-legend{display:flex;flex-direction:column;gap:6px}
.cat-leg-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:10px;cursor:pointer}
.cat-leg-row:active{opacity:.7}
.cat-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.cat-name{flex:1;font-size:13px;color:var(--text1);font-weight:500}
.cat-amt{font-size:13px;font-weight:700;color:var(--text1)}
.cat-pct{font-size:10px;color:var(--text2);min-width:32px;text-align:right}
.bar-wrap{display:flex;flex-direction:column;gap:8px}
.bar-select{width:100%;font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit;margin-bottom:10px}
.bar-select:focus{border-color:var(--blue);outline:none}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-size:11px;color:var(--text2);width:36px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:20px;background:var(--bg4);border-radius:5px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:5px;background:var(--blue);transition:width .4s}
.bar-val{font-size:11px;color:var(--text1);font-weight:600;min-width:54px;text-align:right;flex-shrink:0}
/* Vertical bars */
.vbar-wrap{display:flex;align-items:flex-end;justify-content:space-around;gap:8px;height:200px;padding:0 8px}
.vbar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;height:100%}
.vbar-val{font-size:9px;color:var(--text1);font-weight:600;text-align:center;flex-shrink:0}
.vbar-track{width:60%;max-width:28px;flex:1;display:flex;align-items:flex-end;background:var(--bg4);border-radius:6px 6px 0 0;overflow:hidden;position:relative}
.vbar-fill{width:100%;position:absolute;bottom:0;left:0;border-radius:6px 6px 0 0;background:var(--blue);transition:height .4s}
.vbar-lbl{font-size:9px;color:var(--text2);text-align:center;flex-shrink:0}
/* Cat edit modal */
.cat-edit-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:160;align-items:flex-end;justify-content:center}
.cat-edit-bg.open{display:flex}
.cat-edit-box{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.cat-edit-inner{padding:0 1rem 1.5rem}
.cat-bill-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.cat-bill-item:last-child{border-bottom:none}
.cat-bill-chk{width:18px;height:18px;cursor:pointer;accent-color:var(--blue);flex-shrink:0}
.vbtn.active{background:var(--bg2);color:var(--text1);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.vbtn:active{opacity:.7}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1rem}
.stat{background:var(--bg2);border-radius:12px;padding:10px 11px;box-shadow:var(--shadow)}
.stat-label{font-size:9px;color:var(--text2);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.stat-value{font-size:15px;font-weight:600;color:var(--text1)}
.stat-value.ok{color:var(--green)}.stat-value.bad{color:var(--red)}.stat-value.warn{color:var(--orange)}.stat-value.info{color:var(--blue)}
.legend{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)}
.leg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;width:calc(100vw - 24px);max-width:calc(100vw - 24px);margin-left:calc(-50vw + 50% + 12px);margin-right:calc(-50vw + 50% + 12px)}
.cal-hdr{font-size:11px;font-weight:600;color:var(--text2);text-align:center;padding:5px 0;text-transform:uppercase}
.cal-day{min-height:66px;border:0.5px solid var(--border);border-radius:8px;padding:4px;cursor:pointer;background:var(--bg2)}
.cal-day:active{opacity:.7}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day.today{border-color:var(--blue);background:var(--blue-bg)}
.cal-day.today .day-num{color:var(--blue);font-weight:700}
.cal-day.tuesday{background:var(--tue-bg)}
.cal-day.cur-week{border:1.5px solid var(--orange)}
.cal-day.cur-week.today{border:1.5px solid var(--blue);background:var(--blue-bg)}
.cal-day.cur-week.tuesday{border:1.5px solid var(--orange);background:var(--tue-bg)}
.day-num{font-size:12px;color:var(--text2);margin-bottom:2px;line-height:1;font-weight:500}
.income-bar{font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px;background:var(--blue-bg);color:var(--blue);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bill-dot{font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.4}
.bill-dot.unpaid{background:var(--yellow-bg);color:var(--yellow-text)}
.bill-dot.paid{background:var(--green-bg);color:var(--green-text);text-decoration:line-through;opacity:.7}
.bill-dot.quarterly{background:var(--purple-bg);color:var(--purple-text)}
.bill-dot.weekly{background:var(--green-bg);color:var(--green-text)}
.bill-dot.personal{background:var(--blue-bg);color:var(--blue)}
.bill-dot.memo{background:var(--pink-bg);color:var(--pink-text);font-style:italic}
.more{font-size:8px;color:var(--text2);margin-top:1px}
.extra-dots{display:flex;flex-wrap:wrap;gap:1px;margin-top:2px;padding:1px 0}
.sum-detail-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:120;align-items:flex-end;justify-content:center}
.sum-detail-bg.open{display:flex}
.sum-detail-box{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);width:100%;max-width:430px;max-height:75vh;overflow-y:auto}
.sum-detail-inner{padding:1rem}
.sum-detail-title{font-size:16px;font-weight:700;color:var(--text1);margin-bottom:12px}
.sum-detail-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.sum-detail-row:last-child{border-bottom:none}
.sum-detail-name{color:var(--text1);flex:1}
.sum-detail-sub{font-size:10px;color:var(--text2);margin-top:1px}
.sum-detail-amt{font-weight:700;font-size:14px}
.sum-detail-total{display:flex;justify-content:space-between;padding:10px 0 0;margin-top:6px;border-top:1.5px solid var(--border);font-weight:700;font-size:15px}
.sum-close-btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--bg4);color:var(--text1);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px}

/* METAS */
.meta-card{background:var(--bg2);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.meta-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.meta-card-title{font-size:15px;font-weight:700;color:var(--text1)}
.meta-card-desc{font-size:11px;color:var(--text2);margin-top:2px}
.meta-card-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0 2px;font-family:inherit;flex-shrink:0}
.meta-progress-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.meta-aportado{font-size:22px;font-weight:700;color:var(--text1)}
.meta-objetivo{font-size:12px;color:var(--text2)}
.meta-pbw{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:10px}
.meta-pbf{height:100%;border-radius:3px;background:var(--blue);transition:width .4s}
.meta-pbf.done{background:var(--green)}
.meta-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.meta-stat{background:var(--bg3);border-radius:10px;padding:8px;text-align:center}
.meta-stat-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.meta-stat-val{font-size:13px;font-weight:700;color:var(--text1)}
.meta-aporte-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:0.5px solid var(--border2);font-size:12px}
.meta-aporte-row:last-child{border-bottom:none}
.meta-add-form{display:flex;gap:6px;margin-top:10px}
.meta-add-form input{flex:1;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit}
.meta-add-form input:focus{border-color:var(--blue);outline:none}
.meta-add-btn{background:var(--blue);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.meta-add-btn:active{opacity:.8}
.meta-empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
/* Meta edit modal */
.meta-modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:160;align-items:flex-end;justify-content:center}
.meta-modal-bg.open{display:flex}
.meta-modal-box{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.meta-modal-inner{padding:0 1rem 1.5rem}

/* DELETE OPTIONS */
.del-opts-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:150;align-items:flex-end;justify-content:center}
.del-opts-bg.open{display:flex}
.del-opts-box{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:1rem 1rem calc(1rem + env(safe-area-inset-bottom));width:100%;max-width:430px}
.del-opts-title{font-size:13px;font-weight:600;color:var(--text2);text-align:center;margin-bottom:12px}
.del-opt-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit;margin-bottom:8px;text-align:center}
.del-opt-month{background:var(--yellow-bg);color:var(--yellow-text)}
.del-opt-perm{background:#fef2f2;color:var(--red)}
.del-opt-cancel{background:var(--bg4);color:var(--text2)}
.cancelled-section{margin-top:12px;background:var(--bg2);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.cancelled-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;background:var(--bg5)}
.cancelled-head:active{opacity:.7}
.cancelled-title{font-size:13px;font-weight:600;color:var(--text2)}
.cancelled-body{display:none;padding:0 14px 10px}
.cancelled-body.open{display:block}
.cancelled-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.cancelled-row:last-child{border-bottom:none}
.cancelled-name{color:var(--text2);flex:1;text-decoration:line-through}
.cancelled-restore{background:var(--green-bg);border:none;border-radius:8px;padding:5px 10px;font-size:11px;color:var(--green-text);font-weight:600;cursor:pointer;font-family:inherit}
.cancelled-restore:active{opacity:.7}

/* ADD BILL */
.fab{position:fixed;bottom:calc(1.5rem + env(safe-area-inset-bottom));right:1rem;width:52px;height:52px;border-radius:26px;background:var(--blue);border:none;cursor:pointer;font-size:26px;color:#fff;box-shadow:0 4px 16px rgba(0,122,255,.4);display:flex;align-items:center;justify-content:center;z-index:90;font-family:inherit}
.fab-settings{position:fixed;bottom:calc(1.5rem + env(safe-area-inset-bottom));left:1rem;width:52px;height:52px;border-radius:26px;background:var(--bg4);border:none;cursor:pointer;font-size:24px;color:var(--text1);box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:90;font-family:inherit}
.fab:active{opacity:.8;transform:scale(.95)}
.add-modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:110;align-items:flex-end;justify-content:center}
.add-modal-bg.open{display:flex}
.add-modal{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);width:100%;max-width:430px;max-height:92vh;overflow-y:auto}
.add-modal-inner{padding:0 1rem 1.5rem}
.add-field{margin-bottom:14px}
.add-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.add-input{width:100%;font-size:15px;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg3);color:var(--text1);font-family:inherit}
.add-input:focus{border-color:var(--blue);outline:none;background:var(--bg2)}
.add-seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.add-seg-btn{padding:10px 4px;border:1.5px solid var(--border);border-radius:10px;background:none;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit;font-weight:500;text-align:center}
.add-seg-btn.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);font-weight:700}
.add-seg-btn:active{opacity:.7}
.add-months-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.add-month-btn{padding:8px 4px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:11px;color:var(--text2);font-family:inherit;font-weight:500;text-align:center}
.add-month-btn.sel{border-color:var(--purple-text);background:var(--purple-bg);color:var(--purple-text);font-weight:700}
.add-save-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:16px;cursor:pointer;font-weight:700;font-family:inherit;margin-top:8px}
.add-save-btn:active{opacity:.8}
.add-cancel-btn{width:100%;padding:12px;border:none;border-radius:12px;background:var(--bg4);color:var(--text1);font-size:14px;cursor:pointer;font-weight:600;font-family:inherit;margin-top:6px}
.custom-bill-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;background:var(--blue-bg);border:0.5px solid var(--blue);margin-bottom:3px}
.custom-bill-del{background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;padding:0 2px;font-family:inherit}

/* NOTIFICATION BANNER */
.notif-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding-top:env(safe-area-inset-top)}
.notif-bg.open{display:flex}
.notif-box{background:var(--bg2);border-radius:0 0 20px 20px;width:100%;max-width:430px;padding:16px 18px 20px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.notif-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.notif-title{font-size:14px;font-weight:700;color:var(--orange)}
.notif-date{font-size:11px;color:var(--text2)}
.notif-close{background:var(--bg4);border:none;border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text1);font-family:inherit;font-weight:600}
.notif-close:active{opacity:.7}
.notif-bill{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.notif-bill:last-child{border-bottom:none}
.notif-bill-name{color:var(--text1);font-weight:500}
.notif-bill-amt{color:var(--orange);font-weight:700}
.notif-empty{font-size:13px;color:var(--text2);padding:4px 0}

.list-view{display:flex;flex-direction:column;gap:2px}
.sec-title{font-size:10px;font-weight:600;color:var(--text2);padding:8px 4px 4px;text-transform:uppercase;letter-spacing:.5px}
.list-item{display:grid;grid-template-columns:26px 1fr auto auto;align-items:center;gap:6px;padding:10px 12px;border-radius:12px;background:var(--bg2);box-shadow:var(--shadow2)}
.list-item.inc-row{background:var(--inc-bg);box-shadow:none;border:0.5px solid var(--inc-border)}
.list-item.memo-row{background:var(--memo-bg);box-shadow:none;border:0.5px solid var(--memo-border)}
.li-day{font-size:11px;font-weight:600;color:var(--text2);text-align:center}
.li-name{font-size:13px;color:var(--text1);font-weight:500}
.li-name.done{text-decoration:line-through;opacity:.4}
.li-sub{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap;align-items:center}
.badge{font-size:9px;border-radius:4px;padding:1px 5px;font-weight:500}
.pay-badge{font-size:9px;border-radius:4px;padding:1px 6px;font-weight:600;background:var(--bg4);color:var(--text2)}
.li-amt{font-size:12px;font-weight:600;color:var(--text1);text-align:right;white-space:nowrap}
.li-amt.inc{color:var(--green)}.li-amt.memo{color:var(--pink-text);font-style:italic}
.li-chk{width:20px;height:20px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.li-chk.memo-chk{accent-color:var(--pink-text)}
.wtbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.wtbl th{font-size:10px;font-weight:600;color:var(--text2);text-align:left;padding:8px 10px;background:var(--bg5);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.3px}
.wtbl th:not(:first-child){text-align:right}
.wtbl td{padding:10px;border-bottom:0.5px solid var(--border2);color:var(--text1);font-weight:500}
.wtbl td:not(:first-child){text-align:right}
.wtbl tr:last-child td{border-bottom:none;font-weight:700}
.wtbl .pos{color:var(--green)}.wtbl .neg{color:var(--red)}.wtbl .neu{color:var(--orange)}
.tbl-wrap{border-radius:14px;overflow:hidden;background:var(--bg2);box-shadow:var(--shadow);margin-bottom:1rem}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.modal-inner{padding:0 1rem 1.5rem}
.modal-handle{width:36px;height:5px;background:var(--bg4);border-radius:3px;margin:12px auto 16px}
.modal-title{font-size:17px;font-weight:700;color:var(--text1);margin-bottom:1rem}
.msec{font-size:11px;font-weight:600;color:var(--text2);padding:8px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.mbill{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border-radius:12px;margin-bottom:2px}
.mbill.memo-bill{background:var(--memo-bg);border:0.5px solid var(--pink-border)}
.mchk{width:20px;height:20px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.mchk.memo{accent-color:var(--pink-text)}
.mbill-info{flex:1;min-width:0}
.mname{font-size:14px;color:var(--text1);font-weight:500}
.mname.done{text-decoration:line-through;opacity:.4}
.mpay{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500}
.mright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mamt{font-size:14px;font-weight:600;color:var(--text1);min-width:56px;text-align:right}
.mamt.memo{color:var(--pink-text);font-style:italic}
.amt-inp{width:80px;font-size:14px;padding:6px 8px;border:1.5px solid var(--blue);border-radius:8px;background:var(--bg2);color:var(--text1);font-family:inherit}
.edit-btn{background:var(--bg5);border:none;border-radius:8px;font-size:11px;padding:5px 10px;cursor:pointer;color:var(--blue);font-weight:600;font-family:inherit}
.inc-section{background:var(--bg2);border-radius:12px;padding:2px 0;margin-bottom:4px}
.inc-add{display:flex;gap:6px;align-items:center;padding:10px 14px;flex-wrap:wrap}
.inc-add input{flex:1;min-width:80px;font-size:14px;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit}
.inc-add input:focus{border-color:var(--blue);outline:none;background:var(--bg2)}
.inc-add button{padding:9px 14px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:13px;cursor:pointer;font-weight:600;font-family:inherit;white-space:nowrap}
.inc-entry{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:0.5px solid var(--border2);font-size:14px}
.inc-entry.chq{background:var(--inc-bg)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:0 4px;min-width:30px;font-family:inherit}
.del-btn:active{color:var(--red)}
.close-btn{width:calc(100% - 2rem);margin:0 1rem;padding:14px;border:none;border-radius:12px;background:var(--bg4);color:var(--text1);font-size:15px;cursor:pointer;font-weight:600;font-family:inherit}
.close-btn:active{opacity:.7}
/* CHEQUES */
.pagos-view{display:flex;flex-direction:column;gap:8px}
.pag-title{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:4px}
.sc{border-radius:14px;background:var(--bg2);overflow:hidden;box-shadow:var(--shadow)}
.sc.paying{box-shadow:0 0 0 2px var(--green)}
.sc.prev-month{opacity:.75}
.sch{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;gap:8px;flex-wrap:wrap}
.sch:active{opacity:.7}
.paying .sch{background:var(--inc-bg)}
.sc-left{display:flex;flex-direction:column;gap:4px}
.sc-label{font-size:13px;font-weight:600;color:var(--text1)}
.paying .sc-label{color:var(--green)}
.sc-tags{display:flex;gap:4px}
.sc-tag{font-size:10px;border-radius:5px;padding:2px 7px;font-weight:600}
.sc-tag.paying{background:var(--green-bg);color:var(--green-text)}
.sc-tag.prev{background:var(--bg4);color:var(--text2)}
.sc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.sc-prog{font-size:11px;color:var(--text2);font-weight:500}
.sc-badge{font-size:11px;border-radius:6px;padding:3px 9px;font-weight:600}
.sc-badge.ok{background:var(--green-bg);color:var(--green-text)}
.sc-badge.par{background:var(--yellow-bg);color:var(--yellow-text)}
.sc-badge.emp{background:var(--bg4);color:var(--text2)}
.sb{padding:0 14px 14px;display:none}
.sb.open{display:block}
.pr{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.pr:last-of-type{border-bottom:none}
.pr-f{color:var(--text2);min-width:105px;font-size:11px;font-weight:500}
.pr-n{flex:1;color:var(--text1);font-weight:500}
.pr-a{font-weight:700;color:var(--green);min-width:60px;text-align:right}
.pr-d{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0 4px;min-width:28px;font-family:inherit}
.pr-d:active{color:var(--red)}
.paf{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border2);align-items:center}
.paf input{font-size:12px;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit}
.paf input:focus{border-color:var(--blue);outline:none;background:var(--bg2)}
.paf select{font-size:12px;padding:8px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);cursor:pointer;font-family:inherit}
.paf button{padding:8px 12px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit;white-space:nowrap}
.str{display:flex;justify-content:space-between;padding:10px 0 4px;font-size:13px;font-weight:600}
.pbw{height:6px;background:var(--bg4);border-radius:3px;margin:4px 0 10px;overflow:hidden}
.pbf{height:100%;border-radius:3px;background:var(--green)}
.pbf.orange{background:var(--orange)}
.pbf.over{background:var(--red)}
.ctag{font-size:9px;background:var(--green-bg);color:var(--green-text);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600}
.cal-tag{font-size:9px;background:var(--blue-bg);color:var(--blue);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600}
/* MI RENTA */
.renta-view{display:flex;flex-direction:column;gap:10px}
.renta-hero{background:var(--bg2);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
.renta-hero-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.renta-meta-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.renta-meta-left{}
.renta-meta-amt{font-size:32px;font-weight:700;color:var(--text1)}
.renta-meta-sub{font-size:12px;color:var(--text2);margin-top:2px}
.renta-meta-right{text-align:right}
.renta-meta-goal{font-size:13px;font-weight:600;color:var(--text2)}
.renta-meta-pct{font-size:22px;font-weight:700}
.pbw2{height:8px;background:var(--bg4);border-radius:4px;margin:0 0 10px;overflow:hidden}
.pbf2{height:100%;border-radius:4px;background:var(--orange);transition:width .3s}
.pbf2.ok{background:var(--green)}
.pbf2.over{background:var(--red)}
.renta-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.renta-stat{background:var(--bg5);border-radius:10px;padding:8px 10px;text-align:center}
.renta-stat-label{font-size:9px;color:var(--text2);font-weight:500;text-transform:uppercase;margin-bottom:4px}
.renta-stat-val{font-size:14px;font-weight:700;color:var(--text1)}
.renta-stat-val.ok{color:var(--green)}
.renta-stat-val.warn{color:var(--orange)}
.renta-stat-val.bad{color:var(--red)}
.renta-semanas{background:var(--bg2);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.renta-sem-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--bg5)}
.renta-sem-title{font-size:13px;font-weight:700;color:var(--text1)}
.renta-sem-sub{font-size:11px;color:var(--text2)}
.renta-sem-row{padding:12px 14px;border-top:0.5px solid var(--border2)}
.renta-sem-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.renta-sem-dates{font-size:12px;font-weight:600;color:var(--text1)}
.renta-sem-disp{font-size:11px;color:var(--text2)}
.renta-sem-pbw{height:4px;background:var(--bg4);border-radius:2px;margin-bottom:8px;overflow:hidden}
.renta-sem-pbf{height:100%;border-radius:2px;background:var(--green)}
.renta-sem-pbf.low{background:var(--orange)}
.renta-sem-pbf.none{background:var(--red)}
.renta-aporte-row{display:flex;align-items:center;gap:8px}
.renta-aporte-lbl{font-size:11px;color:var(--text2);flex:1}
.renta-aporte-val{font-size:13px;font-weight:700;color:var(--text1)}
.renta-aporte-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0 2px;font-family:inherit}
.renta-aporte-del:active{color:var(--red)}
.renta-add-form{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap}
.renta-add-form input{flex:1;min-width:80px;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit}
.renta-add-form input:focus{border-color:var(--orange);outline:none;background:var(--bg2)}
.renta-add-form button{padding:8px 14px;border:none;border-radius:10px;background:var(--orange);color:#fff;font-size:12px;cursor:pointer;font-weight:700;font-family:inherit;white-space:nowrap}
.renta-disp-card{background:var(--bg2);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
.renta-disp-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.renta-disp-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:0.5px solid var(--border2)}
.renta-disp-row:last-child{border-bottom:none;font-weight:700;font-size:14px;padding-top:8px;margin-top:4px}
.renta-disp-row.neg{color:var(--red)}
.renta-disp-row.pos{color:var(--green)}
.renta-tag-cur{font-size:10px;background:var(--orange);color:#fff;border-radius:4px;padding:1px 6px;font-weight:700;margin-left:6px}
</style>
</head>
<body>

<div class="wrap">
<div class="inner">
<div class="top-bar">
  <div class="month-nav">
    <button class="nav-btn" id="prevM">&#8592;</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="nav-btn" id="nextM">&#8594;</button>
  </div>
  <div class="view-toggle">
    <div class="view-row" style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px">
      <button class="vbtn active" id="btnCal">Calendario</button>
      <button class="vbtn" id="btnPagos">Ingresos</button>
      <button class="vbtn" id="btnRenta">Mi Renta</button>
      <button class="vbtn" id="btnMetas">Metas</button>
    </div>
    <div class="view-row" style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px">
      <button class="vbtn" id="btnGraficas">Gráficas</button>
      <button class="vbtn" id="btnList">Lista</button>
      <button class="vbtn" id="btnDebts">Debts</button>
      <button class="vbtn" id="btnSubs">Subs</button>
    </div>
  </div>
</div>
<div class="sum-toggle" id="sumToggle">
  <button class="sum-tog-btn active" id="btnSumSem">Esta semana</button>
  <button class="sum-tog-btn" id="btnSumMes">Este mes</button>
</div>
<div class="summary-grid" id="sg"></div>
<div class="legend" id="leg">
  <div class="leg-item"><div class="leg-dot" style="background:var(--green-bg)"></div>Ingreso</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--yellow-bg)"></div>Pendiente</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--green-bg);opacity:.6"></div>Pagado</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--purple-bg)"></div>Trimestral</div>
  <div class="leg-item"><div class="leg-dot" style="border:1.5px solid var(--orange);background:transparent"></div>Sem. actual</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--pink-bg)"></div>Recordatorio</div>
</div>
</div>
<div id="calView"></div>
<div class="inner" id="grafView" style="display:none"></div>
<div class="inner" id="metasView" style="display:none"></div>
<div class="inner" id="debtsView" style="display:none"></div>
<div class="inner" id="subsView" style="display:none"></div>
<div class="inner" id="listView" style="display:none"></div>
<div class="inner" id="pagView" style="display:none"></div>
<div class="inner" id="rentaView" style="display:none"></div>
</div>

<div class="sum-detail-bg" id="sumDetailBg">
  <div class="sum-detail-box">
    <div class="sum-detail-inner">
      <div class="modal-handle"></div>
      <div class="sum-detail-title" id="sumDetailTitle"></div>
      <div id="sumDetailBody"></div>
      <button class="sum-close-btn" id="sumDetailClose">Cerrar</button>
    </div>
  </div>
</div>

<div class="notif-bg" id="notifBg">
  <div class="notif-box">
    <div class="notif-header">
      <div class="notif-title">📋 A Pagar</div>
      <div class="notif-date" id="notifDate"></div>
    </div>
    <div id="notifBody"></div>
    <button class="notif-close" id="notifClose">Entendido</button>
  </div>
</div>

<button class="fab" id="fabAdd" style="display:none">+</button>
<button class="fab-settings" id="fabSettings" style="display:none">⚙️</button>

<!-- Settings mini modal -->
<div id="settingsBg" style="display:none;position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:16px;background:var(--bg2);border-radius:16px;padding:12px;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:150;min-width:160px">
  <button onclick="exportData()" style="display:block;width:100%;background:none;border:none;text-align:left;padding:10px 8px;font-size:14px;color:var(--text1);cursor:pointer;font-family:inherit;border-bottom:0.5px solid var(--border)">⬇️ Exportar datos</button>
  <button onclick="importData()" style="display:block;width:100%;background:none;border:none;text-align:left;padding:10px 8px;font-size:14px;color:var(--text1);cursor:pointer;font-family:inherit">⬆️ Importar datos</button>
</div>

<div class="meta-modal-bg" id="metaModalBg">
  <div class="meta-modal-box">
    <div class="meta-modal-inner">
      <div class="modal-handle"></div>
      <div class="modal-title" id="metaModalTitle">Nueva meta</div>
      <div class="add-field">
        <label class="add-label">Nombre</label>
        <input class="add-input" id="meta-name" placeholder="Ej: Vacaciones, Carro, Proyecto Q..." maxlength="30">
      </div>
      <div class="add-field">
        <label class="add-label">Motivo / descripción</label>
        <input class="add-input" id="meta-desc" placeholder="¿Para qué es este ahorro?" maxlength="60">
      </div>
      <div class="add-field">
        <label class="add-label">Monto objetivo</label>
        <input class="add-input" id="meta-monto" type="number" min="0" step="100" placeholder="$0.00">
      </div>
      <div class="add-field">
        <label class="add-label">Fecha objetivo</label>
        <input class="add-input" id="meta-fecha" type="date">
      </div>
      <div class="add-field">
        <label class="add-label">Ícono</label>
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px" id="meta-icon-grid"></div>
      </div>
      <button class="add-save-btn" id="metaModalSave">Guardar meta</button>
      <button class="add-cancel-btn" id="metaModalCancel">Cancelar</button>
    </div>
  </div>
</div>

<div class="cat-edit-bg" id="catEditBg">
  <div class="cat-edit-box">
    <div class="cat-edit-inner">
      <div class="modal-handle"></div>
      <div class="modal-title" id="catEditTitle">Editar categoría</div>
      <div style="margin-bottom:12px">
        <label class="add-label">Nombre de la categoría</label>
        <input class="add-input" id="catEditName" maxlength="30">
      </div>
      <div class="msec">Bills en esta categoría</div>
      <div id="catEditBills"></div>
      <button class="add-save-btn" id="catEditSave" style="margin-top:12px">Guardar</button>
      <button class="add-cancel-btn" id="catEditCancel">Cancelar</button>
    </div>
  </div>
</div>

<div class="del-opts-bg" id="delOptsBg">
  <div class="del-opts-box">
    <div class="del-opts-title" id="delOptsTitle"></div>
    <button class="del-opt-btn del-opt-month" id="delOptMonth">Solo este mes</button>
    <button class="del-opt-btn del-opt-perm" id="delOptPerm">Cancelar permanentemente</button>
    <button class="del-opt-btn del-opt-cancel" id="delOptCancel">Cancelar</button>
  </div>
</div>

<div class="add-modal-bg" id="addModalBg">
  <div class="add-modal">
    <div class="add-modal-inner">
      <div class="modal-handle"></div>
      <div class="modal-title">Agregar bill</div>
      <div class="add-field">
        <label class="add-label">Nombre</label>
        <input class="add-input" id="ab-name" placeholder="Ej: Netflix, Agua, Seguro..." maxlength="30">
      </div>
      <div class="add-field">
        <label class="add-label">Día del mes</label>
        <input class="add-input" id="ab-day" type="number" min="1" max="31" placeholder="1-31">
      </div>
      <div class="add-field">
        <label class="add-label">Monto</label>
        <input class="add-input" id="ab-amt" type="number" min="0" step="0.01" placeholder="$0.00">
      </div>
      <div class="add-field">
        <label class="add-label">Método de pago</label>
        <input class="add-input" id="ab-pay" placeholder="Ej: AMEX, Cash, Chime..." maxlength="20">
      </div>
      <div class="add-field">
        <label class="add-label">Frecuencia</label>
        <div class="add-seg">

function getPayingSem(){
  // Semanas mié-mar. "Pagando ahora" = semana anterior a la actual.
  var t=todayISO(),all=genAll();
  var curIdx=-1;
  for(var i=0;i<all.length;i++){
    if(all[i].inicio<=t&&all[i].fin>=t){curIdx=i;break;}
  }
  if(curIdx>0)return all[curIdx-1].inicio;
  if(curIdx===0)return all[0].inicio;
  var last=null;
  for(var i=0;i<all.length;i++){if(all[i].fin<t)last=all[i].inicio;}
  return last;
}
function getCurPayWeekDays(y,m){
  // Semana actual mar-lun usando ISO strings
  var today=new Date();
  var dow=today.getDay(); // 0=dom,1=lun,2=mar,...
  var daysFromTue=(dow-2+7)%7; // días desde el último martes
  var tueStart=new Date(today);tueStart.setDate(today.getDate()-daysFromTue);
  var monEnd=new Date(tueStart);monEnd.setDate(tueStart.getDate()+6);
  var tueISO=tueStart.getFullYear()+'-'+String(tueStart.getMonth()+1).padStart(2,'0')+'-'+String(tueStart.getDate()).padStart(2,'0');
  var monISO=monEnd.getFullYear()+'-'+String(monEnd.getMonth()+1).padStart(2,'0')+'-'+String(monEnd.getDate()).padStart(2,'0');
  var days={},dim=new Date(y,m+1,0).getDate();
  for(var d=1;d<=dim;d++){
    var iso=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(iso>=tueISO&&iso<=monISO)days[d]=true;
  }
  return days;
}
function findSemForDate(fechaISO){
  var all=genAll();
  for(var i=0;i<all.length;i++){if(fechaISO>=all[i].inicio&&fechaISO<=all[i].fin)return all[i];}
  return null;
}

    Object.keys(state.income).forEach(function(k){
      state.income[k]=(state.income[k]||[]).filter(function(e){return !e.fromCheque;});

function setDayOv(y,m,bid,day){var k=mk(y,m,1)+'_'+bid;if(!state.overrides[k])state.overrides[k]={};state.overrides[k].day=day;save();}

function getWD(y,m,day,wb){var a=getWOv(y,m,day,wb.id,'amount'),p=getWOv(y,m,day,wb.id,'paid');var paid=p?true:false;if(wb.id==='regalos')paid=getRegaloDone(y,m,day);return{amount:Number(a!=null?a:wb.amount),paid:paid};}

function getDayInc(y,m,d){return(state.income[mk(y,m,d)]||[]);}
function getDayIncT(y,m,d){
  var fechaISO=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  // Ingresos del calendario (state.income, excluir fromCheque que ya están en pagos)
  var calIds={};
  var fromCal=getDayInc(y,m,d).reduce(function(a,e){
    if(e.fromCheque)return a;
    calIds[e.id]=true;
    return a+Number(e.amount);
  },0);
  // Ingresos de pestaña Ingresos (state.pagos), sin duplicar por pagoId
  var fromPagos=0,seenP={};
  Object.keys(state.pagos||{}).forEach(function(sk){
    (state.pagos[sk]||[]).forEach(function(p){
      if(p.fecha!==fechaISO)return;
      if(p.calIncId)return; // ya contado en fromCal
      // Deduplicar estrictamente por pagoId
      var key=p.pagoId?String(p.pagoId):('nat_'+(p.nota||'')+'_'+p.amount+'_'+sk);
      if(!seenP[key]){seenP[key]=true;fromPagos+=Number(p.amount)||0;}
    });
  });
  return fromCal+fromPagos;
}

function delRentaAporte(y,m,id){

  state.renta[k]=(state.renta[k]||[]).filter(function(a){return a.id!==id;});

}

function addInc(y,m,d,amt,note,fromCheque,pid){
  var k=mk(y,m,d);if(!state.income[k])state.income[k]=[];
  var id=pid||Date.now();
  var e={id:id,amount:Number(amt),note:note||'',fromCheque:fromCheque?true:false};
  if(pid)e.pagoId=pid;
  state.income[k].push(e);
  if(!fromCheque){
    var fechaISO=mk(y,m,d);
    var sem=findSemForDate(fechaISO);
    if(sem){
      var sk='sem_'+sem.inicio;
      if(!state.pagos[sk])state.pagos[sk]=[];
      var exists=state.pagos[sk].some(function(p){return p.calIncId&&p.calIncId===id;});
      if(!exists)state.pagos[sk].push({fecha:fechaISO,amount:Number(amt),nota:note||'Ingreso calendario',calIncId:id,fromCal:true});
    }
  }
  save();
}
function delInc(y,m,d,id){
  var k=mk(y,m,d);
  var entry=getDayInc(y,m,d).find(function(e){return e.id===id;});
  state.income[k]=(state.income[k]||[]).filter(function(e){return e.id!==id;});
  if(entry&&!entry.fromCheque){
    Object.keys(state.pagos).forEach(function(sk){state.pagos[sk]=(state.pagos[sk]||[]).filter(function(p){return p.calIncId!==id;});});
  }
  save();
}

  pagos.splice(pi,1);state.pagos[k]=pagos;save();
}

function calcSemActual(y,m){
  var t=todayISO();
  var allSems=genAll(),curSem=null,curIdxInc=-1;
  for(var i=0;i<allSems.length;i++){if(allSems[i].inicio<=t&&allSems[i].fin>=t){curSem=allSems[i];curIdxInc=i;break;}}
  if(!curSem){for(var i=0;i<allSems.length;i++){if(allSems[i].fin<t){curSem=allSems[i];curIdxInc=i;}}}
  if(!curSem)return{tb:0,pb:0,pend:0,ti:0,bal:0,semLabel:'—'};

  var g=calcGastosSem(curSem.inicio,curSem.fin);
  var tb=g.tb,pb=g.pb;

  // Renta apartada esta semana
  var semIniKey=curSem.inicio;
  var rentaApartada=(state.semResumenRenta&&state.semResumenRenta[semIniKey])||0;
  if(rentaApartada>0){
    tb+=rentaApartada;
    // Ver si está pagada en Mi Renta (checkbox del martes)
    var todayD2=new Date();
    var rM2=todayD2.getDate()<=10?todayD2.getMonth():todayD2.getMonth()+1;
    var rY2=todayD2.getFullYear();if(rM2>11){rM2=0;rY2++;}
    var rentaKey2=getRentaKey(rY2,rM2);
    var rentaAportes2=state.renta&&state.renta[rentaKey2]?state.renta[rentaKey2]:[];
    var dRT=new Date(curSem.inicio+'T12:00:00'),finRT=new Date(curSem.fin+'T12:00:00');
    while(dRT<=finRT){
      if(dRT.getDay()===2){
        var tueISOD=dRT.getFullYear()+'-'+String(dRT.getMonth()+1).padStart(2,'0')+'-'+String(dRT.getDate()).padStart(2,'0');
        var ra=rentaAportes2.find(function(a){return a.semIni===tueISOD;});
        if(ra&&ra.paid)pb+=rentaApartada;
        break;
      }
      dRT.setDate(dRT.getDate()+1);
    }
  }

  // Ingresos
  var ti=0;
  var incSemIdx=curIdxInc-2;
  if(incSemIdx>=0){var semP=getSemP(allSems[incSemIdx].inicio);ti=semP.reduce(function(a,p){return a+Number(p.amount);},0);}
  var MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var ls=new Date(curSem.inicio+'T12:00:00'),de=new Date(curSem.fin+'T12:00:00');
  return{tb:tb,pb:pb,pend:tb-pb,ti:ti,bal:ti-tb,semLabel:ls.getDate()+' '+MS[ls.getMonth()]+' – '+de.getDate()+' '+MS[de.getMonth()]};
}
function calcMonth(y,m){
  var tues=getTues(y,m),tb=0,pb=0,ti=0;
  // Gastos: bills del mes excepto renta y memo
  mBills(y,m).forEach(function(b){if(b.memo||b.special==='renta')return;var d=getBD(y,m,b);tb+=d.amount;if(d.paid)pb+=d.amount;});
  // Custom bills del mes
  getCustomBills(y,m).forEach(function(b){
    var paid=!!(state.customPaid&&state.customPaid[y+'_'+m+'_'+b.id]);
    var amt=Number(b.amount)||0;
    tb+=amt;if(paid)pb+=amt;
  });
  tues.forEach(function(day){WKL.forEach(function(wb){var d=getWD(y,m,day,wb);tb+=d.amount;if(d.paid)pb+=d.amount;});var rd=getWD(y,m,day,REGALO);tb+=rd.amount;if(rd.paid)pb+=rd.amount;});
  // Agregar renta del mes como gasto fijo
  var rentaDelMes=rentaAmt(y,m);
  tb+=rentaDelMes;
  // Pagado de renta = aportes marcados como pagados
  var todayDM=new Date();
  var rMM=todayDM.getDate()<=10?todayDM.getMonth():todayDM.getMonth()+1;
  var rYM=todayDM.getFullYear();if(rMM>11){rMM=0;rYM++;}
  if(rYM===y&&rMM===m){
    var rentaKeyM=getRentaKey(rYM,rMM);
    var rentaAportesM=state.renta&&state.renta[rentaKeyM]?state.renta[rentaKeyM]:[];
    var rentaPagado=rentaAportesM.filter(function(a){return a.paid;}).reduce(function(s,a){return s+Number(a.amount)||0;},0);
    pb+=rentaPagado;
  }
  // Ingresos: misma logica que el modal - iterar todas las semanas
  var allSemsCI=genAll();
  allSemsCI.forEach(function(sem){
    var semPCI=getSemP(sem.inicio);
    semPCI.forEach(function(p){
      if(!p.fecha)return;
      var py=parseInt(p.fecha.slice(0,4)),pm=parseInt(p.fecha.slice(5,7))-1;
      if(py===y&&pm===m)ti+=Number(p.amount)||0;
    });
  });
  return{tb:tb,pb:pb,pend:tb-pb,ti:ti,bal:ti-tb};
}


function getFinancialMonth(y,m){
  // Primer martes del mes
  var d=new Date(y,m,1);
  while(d.getDay()!==2)d.setDate(d.getDate()+1);
  var firstTue=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  // Contar martes del mes
  var tues=[];
  var d2=new Date(y,m,1);
  while(d2.getDay()!==2)d2.setDate(d2.getDate()+1);
  while(d2.getMonth()===m){tues.push(new Date(d2));d2.setDate(d2.getDate()+7);}
  // Ultimo lunes = ultimo martes + 6 dias
  var lastTue=tues[tues.length-1];
  var lastMon=new Date(lastTue);lastMon.setDate(lastTue.getDate()+6);
  var lastMonISO=lastMon.getFullYear()+'-'+String(lastMon.getMonth()+1).padStart(2,'0')+'-'+String(lastMon.getDate()).padStart(2,'0');
  return{firstTue:firstTue,lastMon:lastMonISO,numTues:tues.length};
}

function calcAhorroEstimado(y,m){
  var fm=getFinancialMonth(y,m);
  var sueldo=1250;
  var ingresoProyectado=sueldo*fm.numTues;
  // Gastos: bills que vencen entre firstTue y lastMon
  var tb=0;
  var d=new Date(fm.firstTue+'T12:00:00');
  var fin=new Date(fm.lastMon+'T12:00:00');
  while(d<=fin){
    var dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
    mBills(dy,dm).forEach(function(b){
      if(getBillDay(dy,dm,b)===dd&&!b.memo&&b.special!=='renta'){
        tb+=getBD(dy,dm,b).amount;
      }
    });
    getCustomBills(dy,dm).forEach(function(b){
      if(b.day===dd)tb+=Number(b.amount)||0;
    });
    if(d.getDay()===2){
      WKL.forEach(function(wb){tb+=getWD(dy,dm,dd,wb).amount;});
      tb+=REGALO.amount;
    }
    d.setDate(d.getDate()+1);
  }
  // Usar ahorroRenta si está definido manualmente, si no calcular automático
  var rentaTotal=0;
  var rentaKey2=y+'_'+m;
  if(state.ahorroRenta&&state.ahorroRenta[rentaKey2]!==undefined){
    rentaTotal=Number(state.ahorroRenta[rentaKey2])||0;
  } else {
    var today=new Date();
    var curY=today.getFullYear(),curM=today.getMonth();
    if(y>curY||(y===curY&&m>=curM)){
      if(state.renta){
        Object.keys(state.renta).forEach(function(k){
          (state.renta[k]||[]).forEach(function(a){
            if(a.semIni>=fm.firstTue&&a.semIni<=fm.lastMon){
              rentaTotal+=Number(a.amount)||0;
            }
          });
        });
      }
    } else {
      if(state.semResumenRenta){
        Object.keys(state.semResumenRenta).forEach(function(semIni){
          if(semIni>=fm.firstTue&&semIni<=fm.lastMon){
            rentaTotal+=Number(state.semResumenRenta[semIni])||0;
          }
        });
      }
    }
  }
  // Si no hay aportes registrados, no estimar — dejar en 0
  tb+=rentaTotal;
  return{ingreso:ingresoProyectado,gastos:tb,ahorro:ingresoProyectado-tb,numTues:fm.numTues,rentaTotal:rentaTotal};
}

function openModal(d){
  var y=cur.getFullYear(),m=cur.getMonth();
  var dow=new Date(y,m,d).getDay();
  var isTue=dow===2;
  var dayNames=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var rDone=isTue?getRegaloDone(y,m,d):false;
  modalDay=d;
  document.getElementById('modalTitle').textContent=dayNames[dow]+' '+d+' '+MESES[m];
  var html='';

  // Ingresos
  var incE=getDayInc(y,m,d).filter(function(e){
    if(e.fromCheque)return false;
    // Excluir si ya existe en chqE con mismo monto y nota similar
    var noteParts=(e.note||'').split(' · ');
    var baseNote=noteParts[0];
    return !chqE.some(function(c){
      var cParts=(c.nota||'').split(' ');
      return Number(c.amount)===Number(e.amount)&&(c.nota===baseNote||cParts[0]===baseNote.split(' ')[0]);
    });
  });
  var incT=incE.reduce(function(a,e){return a+Number(e.amount);},0);

        '<button class="del-btn" data-iid="'+e.id+'">×</button></div>';

  }
  if(totalDayInc>0){html+='<div style="font-size:12px;color:var(--green);padding:6px 14px;font-weight:700">Total: '+fmt(totalDayInc)+'</div>';}

  // Add income form
  html+='<div class="inc-add"><input type="text" id="incNote" placeholder="Nota (opcional)"><input type="number" id="incAmt" placeholder="$" min="0" step="0.01" style="max-width:90px"><button id="addIncBtn">+ Agregar</button></div></div>';

  // Bills
  var monthly=mBills(y,m).filter(function(b){return getBillDay(y,m,b)===d;});

      if(b.special==='renta')tags+='<span style="font-size:9px;background:var(--renta-bg);color:var(--renta-text);border-radius:4px;padding:1px 5px;font-weight:600">'+(getTues(y,m).length>=5?'5sem':'4sem')+'</span>';
      var dayOvTag=efectiveDay!==b.day?'<span style="font-size:9px;background:var(--orange);color:#fff;border-radius:4px;padding:1px 5px;font-weight:600">día '+efectiveDay+'</span>':'';

        '</div></div></div>';
    });
    if(weekly.length>0){
      html+='<div class="msec" style="margin-top:4px">Gastos Fijos</div>';
      weekly.forEach(function(wb){
        var wd=getWD(y,m,d,wb);

        html+='<div class="mbill"><input type="checkbox" class="mchk" data-type="weekly" data-day="'+d+'" data-id="'+wb.id+'"'+(wd.paid?' checked':'')+'>'+
          '<div class="mbill-info"><div class="mname'+(wd.paid?' done':'')+'">'+ico+' '+wb.name+'</div>'+
          (wb.pay?'<div class="mpay">💳 '+wb.pay+'</div>':'')+
          '</div><div class="mright"><span class="mamt" id="maw_'+wb.id+'_'+d+'">'+fmt(wd.amount)+'</span>'+
          '<div style="display:flex;flex-direction:column;gap:3px">'+
          '<button class="edit-btn edit-wkl" data-wid="'+wb.id+'" data-wday="'+d+'">$ editar</button>'+

          '</div></div>';
      });
    }
    if(isTue){
      var rdW=getWD(y,m,d,REGALO);
      html+='<div class="mbill"><input type="checkbox" class="mchk" data-type="regalo" data-day="'+d+'" id="regaloChk"'+(rdW.paid?' checked':'')+'>'+
        '<div class="mbill-info"><div class="mname'+(rdW.paid?' done':'')+'">🎁 '+REGALO.name+'</div>'+
        '<div class="mpay">💳 CashApp</div>'+
        '</div><div class="mright"><span class="mamt" id="maw_regalo_'+d+'">'+fmt(rdW.amount)+'</span>'+
        '<div style="display:flex;flex-direction:column;gap:3px">'+
        '<button class="edit-btn edit-regalo-btn" data-wday="'+d+'">$ editar</button>'+
        '<button class="edit-btn edit-regalo-day-btn" data-wday="'+d+'" style="color:var(--orange)">📅 día</button>'+
        '</div>'+
        '</div></div>';
    }
  }

  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modalBg').classList.add('open');

  // Event listeners
  document.getElementById('addIncBtn').addEventListener('click',function(){
    var amt=parseFloat(document.getElementById('incAmt').value)||0;
    var note=document.getElementById('incNote').value.trim();
    if(!amt)return;
    addInc(y,m,d,amt,note,false,null);
    openModal(d);rSummary();rCal();
  });
  document.querySelectorAll('.del-btn').forEach(function(btn){
    btn.addEventListener('click',function(){delInc(y,m,d,parseInt(btn.dataset.iid));openModal(d);rSummary();rCal();});
  });
  document.querySelectorAll('.del-chq-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var pid=btn.dataset.pid,fecha=btn.dataset.fecha,amt=parseFloat(btn.dataset.amt),nota=btn.dataset.nota;
      // Eliminar de todas las semanas donde aparezca este pago
      Object.keys(state.pagos||{}).forEach(function(sk){
        state.pagos[sk]=(state.pagos[sk]||[]).filter(function(p){
          if(pid)return String(p.pagoId)!==String(pid);
          return !(p.fecha===fecha&&Number(p.amount)===amt&&(p.nota||'')===nota);
        });
      });
      // También eliminar de state.income si existe con ese pagoId
      if(pid){Object.keys(state.income||{}).forEach(function(ik){state.income[ik]=(state.income[ik]||[]).filter(function(e){return String(e.pagoId)!==String(pid)&&String(e.id)!==String(pid);});});}
      save();
      openModal(d);
    });
  });
  document.querySelectorAll('.mchk:not(.memo)').forEach(function(chk){
    chk.addEventListener('change',function(){
      if(chk.dataset.type==='monthly'){setOv(y,m,chk.dataset.id,'paid',chk.checked);}
      else if(chk.dataset.type==='weekly'){setWOv(y,m,parseInt(chk.dataset.day),chk.dataset.id,'paid',chk.checked);}
      else if(chk.dataset.type==='regalo'){setRegaloDone(y,m,parseInt(chk.dataset.day),chk.checked);}
      rSummary();rCal();if(viewMode==='list')rList();
    });
  });
  var regChk=document.getElementById('regaloChk');
  if(regChk)regChk.addEventListener('change',function(){setRegaloDone(y,m,d,regChk.checked);rSummary();rCal();if(viewMode==='list')rList();});
  document.querySelectorAll('.edit-regalo-day-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var wday=parseInt(btn.dataset.wday);
      var newDay=prompt('Nuevo día del mes para '+REGALO.name+':',wday);
      if(newDay===null)return;
      var nd=parseInt(newDay);
      if(isNaN(nd)||nd<1||nd>31)return;
      if(!state.overrides[y+'_'+m])state.overrides[y+'_'+m]={};
      if(!state.overrides[y+'_'+m]['wkl_day_regalo'])state.overrides[y+'_'+m]['wkl_day_regalo']={};
      state.overrides[y+'_'+m]['wkl_day_regalo'].day=nd;
      save();openModal(nd);
    });
  });
  document.querySelectorAll('.edit-regalo-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var wday=parseInt(btn.dataset.wday);
      var rdW=getWD(y,m,wday,REGALO);
      var el=document.getElementById('maw_regalo_'+wday);
      var inp=document.createElement('input');inp.type='number';inp.className='amt-inp';inp.value=rdW.amount;inp.step='0.01';inp.min='0';
      el.replaceWith(inp);inp.focus();inp.select();
      function sv(){var v=parseFloat(inp.value)||0;setWOv(y,m,wday,REGALO.id,'amount',v);openModal(modalDay);}
      inp.addEventListener('blur',sv);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});
    });

  document.querySelectorAll('.edit-monthly-amt').forEach(function(btn){
    btn.addEventListener('click',function(){
      var isCustom=btn.dataset.iscustom==='1';
      var bill=isCustom
        ?(state.customBills||[]).find(function(b){return b.id===btn.dataset.id;})
        :BILLS.find(function(b){return b.id===btn.dataset.id;});
      if(!bill)return;
      var ca=getBD(y,m,bill).amount,el=document.getElementById('ma_'+bill.id);
      var inp=document.createElement('input');inp.type='number';inp.className='amt-inp';inp.value=ca;inp.step='0.01';inp.min='0';
      el.replaceWith(inp);inp.focus();inp.select();
      function sv(){var v=parseFloat(inp.value)||0;setOv(y,m,bill.id,'amount',v);openModal(modalDay);rSummary();rCal();if(viewMode==='list')rList();}
      inp.addEventListener('blur',sv);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});

  });
  document.querySelectorAll('.edit-day-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var bill=BILLS.find(function(b){return b.id===btn.dataset.id;});if(!bill)return;
      var curDay=getBillDay(y,m,bill);
      var dim=new Date(y,m+1,0).getDate();

      var sel=document.createElement('select');
      sel.style.cssText='font-size:13px;padding:4px 6px;border:1.5px solid var(--orange);border-radius:8px;background:var(--bg2);color:var(--text1);font-family:inherit';
      sel.innerHTML=opts;
      btn.replaceWith(sel);sel.focus();
      function sv(){var v=parseInt(sel.value);setDayOv(y,m,bill.id,v);openModal(modalDay);rSummary();rCal();if(viewMode==='list')rList();}
      sel.addEventListener('change',sv);
      sel.addEventListener('blur',function(){openModal(modalDay);});

  document.querySelectorAll('.del-bill-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      openDelOpts(btn.dataset.id,btn.dataset.name,btn.dataset.iscustom==='1',y,m);
    });

  document.querySelectorAll('.edit-wkl').forEach(function(btn){
    btn.addEventListener('click',function(){
      var wid=btn.dataset.wid,wday=parseInt(btn.dataset.wday);
      var wb=WKL.find(function(w){return w.id===wid;});if(!wb)return;
      var ca=getWD(y,m,wday,wb).amount;
      var el=document.getElementById('maw_'+wid+'_'+wday);
      var inp=document.createElement('input');inp.type='number';inp.className='amt-inp';inp.value=ca;inp.step='1';inp.min='0';
      el.replaceWith(inp);inp.focus();inp.select();
      function sv(){var v=parseFloat(inp.value)||0;setWOv(y,m,wday,wid,'amount',v);openModal(modalDay);rSummary();rCal();if(viewMode==='list')rList();if(viewMode==='renta')rRenta();}
      inp.addEventListener('blur',sv);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});
    });
  });
  document.querySelectorAll('.edit-wkl-day').forEach(function(btn){
    btn.addEventListener('click',function(){
      var wid=btn.dataset.wid,wday=parseInt(btn.dataset.wday);
      var newDay=prompt('Nuevo día del mes para '+WKL.find(function(w){return w.id===wid;}).name+':',wday);
      if(newDay===null)return;

      if(!state.overrides[y+'_'+m])state.overrides[y+'_'+m]={};
      if(!state.overrides[y+'_'+m]['wkl_day_'+wid])state.overrides[y+'_'+m]['wkl_day_'+wid]={};
      state.overrides[y+'_'+m]['wkl_day_'+wid].day=nd;
      save();openModal(nd);

  });

function rBal(){
  var y=cur.getFullYear(),m=cur.getMonth(),weeks=getWeeks(y,m);
  var html='<div class="tbl-wrap"><table class="wtbl"><thead><tr><th>Semana</th><th>Ingresos</th><th>Gastos</th><th>Bal.</th></tr></thead><tbody>';
  var gIn=0,gOut=0;
  weeks.forEach(function(wDays,i){
    var inc=0,out=0;
    wDays.forEach(function(d){
      inc+=getDayIncT(y,m,d);
      mBills(y,m).filter(function(b){return getBillDay(y,m,b)===d;}).forEach(function(b){out+=getBD(y,m,b).amount;});
      if(new Date(y,m,d).getDay()===2)WKL.forEach(function(wb){out+=getWD(y,m,d,wb).amount;});
    });
    gIn+=inc;gOut+=out;var bal=inc-out,bc=bal>0?'pos':bal<0?'neg':'neu';
    html+='<tr><td>Sem '+(i+1)+' ('+wDays[0]+'–'+wDays[wDays.length-1]+')</td><td class="pos">'+fmt(inc)+'</td><td>'+fmt(out)+'</td><td class="'+bc+'">'+fmtS(bal)+'</td></tr>';
  });
  var gb=gIn-gOut;
  html+='<tr><td>Total</td><td class="pos">'+fmt(gIn)+'</td><td>'+fmt(gOut)+'</td><td class="'+(gb>=0?'pos':'neg')+'">'+fmtS(gb)+'</td></tr>';
  html+='</tbody></table></div>';
  document.getElementById('balView').innerHTML=html;
}

function rPagos(){
  var y=cur.getFullYear(),m=cur.getMonth();
  var sems=semsForView(y,m),payIni=getPayingSem(),t=todayISO();
  var ms=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var html='<div class="pagos-view"><div class="pag-title">Semanas de ingreso</div>';
  sems.forEach(function(sem){
    var pagos=getSemP(sem.inicio);
    var cobrado=pagos.reduce(function(a,p){return a+Number(p.amount);},0);
    // Sueldo editable por semana
    var semSueldo=state.sueldos&&state.sueldos[sem.inicio]?state.sueldos[sem.inicio]:SUELDO;
    var falta=Math.max(0,semSueldo-cobrado),pct=Math.min(100,Math.round(cobrado/semSueldo*100));
    var ok=cobrado>=semSueldo,isPaying=sem.inicio===payIni,isPast=sem.fin<t,isPrev=sem.inicio<ms;
    var bc=ok?'ok':cobrado>0?'par':'emp';
    var bt=ok?'Completo':cobrado>0?pct+'% cobrado':(isPast&&!isPaying?'Sin pagos':'Pendiente');
    var pfx='pf_'+sem.inicio.replace(/-/g,'');
    var sid=sem.inicio.replace(/-/g,'');
    html+='<div class="sc'+(isPaying?' paying':'')+(isPrev?' prev-month':'')+'">'+
      '<div class="sch" data-ini="'+sem.inicio+'">'+
        '<div class="sc-left"><div class="sc-label">Semana trabajada '+fmtCorto(sem.inicio)+' – '+fmtDate(sem.fin)+'</div>'+
        '<div class="sc-tags">'+(isPaying?'<span class="sc-tag paying">pagando ahora</span>':'')+
        (isPrev&&!isPaying?'<span class="sc-tag prev">mes anterior</span>':'')+
        '</div></div>'+
        '<div class="sc-right"><span class="sc-prog">'+fmt(cobrado)+' / '+fmt(semSueldo)+'</span><span class="sc-badge '+bc+'">'+bt+'</span></div>'+
      '</div>'+
      '<div class="sb'+(isPaying?' open':'')+'" id="sb_'+sem.inicio+'">'+
        '<div class="pbw"><div class="pbf'+(cobrado>semSueldo?' over':'')+'" style="width:'+pct+'%"></div></div>'+
        // Sueldo editable
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:var(--text2)">'+
          '<span>Sueldo esta semana:</span>'+
          '<input type="number" class="sueldo-inp" data-sem="'+sem.inicio+'" value="'+semSueldo+'" min="0" step="10" '+
            'style="width:80px;font-size:12px;font-weight:700;border:1px solid var(--border);border-radius:8px;padding:4px 6px;background:var(--bg3);color:var(--text1);font-family:inherit">'+
        '</div>'+
        (pagos.length===0?'<div style="font-size:12px;color:var(--text2);padding:4px 0 8px">Sin pagos aún.</div>':'')+
        pagos.slice().sort(function(a,b){return a.fecha<b.fecha?-1:a.fecha>b.fecha?1:0;}).map(function(p,pi){
          var calTag=p.fromCal?'<span class="cal-tag">cal</span>':'';
          var pParts=(p.nota||'Pago').split(' ');
          var pPersona=pParts[0]||'';
          var pMetodo=pParts[1]||'';
          var pLabel=pMetodo?pPersona+' — '+pMetodo:pPersona;
          return '<div class="pr"><span class="pr-f">'+fmtDate(p.fecha)+'</span><span class="pr-n">'+pLabel+calTag+'</span><span class="pr-a">'+fmt(p.amount)+'</span><button class="pr-d" data-ini="'+sem.inicio+'" data-pid="'+(p.id||p.calIncId||p.pagoId||'')+'">×</button></div>';
        }).join('')+
        '<div class="str"><span style="color:var(--text2)">Falta</span><span style="'+(falta>0?'color:var(--orange)':'color:var(--green)')+'">'+
        (falta>0?fmt(falta):'✓ Completo')+'</span></div>'+
        '<div class="paf">'+buildPS(pfx)+
          '<input type="number" placeholder="Monto" min="0" step="0.01" id="pa_'+sem.inicio.replace(/-/g,'')+'" style="width:70px">'+
          '<select id="pp_'+sem.inicio.replace(/-/g,'')+'" style="font-size:11px;padding:4px 2px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text1);font-family:inherit">'+
            '<option value="Lourdes Cash">Lourdes — Cash</option>'+
            '<option value="Veronica Cash">Veronica — Cash</option>'+
            '<option value="Veronica Zelle">Veronica — Zelle</option>'+
          '</select>'+
          '<button data-ini2="'+sem.inicio+'">+ Agregar</button></div>'+
        '<div style="font-size:10px;color:var(--text2);margin-top:6px">Se refleja en el calendario automáticamente.</div>'+
      '</div></div>';
  });
  html+='</div>';
  document.getElementById('pagView').innerHTML=html;
  document.querySelectorAll('.sueldo-inp').forEach(function(inp){
    inp.addEventListener('change',function(){
      var semIni=inp.getAttribute('data-sem');
      var val=parseFloat(inp.value)||SUELDO;
      if(!state.sueldos)state.sueldos={};
      state.sueldos[semIni]=val;
      save();
      var oi=[];document.querySelectorAll('.sb.open').forEach(function(b){oi.push(b.id);});
      rPagos();rSummary();
      oi.forEach(function(id){var el=document.getElementById(id);if(el)el.classList.add('open');});
    });
  });
  document.querySelectorAll('.sch').forEach(function(el){el.addEventListener('click',function(){var sb=document.getElementById('sb_'+el.dataset.ini);if(sb)sb.classList.toggle('open');});});
  document.querySelectorAll('[data-ini2]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var ini=btn.dataset.ini2,pfx='pf_'+ini.replace(/-/g,'');
      var pd=document.getElementById(pfx+'D'),pm=document.getElementById(pfx+'M'),py=document.getElementById(pfx+'Y');
      if(!pd||!pm||!py)return;
      var fecha=toISO(pd.value,pm.value,py.value);
      var amt=parseFloat(document.getElementById('pa_'+ini.replace(/-/g,'')).value)||0;
      var pp=document.getElementById('pp_'+ini.replace(/-/g,''));
      var nota=pp?pp.value:'Pago';
      if(!amt)return;
      addSemP(ini,fecha,amt,nota);
      var oi=[];document.querySelectorAll('.sb.open').forEach(function(b){oi.push(b.id);});
      rPagos();rSummary();rCal();if(viewMode==='list')rList();if(viewMode==='balance')rBal();
      oi.forEach(function(id){var el=document.getElementById(id);if(el)el.classList.add('open');});
    });
  });
  document.querySelectorAll('.pr-d').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(btn.dataset.pid)delSemPById(btn.dataset.ini,btn.dataset.pid);
      else delSemP(btn.dataset.ini,parseInt(btn.dataset.pi));
      var oi=[];document.querySelectorAll('.sb.open').forEach(function(b){oi.push(b.id);});
      rPagos();rSummary();rCal();if(viewMode==='list')rList();if(viewMode==='balance')rBal();
      oi.forEach(function(id){var el=document.getElementById(id);if(el)el.classList.add('open');});
    });
  });
}

// ── MI RENTA: semanas LUNES-DOMINGO ──────────────────────────────────────
// Regla: la semana que CONTIENE el día 8 es la ÚLTIMA aportación del mes.
// El lunes ya tienes el cheque completo y puedes pagar el día 8 esa semana.
// La semana SIGUIENTE al día 8 ya empieza el fondo del mes siguiente.

function isoDeDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function lunDomDeIso(iso){
  var d=new Date(iso+'T12:00:00');
  var dow=d.getDay();
  if(dow===0)d.setDate(d.getDate()-6);
  else d.setDate(d.getDate()-(dow-1));
  return d;
}

// Mi Renta: semanas MAR-LUN, pago el día 10 del mes SIGUIENTE
// Cuando estás en mes M, juntas para la renta del mes M+1
// Última semana válida: la que su LUNES (fin) sea < día 10 del mes siguiente
// Primera semana: martes siguiente al último lunes válido del mes actual (que fue para el mes M)

function ultimoLunesAntesDia10(ry,rm){
  var dia10=new Date(ry,rm,10);
  var d=new Date(dia10);
  d.setDate(d.getDate()-1);
  while(d.getDay()!==1)d.setDate(d.getDate()-1);
  return isoDeDate(d);
}

// Devuelve los martes que caen entre el 11 del mes anterior y el 10 de este mes
function semsRentaLunDom(ry,rm){
  // Martes del período de aportación para renta (ry,rm)
  // Desde el martes siguiente al día 10 del mes anterior
  // Hasta el último martes <= día 10 de este mes
  var prevM=rm-1,prevY=ry;
  if(prevM<0){prevM=11;prevY--;}
  
  var dia10prev=new Date(prevY,prevM,10);
  var inicio=new Date(dia10prev);
  inicio.setDate(inicio.getDate()+1);
  while(inicio.getDay()!==2)inicio.setDate(inicio.getDate()+1);
  
  var dia10=new Date(ry,rm,10);
  var hasta=new Date(dia10);
  // Retroceder al martes <= día 10
  while(hasta.getDay()!==2)hasta.setDate(hasta.getDate()-1);
  
  var martes=[];
  var d=new Date(inicio);
  while(d<=hasta){
    martes.push({inicio:isoDeDate(d),fin:isoDeDate(d)});
    d.setDate(d.getDate()+7);
    if(martes.length>10)break;
  }
  return martes;
}

// Bills (sin renta) que caen en una semana lun-dom
function billsEnSem(sem){
  var out=0;
  var d=new Date(sem.inicio+'T12:00:00');
  var fin=new Date(sem.fin+'T12:00:00');
  while(d<=fin){
    var dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
    mBills(dy,dm).forEach(function(b){
      if(b.special==='renta')return;
      if(getBillDay(dy,dm,b)===dd)out+=getBD(dy,dm,b).amount;
    });
    d.setDate(d.getDate()+1);
  }
  return out;
}

function rRenta(){
  var y=cur.getFullYear(),m=cur.getMonth();
  var t=todayISO();

  // Mes base según fecha de HOY
  var todayD=new Date();
  var baseM,baseY;
  if(todayD.getDate()<=10){baseM=todayD.getMonth();baseY=todayD.getFullYear();}
  else{baseM=todayD.getMonth()+1;baseY=todayD.getFullYear();if(baseM>11){baseM=0;baseY++;}}
  var nextRentM=baseM+rentaNavOffset;
  var nextRentY=baseY;
  while(nextRentM>11){nextRentM-=12;nextRentY++;}
  while(nextRentM<0){nextRentM+=12;nextRentY--;}

  var semsRenta=semsRentaLunDom(nextRentY,nextRentM);
  var meta=semsRenta.length>=5?600:800;
  var aportes=getRentaAportes(nextRentY,nextRentM);

  // Calcular total de aportes marcados como pagados
  var totalAportado=aportes.filter(function(a){return a.paid;}).reduce(function(s,a){return s+Number(a.amount);},0);
  var falta=Math.max(0,meta-totalAportado);
  var pct=meta>0?Math.min(100,Math.round(totalAportado/meta*100)):0;

  // Día 10 info
  var dia10=new Date(nextRentY,nextRentM,10);
  var dow10=dia10.getDay();
  var diasFull=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var MESES_S=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  var html='';

  // Nav bar
  var isBase=(rentaNavOffset===0);
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'+
    '<button id="rentaPrev" style="background:var(--bg4);border:none;border-radius:20px;padding:6px 16px;cursor:pointer;font-size:18px;color:var(--text1);font-family:inherit">‹</button>'+
    '<div style="text-align:center">'+
      '<div style="font-size:15px;font-weight:700;color:var(--text1)">Renta de '+MESES[nextRentM]+' '+nextRentY+'</div>'+
      '<div style="font-size:11px;color:var(--text2);margin-top:2px">vence día 10 = '+diasFull[dow10]+'</div>'+
    '</div>'+
    '<button id="rentaNext" style="background:var(--bg4);border:none;border-radius:20px;padding:6px 16px;cursor:pointer;font-size:18px;color:var(--text1);font-family:inherit">›</button>'+
  '</div>';

  // Hero card — limpio
  var heroColor=pct>=100?'var(--green)':pct>=50?'var(--orange)':'var(--red)';
  html+='<div style="background:var(--bg2);border-radius:16px;padding:18px 16px;margin-bottom:14px;box-shadow:var(--shadow)">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">'+
      '<div>'+
        '<div style="font-size:32px;font-weight:800;color:var(--text1)">'+fmt(totalAportado)+'</div>'+
        '<div style="font-size:12px;color:var(--text2);margin-top:2px">de '+fmt(meta)+' meta · '+semsRenta.length+' martes</div>'+
      '</div>'+
      '<div style="text-align:right">'+
        '<div style="font-size:11px;color:var(--text2)">Faltan</div>'+
        '<div style="font-size:20px;font-weight:700;color:'+(falta===0?'var(--green)':'var(--red)')+'">'+( falta===0?'✓ Listo':fmt(falta))+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden">'+
      '<div style="height:100%;width:'+pct+'%;background:'+(pct>=100?'var(--green)':'var(--blue)')+';border-radius:3px;transition:width .4s"></div>'+
    '</div>'+
  '</div>';

  // Lista de martes — checklist simple
  html+='<div style="display:flex;flex-direction:column;gap:8px">';
  semsRenta.forEach(function(sem,idx){
    var aporte=aportes.find(function(a){return a.semIni===sem.inicio;})||{amount:0,paid:false};
    var isPast=sem.inicio<t;
    var isCur=sem.inicio<=t&&t<=sem.fin;
    var isUlt=(idx===semsRenta.length-1);
    var semD=new Date(sem.inicio+'T12:00:00');
    var semLbl='Martes '+semD.getDate()+' '+MESES_S[semD.getMonth()];
    var pid='rp_'+sem.inicio.replace(/-/g,'');

    html+='<div style="background:var(--bg2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)'+(isCur?';border:1.5px solid var(--orange)':isUlt?';border:1.5px solid var(--blue)':'')+'">'+
      // Checkbox
      '<input type="checkbox" id="chk_'+pid+'" data-sem="'+sem.inicio+'" class="renta-chk" style="width:20px;height:20px;cursor:pointer;accent-color:var(--green);flex-shrink:0"'+(aporte.paid?' checked':'')+'>'+
      // Fecha
      '<div style="flex:1">'+
        '<div style="font-size:13px;font-weight:600;color:'+(aporte.paid?'var(--text3)':'var(--text1)')+'">'+( aporte.paid?'<s>':'')+semLbl+(aporte.paid?'</s>':'')+'</div>'+
        (isCur?'<div style="font-size:10px;color:var(--orange)">● este martes</div>':'')+
        (isUlt&&!isCur?'<div style="font-size:10px;color:var(--blue)">último</div>':'')+
      '</div>'+
      // Monto editable
      '<input type="number" id="amt_'+pid+'" data-sem="'+sem.inicio+'" class="renta-amt-inp" value="'+(aporte.amount||0)+'" min="0" step="10" '+
        'style="width:80px;font-size:15px;font-weight:700;text-align:right;border:1.5px solid var(--border);border-radius:8px;padding:6px 8px;background:var(--bg3);color:var(--text1);font-family:inherit">'+
    '</div>';
  });
  html+='</div>';

  // Botón reset pequeño
  html+='<button id="rentaResetBtn" style="margin-top:14px;font-size:10px;background:none;border:0.5px solid var(--border);color:var(--text3);border-radius:8px;padding:4px 10px;cursor:pointer;font-family:inherit;width:100%">Resetear aportes</button>';

  document.getElementById('rentaView').innerHTML=html;

  // Nav listeners
  document.getElementById('rentaPrev').addEventListener('click',function(){rentaNavOffset--;rRenta();});
  document.getElementById('rentaNext').addEventListener('click',function(){rentaNavOffset++;rRenta();});
  var resetBtn=document.getElementById('rentaResetBtn');
  if(resetBtn)resetBtn.addEventListener('click',function(){resetRentaAportes();});

  // Checkbox listeners — marcar/desmarcar aporte
  document.querySelectorAll('.renta-chk').forEach(function(chk){
    chk.addEventListener('change',function(){
      var semIni=chk.dataset.sem;
      var pid='rp_'+semIni.replace(/-/g,'');
      var amtInp=document.getElementById('amt_'+pid);
      var amt=parseFloat(amtInp?amtInp.value:0)||0;
      var aportesList=getRentaAportes(nextRentY,nextRentM);
      var existing=aportesList.find(function(a){return a.semIni===semIni;});
      if(existing){existing.paid=chk.checked;existing.amount=amt;}
      else{aportesList.push({id:Date.now(),semIni:semIni,amount:amt,paid:chk.checked});}
      if(!state.renta)state.renta={};
      state.renta[getRentaKey(nextRentY,nextRentM)]=aportesList;
      save();
    });
  });

  // Amount change listeners
  document.querySelectorAll('.renta-amt-inp').forEach(function(inp){
    inp.addEventListener('change',function(){
      var semIni=inp.dataset.sem;
      var amt=parseFloat(inp.value)||0;
      var aportesList=getRentaAportes(nextRentY,nextRentM);
      var existing=aportesList.find(function(a){return a.semIni===semIni;});
      if(existing){existing.amount=amt;}
      else{aportesList.push({id:Date.now(),semIni:semIni,amount:amt,paid:false});}
      if(!state.renta)state.renta={};
      state.renta[getRentaKey(nextRentY,nextRentM)]=aportesList;
      save();
    });
  });

}

      var c=calcMonth(mp.y,mp.m);

      return{label:MESES[mp.m].slice(0,3),val:c.tb,paid:c.pb};
    });

      var bData=months2.map(function(mp){

      });
      var bHtml='<div class="vbar-wrap">';
      bData.forEach(function(d){
        var pct=maxA>0?Math.round(d.val/maxA*100):0;

          '<span class="vbar-lbl">'+d.label+'</span>'+
        '</div>';
      });
      bHtml+='</div>';
      document.getElementById('barWrap').innerHTML=bHtml;
    }
    drawBarBill(sel.value);
    sel.addEventListener('change',function(){drawBarBill(sel.value);});
  }
}

function saveCats(cats){state.categories=cats;save();}

function getBillAmtForCat(y,m,billId){
  var b=BILLS.find(function(x){return x.id===billId;});
  if(b){if(isBillCancelled(b.id)||isBillSkippedMonth(y,m,b.id))return 0;var found=mBills(y,m).find(function(x){return x.id===billId;});if(!found)return 0;return getBD(y,m,found).amount;}
  var wb=WKL.find(function(x){return x.id===billId;});
  if(wb){var tues=getTues(y,m);return tues.reduce(function(a,day){return a+getWD(y,m,day,wb).amount;},0);}
  var cb=(state.customBills||[]).find(function(x){return x.id===billId;});
  if(cb&&getCustomBills(y,m).find(function(x){return x.id===billId;}))return cb.amount;
  return 0;
}
function getAllBillIds(){
  var ids=BILLS.map(function(b){return b.id;});
  WKL.forEach(function(w){ids.push(w.id);});
  (state.customBills||[]).forEach(function(c){ids.push(c.id);});
  return ids;
}
function getAllBillName(id){
  var b=BILLS.find(function(x){return x.id===id;});if(b)return b.name;
  var w=WKL.find(function(x){return x.id===id;});if(w)return w.name;
  var c=(state.customBills||[]).find(function(x){return x.id===id;});if(c)return c.name;
  return id;
}
function drawPie(canvas,data){
  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=Math.min(W,H)/2-4;
  ctx.clearRect(0,0,W,H);
  var total=data.reduce(function(a,d){return a+d.val;},0);if(total===0)return;
  var angle=-Math.PI/2;
  data.forEach(function(d){var slice=2*Math.PI*(d.val/total);ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();ctx.fillStyle=d.color;ctx.fill();angle+=slice;});
  ctx.beginPath();ctx.arc(cx,cy,r*0.55,0,2*Math.PI);ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--bg2')||'#1c1c1e';ctx.fill();
}

      var curBadge=d.isCur?'<span style="font-size:9px;background:var(--orange);color:#fff;border-radius:4px;padding:1px 5px;margin-left:4px">actual</span>':'';
      html+='<div class="sem-bar-col" data-semini="'+semsDelMes[i].inicio+'" data-semfin="'+semsDelMes[i].fin+'" data-semnum="'+d.num+'" style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg3);border-radius:8px;cursor:pointer">'+

  }
