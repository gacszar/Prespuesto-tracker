    document.querySelectorAll('.cat-leg-row').forEach(function(row){row.addEventListener('click',function(){openCatEdit(row.dataset.catid);});});

      var maxA=0;
      var bData=months2.map(function(mp){var amt=getBillAmtForCat(mp.y,mp.m,bid);if(amt>maxA)maxA=amt;return{label:MESES[mp.m].slice(0,3),val:amt};});

function showSemDesglose(semIni,semFin,semNum){
  var MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var ls=new Date(semIni+'T12:00:00'),le=new Date(semFin+'T12:00:00');
  var semLabel=ls.getDate()+' '+MS[ls.getMonth()]+' – '+le.getDate()+' '+MS[le.getMonth()];

  var g=calcGastosSem(semIni,semFin);
  var rows=g.rows,total=g.tb;

  var html='';
  if(rows.length===0){
    html='<div style="font-size:13px;color:var(--text2);padding:10px 0">Sin gastos registrados esta semana.</div>';
  } else {
    rows.forEach(function(r){
      var paidStyle=r.paid?'text-decoration:line-through;opacity:.5':'';
      var paidBadge=r.paid?'<span style="font-size:9px;background:var(--green-bg);color:var(--green-text);border-radius:4px;padding:1px 5px;margin-left:4px">pagado</span>':'';
      html+='<div class="sum-detail-row">'+
        '<div><div class="sum-detail-name" style="'+paidStyle+'">'+r.name+paidBadge+'</div>'+
        '<div class="sum-detail-sub">'+r.sub+'</div></div>'+
        '<span class="sum-detail-amt" style="color:'+(r.paid?'var(--green)':'var(--orange)')+'">'+fmt(r.amt)+'</span>'+
      '</div>';
    });
    html+='<div class="sum-detail-total"><span>Total</span><span>'+fmt(total)+'</span></div>';
  }

  document.getElementById('sumDetailTitle').textContent='📅 Sem '+semNum+' — '+semLabel;
  document.getElementById('sumDetailBody').innerHTML=html;
  document.getElementById('sumDetailBg').classList.add('open');
}

function openCatEdit(catId){
  var cats=getCats();
  var cat=catId?cats.find(function(c){return c.id===catId;}):null;
  catEditIdx=catId?cats.indexOf(cat):-1;
  document.getElementById('catEditTitle').textContent=cat?'Editar: '+cat.name:'Nueva categoría';
  document.getElementById('catEditName').value=cat?cat.name:'';
  // List all bills with checkboxes
  var allIds=getAllBillIds();
  var selectedBills=cat?cat.bills.slice():[];
  var html='';
  allIds.forEach(function(id){
    var nm=getAllBillName(id);
    var checked=selectedBills.indexOf(id)>=0;
    html+='<div class="cat-bill-item">'+
      '<input type="checkbox" class="cat-bill-chk" data-bid="'+id+'"'+(checked?' checked':'')+'>'+
      '<span style="font-size:13px;color:var(--text1)">'+nm+'</span>'+
    '</div>';
  });
  document.getElementById('catEditBills').innerHTML=html;
  document.getElementById('catEditBg').classList.add('open');
}

document.getElementById('catEditSave').addEventListener('click',function(){
  var cats=getCats();
  var name=document.getElementById('catEditName').value.trim();
  if(!name){alert('Escribe un nombre.');return;}
  var bills=[];
  document.querySelectorAll('.cat-bill-chk:checked').forEach(function(chk){bills.push(chk.dataset.bid);});
  if(catEditIdx>=0){
    cats[catEditIdx].name=name;
    cats[catEditIdx].bills=bills;
  } else {
    var colors=['#af52de','#ff3b30','#5ac8fa','#4cd964','#ff9500','#8e8e93'];
    var usedColors=cats.map(function(c){return c.color;});
    var newColor=colors.find(function(c){return usedColors.indexOf(c)<0;})||'#8e8e93';
    cats.push({id:'cat_'+Date.now(),name:name,color:newColor,bills:bills});
  }
  saveCats(cats);
  document.getElementById('catEditBg').classList.remove('open');
  rGraficas();
});
document.getElementById('catEditCancel').addEventListener('click',function(){document.getElementById('catEditBg').classList.remove('open');});

function getMetas(){return state.metas||[];}
function saveMetas(m){state.metas=m;save();}
function addMeta(m){var ms=getMetas();m.id='meta_'+Date.now();m.aportes=[];ms.push(m);saveMetas(ms);}
function delMeta(id){saveMetas(getMetas().filter(function(m){return m.id!==id;}));}
function addMetaAporte(id,amt,nota){
  var ms=getMetas();
  var m=ms.find(function(x){return x.id===id;});
  if(!m)return;
  if(!m.aportes)m.aportes=[];
  m.aportes.push({id:Date.now(),fecha:todayISO(),amount:amt,nota:nota||''});
  saveMetas(ms);
}
function delMetaAporte(metaId,aId){
  var ms=getMetas();
  var m=ms.find(function(x){return x.id===metaId;});
  if(!m)return;
  m.aportes=m.aportes.filter(function(a){return a.id!==aId;});
  saveMetas(ms);
}

function rSubs(){

  // Juntar bills fijos que sean suscripciones + bills personalizados
  var allSubs=[];
  BILLS.forEach(function(b){
    if(SUB_IDS.indexOf(b.id)>=0&&!isBillCancelled(b.id)){
      var bd=getBD(y,m,b);
      var amt=bd.amount&&!isNaN(bd.amount)?bd.amount:(b.baseAmount||b.amount||0);
      allSubs.push({id:b.id,name:b.name,day:getBillDay(y,m,b),amount:Number(amt),pay:b.pay||'',isCustom:false,paid:bd.paid});
    }
  });
  // Custom bills marcados como suscripcion
  (state.customBills||[]).forEach(function(b){

      allSubs.push({id:b.id,name:b.name,day:b.day,amount:b.amount,pay:b.pay||'',isCustom:true,paid:false});

    '</div>'+
    '<button id="addSubBtn" style="background:var(--blue);border:none;border-radius:20px;padding:6px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">+ Nueva</button>'+

  html+='<div style="display:flex;flex-direction:column;gap:8px">';

    html+='<div style="background:var(--bg2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)">'+
      '<div style="flex:1">'+
        '<div style="font-size:14px;font-weight:600;color:var(--text1)">'+sub.name+'</div>'+
        '<div style="font-size:11px;color:var(--text2);margin-top:2px">Día '+sub.day+(sub.pay?' · '+sub.pay:'')+'</div>'+
      '</div>'+
      '<span style="font-size:15px;font-weight:700;color:var(--text1)">'+fmt(sub.amount)+'</span>'+
      '<button class="sub-del-btn" data-id="'+sub.id+'" data-name="'+sub.name+'" data-iscustom="'+(sub.isCustom?'1':'0')+'" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;font-family:inherit;padding:0 2px">🗑</button>'+
    '</div>';
  });
  html+='</div>';

  document.getElementById('subsView').innerHTML=html;

  // Add sub button — opens add modal with isSub flag
  document.getElementById('addSubBtn').addEventListener('click',function(){
    openAddModal(null,true);
  });

  // Delete sub
  document.querySelectorAll('.sub-del-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var id=btn.getAttribute('data-id');
      var name=btn.getAttribute('data-name');

    });
  });
}

function rMetas(){
  var metas=getMetas();
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
    '<div style="font-size:16px;font-weight:700;color:var(--text1)">Metas de ahorro</div>'+
    '<button id="addMetaBtn" style="background:var(--blue);border:none;border-radius:20px;padding:6px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">+ Nueva</button>'+
  '</div>';

  if(metas.length===0){
    html+='<div class="meta-empty">🎯<br><br>No tienes metas aún.<br>Toca "+ Nueva" para crear una.</div>';
  } else {
    metas.forEach(function(meta){
      var total=( meta.aportes||[]).reduce(function(a,x){return a+Number(x.amount);},0);
      var pct=meta.monto>0?Math.min(100,Math.round(total/meta.monto*100)):0;
      var falta=Math.max(0,meta.monto-total);
      var done=total>=meta.monto;
      // Days remaining
      var diasRestantes='';
      var sugerido='';
      if(meta.fecha){
        var hoy=new Date();
        var fechaObj=new Date(meta.fecha+'T12:00:00');
        var dias=Math.ceil((fechaObj-hoy)/(1000*60*60*24));
        diasRestantes=dias>0?dias+' días':dias===0?'¡Hoy!':'Vencida';
        var semsRest=Math.ceil(dias/7);
        if(semsRest>0&&falta>0)sugerido=fmt(Math.ceil(falta/semsRest))+'/sem';
      }
      html+='<div class="meta-card">'+
        '<div class="meta-card-header">'+
          '<div>'+
            '<div class="meta-card-title">'+(meta.icon||'🎯')+' '+meta.name+'</div>'+
            (meta.desc?'<div class="meta-card-desc">'+meta.desc+'</div>':'')+
          '</div>'+
          '<button class="meta-card-del" data-metaid="'+meta.id+'">✏️</button>'+
        '</div>'+
        '<div class="meta-progress-row">'+
          '<span class="meta-aportado" style="color:'+(done?'var(--green)':'var(--text1)')+'">'+fmt(total)+'</span>'+
          '<span class="meta-objetivo">de '+fmt(meta.monto)+' meta</span>'+
        '</div>'+
        '<div class="meta-pbw"><div class="meta-pbf'+(done?' done':'')+'" style="width:'+pct+'%"></div></div>'+
        '<div class="meta-stats">'+
          '<div class="meta-stat"><div class="meta-stat-lbl">Faltan</div><div class="meta-stat-val" style="color:'+(done?'var(--green)':'var(--orange)')+'">'+( done?'✓':fmt(falta))+'</div></div>'+
          '<div class="meta-stat"><div class="meta-stat-lbl">'+(meta.fecha?'Tiempo':'Progreso')+'</div><div class="meta-stat-val">'+( meta.fecha?diasRestantes:pct+'%')+'</div></div>'+
          '<div class="meta-stat"><div class="meta-stat-lbl">Sugerido</div><div class="meta-stat-val" style="color:var(--orange)">'+(sugerido||pct+'%')+'</div></div>'+
        '</div>';

      // Aportes
      if(meta.aportes&&meta.aportes.length>0){
        html+='<div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px">Aportaciones</div>';
        meta.aportes.slice().reverse().forEach(function(a){
          html+='<div class="meta-aporte-row">'+
            '<span style="color:var(--text2);flex-shrink:0">'+fmtDate(a.fecha)+'</span>'+
            '<span style="flex:1;padding:0 6px;color:var(--text2)">'+( a.nota||'Aporte')+'</span>'+
            '<span style="color:var(--green);font-weight:600">'+fmt(a.amount)+'</span>'+
            '<button style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;margin-left:6px;font-family:inherit" data-metaid="'+meta.id+'" data-aporteid="'+a.id+'">×</button>'+
          '</div>';
        });
      }

      // Add aporte form
      html+='<div class="meta-add-form">'+
        '<input type="number" placeholder="Monto" min="0" step="10" id="mamt_'+meta.id+'">'+
        '<input type="text" placeholder="Nota (opcional)" id="mnota_'+meta.id+'" style="max-width:110px">'+
        '<button class="meta-add-btn" data-metaid2="'+meta.id+'">+ Agregar</button>'+
      '</div>';

      html+='</div>';
    });
  }

  document.getElementById('metasView').innerHTML=html;

  // Add meta button
  document.getElementById('addMetaBtn').addEventListener('click',function(){openMetaModal(null);});

  // Edit meta
  document.querySelectorAll('.meta-card-del').forEach(function(btn){
    btn.addEventListener('click',function(){
      var meta=getMetas().find(function(m){return m.id===btn.dataset.metaid;});
      if(meta)openMetaModal(meta);
    });
  });

  // Delete aporte
  document.querySelectorAll('[data-aporteid]').forEach(function(btn){
    btn.addEventListener('click',function(){
      delMetaAporte(btn.dataset.metaid,parseInt(btn.dataset.aporteid));
      rMetas();
    });
  });

  // Add aporte
  document.querySelectorAll('[data-metaid2]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=btn.dataset.metaid2;
      var amt=parseFloat(document.getElementById('mamt_'+id).value)||0;
      var nota=document.getElementById('mnota_'+id).value.trim();
      if(!amt)return;
      addMetaAporte(id,amt,nota);
      rMetas();
    });
  });
}

function calcGastosSem(semIni,semFin){
  // Función unificada que calcula gastos de una semana incluyendo customBills
  // Retorna: {tb, pb, rows} donde rows es array de {name,sub,amt,paid}
  var tb=0,pb=0,rows=[];
  var diasN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var d=new Date(semIni+'T12:00:00');
  var fin=new Date(semFin+'T12:00:00');
  while(d<=fin){
    var dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
    var dLabel=diasN[d.getDay()]+' '+dd+' '+MS[dm];
    // Bills fijos
    mBills(dy,dm).forEach(function(b){
      if(getBillDay(dy,dm,b)===dd&&!b.memo&&b.special!=='renta'){
        var bd=getBD(dy,dm,b);
        tb+=bd.amount;if(bd.paid)pb+=bd.amount;
        rows.push({name:b.name,sub:dLabel+(b.pay&&b.pay!=='—'?' · '+b.pay:''),amt:bd.amount,paid:bd.paid});
      }
    });
    // Custom bills (agregados manualmente)
    getCustomBills(dy,dm).forEach(function(b){
      if(b.day===dd){
        var paid=!!(state.customPaid&&state.customPaid[dy+'_'+dm+'_'+b.id]);
        var amt=Number(b.amount)||0;
        tb+=amt;if(paid)pb+=amt;
        rows.push({name:b.name,sub:dLabel+(b.pay&&b.pay!=='—'?' · '+b.pay:''),amt:amt,paid:paid});
      }
    });
    // Semanales (martes)
    if(d.getDay()===2){
      WKL.forEach(function(wb){
        var wd=getWD(dy,dm,dd,wb);
        tb+=wd.amount;if(wd.paid)pb+=wd.amount;
        rows.push({name:wb.name,sub:dLabel+(wb.pay?' · '+wb.pay:''),amt:wd.amount,paid:wd.paid});
      });
      var rd=getWD(dy,dm,dd,REGALO);
      tb+=rd.amount;if(rd.paid)pb+=rd.amount;
      rows.push({name:'🎁 '+REGALO.name,sub:dLabel,amt:rd.amount,paid:rd.paid});
    }
    d.setDate(d.getDate()+1);
  }
  return{tb:tb,pb:pb,rows:rows};
}

function calcSemConOffset(offset){
  var t=todayISO();
  var allSems=genAll(),curSem=null,curIdx=-1;
  for(var i=0;i<allSems.length;i++){if(allSems[i].inicio<=t&&allSems[i].fin>=t){curSem=allSems[i];curIdx=i;break;}}
  if(!curSem){for(var i=0;i<allSems.length;i++){if(allSems[i].fin<t){curSem=allSems[i];curIdx=i;}}}
  if(!curSem)return null;
  var targetIdx=curIdx+offset;
  if(targetIdx<0||targetIdx>=allSems.length)return null;
  var targetSem=allSems[targetIdx];

  var g=calcGastosSem(targetSem.inicio,targetSem.fin);
  var tb=g.tb,pb=g.pb,ti=0;

  // Ingresos
  var incSemIdx=targetIdx-2;
  if(incSemIdx>=0){var semP=getSemP(allSems[incSemIdx].inicio);ti=semP.reduce(function(a,p){return a+Number(p.amount);},0);}
  var MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var ls=new Date(targetSem.inicio+'T12:00:00'),de=new Date(targetSem.fin+'T12:00:00');
  var semLabel=ls.getDate()+' '+MS[ls.getMonth()]+' – '+de.getDate()+' '+MS[de.getMonth()];
  return{tb:tb,pb:pb,pend:tb-pb,ti:ti,bal:ti-tb,semLabel:semLabel,semIni:targetSem.inicio,semFin:targetSem.fin,idx:targetIdx,total:allSems.length};
}

    if(isSem){
      // Cheque payments from 2 weeks ago
      var allSemsD=genAll(),curIdxD=-1,tD=todayISO();
      for(var i=0;i<allSemsD.length;i++){if(allSemsD[i].inicio<=tD&&allSemsD[i].fin>=tD){curIdxD=i;break;}}
      if(curIdxD<0){for(var i=0;i<allSemsD.length;i++){if(allSemsD[i].fin<tD)curIdxD=i;}}
      var incSemIdxD=curIdxD-2;
      if(incSemIdxD>=0){
        var semPD=getSemP(allSemsD[incSemIdxD].inicio);
        var MS_INC=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
        semPD.forEach(function(p){
          var pParts=(p.nota||'Pago').split(' ');
          var fechaFmt='';
          if(p.fecha){var fp=p.fecha.split('-');fechaFmt=parseInt(fp[2])+' '+MS_INC[parseInt(fp[1])-1];}
          var metodo=pParts[1]||'';
          var sub=(metodo?metodo+' · ':'')+fechaFmt;
          rows.push({name:pParts[0]||'Pago',sub:sub,amt:Number(p.amount),color:'var(--green)'});
        });
      }
    } else {
      // All cheque payments this month
      var allSemsM=genAll();
      var MS_INC2=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      allSemsM.forEach(function(sem){
        var semP2=getSemP(sem.inicio);
        semP2.forEach(function(p){
          var py=parseInt(p.fecha.slice(0,4)),pm=parseInt(p.fecha.slice(5,7))-1;
          if(py===y&&pm===m){
            var pParts2=(p.nota||'Pago').split(' ');
            var fechaFmt2='';
            if(p.fecha){var fp2=p.fecha.split('-');fechaFmt2=parseInt(fp2[2])+' '+MS_INC2[parseInt(fp2[1])-1];}
            var metodo2=pParts2[1]||'';
            var sub2=(metodo2?metodo2+' · ':'')+fechaFmt2;
            rows.push({name:pParts2[0]||'Pago',sub:sub2,amt:Number(p.amount),color:'var(--green)'});
          }
        });
      });
    }
  } else if(type==='gastos'||type==='pagado'||type==='pendiente'){
    title=type==='gastos'?'💸 Gastos':type==='pagado'?'✅ Pagado':'⏳ Pendiente';
    var onlyPaid=type==='pagado';
    var onlyPend=type==='pendiente';

    if(isSem){
      var allSemsG=genAll(),tG=todayISO(),curSemG=null;
      for(var i=0;i<allSemsG.length;i++){if(allSemsG[i].inicio<=tG&&allSemsG[i].fin>=tG){curSemG=allSemsG[i];break;}}
      if(!curSemG){for(var i=0;i<allSemsG.length;i++){if(allSemsG[i].fin<tG)curSemG=allSemsG[i];}}
      // Override with custom range if set
      if(gastoRangeFrom&&gastoRangeTo){
        curSemG={inicio:gastoRangeFrom,fin:gastoRangeTo};
      }
      if(curSemG){
        var d=new Date(curSemG.inicio+'T12:00:00');
        var finD2=new Date(curSemG.fin+'T12:00:00');
        while(d<=finD2){
          var dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
          mBills(dy,dm).forEach(function(b){
            if(getBillDay(dy,dm,b)===dd&&!b.memo&&b.special!=='renta'){
              var bd=getBD(dy,dm,b);
              if(onlyPaid&&!bd.paid||onlyPend&&bd.paid)return;
              rows.push({name:b.name,sub:'día '+dd+' · '+(b.pay||''),amt:bd.amount,color:bd.paid?'var(--green)':'var(--orange)'});
            }
          });
          getCustomBills(dy,dm).forEach(function(b){
            if(b.day===dd){
              var paid=!!(state.customPaid&&state.customPaid[dy+'_'+dm+'_'+b.id]);
              var amt=Number(b.amount)||0;
              if(onlyPaid&&!paid||onlyPend&&paid)return;
              rows.push({name:b.name,sub:'día '+dd+' · '+(b.pay||''),amt:amt,color:paid?'var(--green)':'var(--orange)'});
            }
          });
          if(d.getDay()===2){
            WKL.forEach(function(wb){
              var wd=getWD(dy,dm,dd,wb);
              if(onlyPaid&&!wd.paid||onlyPend&&wd.paid)return;
              rows.push({name:wb.name,sub:'martes · '+(wb.pay||''),amt:wd.amount,color:wd.paid?'var(--green)':'var(--orange)'});
            });
            var rd=getWD(dy,dm,dd,REGALO);
            if(!(onlyPaid&&!rd.paid||onlyPend&&rd.paid))
              rows.push({name:REGALO.name,sub:'martes · CashApp',amt:rd.amount,color:rd.paid?'var(--green)':'var(--orange)'});
          }
          d.setDate(d.getDate()+1);
        }
        // Renta apartada de esta semana (semResumenRenta)
        var semIniKeyD=curSemG.inicio;
        var rentaApartadaD=(state.semResumenRenta&&state.semResumenRenta[semIniKeyD])||0;
        if(rentaApartadaD>0){
          // Verificar si está pagada en Mi Renta
          var rentaPaidD=false;
          var todayRD=new Date();
          var rMD=todayRD.getDate()<=10?todayRD.getMonth():todayRD.getMonth()+1;
          var rYD=todayRD.getFullYear();if(rMD>11){rMD=0;rYD++;}
          var rentaKeyD=getRentaKey(rYD,rMD);
          var rentaAportesD=state.renta&&state.renta[rentaKeyD]?state.renta[rentaKeyD]:[];
          // Buscar el martes de esta semana
          var dRT=new Date(semIniKeyD+'T12:00:00'),finRT=new Date(curSemG.fin+'T12:00:00');
          while(dRT<=finRT){
            if(dRT.getDay()===2){
              var tueISOD=dRT.getFullYear()+'-'+String(dRT.getMonth()+1).padStart(2,'0')+'-'+String(dRT.getDate()).padStart(2,'0');
              var ra=rentaAportesD.find(function(a){return a.semIni===tueISOD;});
              if(ra&&ra.paid)rentaPaidD=true;
              break;
            }
            dRT.setDate(dRT.getDate()+1);
          }
          if(onlyPaid&&!rentaPaidD||onlyPend&&rentaPaidD){}
          else rows.push({name:'Renta apartada',sub:'esta semana',amt:rentaApartadaD,color:rentaPaidD?'var(--green)':'var(--orange)'});
        }
      }
    } else {
      mBills(y,m).forEach(function(b){
        if(b.memo||b.special==='renta')return;
        var bd=getBD(y,m,b);
        if(onlyPaid&&!bd.paid||onlyPend&&bd.paid)return;
        rows.push({name:b.name,sub:'día '+getBillDay(y,m,b)+' · '+(b.pay||''),amt:bd.amount,color:bd.paid?'var(--green)':'var(--orange)'});
      });
      getCustomBills(y,m).forEach(function(b){
        var paid=!!(state.customPaid&&state.customPaid[y+'_'+m+'_'+b.id]);
        var amt=Number(b.amount)||0;
        if(onlyPaid&&!paid||onlyPend&&paid)return;
        rows.push({name:b.name,sub:'día '+b.day+' · '+(b.pay||''),amt:amt,color:paid?'var(--green)':'var(--orange)'});
      });
      var tues2=getTues(y,m);
      tues2.forEach(function(day){
        WKL.forEach(function(wb){
          var wd=getWD(y,m,day,wb);
          if(onlyPaid&&!wd.paid||onlyPend&&wd.paid)return;
          rows.push({name:wb.name,sub:'martes '+day+' · '+(wb.pay||''),amt:wd.amount,color:wd.paid?'var(--green)':'var(--orange)'});
        });
        var rd2=getWD(y,m,day,REGALO);
        if(!(onlyPaid&&!rd2.paid||onlyPend&&rd2.paid))
          rows.push({name:REGALO.name,sub:'martes '+day,amt:rd2.amount,color:rd2.paid?'var(--green)':'var(--orange)'});
      });
      // Agregar renta del mes
      var rentaMontoM=rentaAmt(y,m);
      var todayDMS=new Date();
      var rMMS=todayDMS.getDate()<=10?todayDMS.getMonth():todayDMS.getMonth()+1;
      var rYMS=todayDMS.getFullYear();if(rMMS>11){rMMS=0;rYMS++;}
      if(rYMS===y&&rMMS===m){
        var rentaKeyMS=getRentaKey(rYMS,rMMS);
        var rentaAportesMS=state.renta&&state.renta[rentaKeyMS]?state.renta[rentaKeyMS]:[];
        var rentaPagadoMS=rentaAportesMS.filter(function(a){return a.paid;}).reduce(function(s,a){return s+Number(a.amount)||0;},0);
        var isPaidRenta=rentaPagadoMS>=rentaMontoM;
        if(!onlyPend||!isPaidRenta)
          if(!onlyPaid||isPaidRenta)
            rows.push({name:'Renta',sub:'meta del mes · Cash',amt:rentaMontoM,color:isPaidRenta?'var(--green)':'var(--orange)'});
      } else {
        if(!onlyPaid&&!onlyPend)
          rows.push({name:'Renta',sub:'meta del mes · Cash',amt:rentaMontoM,color:'var(--text2)'});
      }
    }
  }

  var total=rows.reduce(function(a,r){return a+r.amt;},0);
  var html='';
  rows.forEach(function(r){
    html+='<div class="sum-detail-row">'+
      '<div><div class="sum-detail-name">'+r.name+'</div><div class="sum-detail-sub">'+r.sub+'</div></div>'+
      '<span class="sum-detail-amt" style="color:'+r.color+'">'+fmt(r.amt)+'</span>'+
    '</div>';
  });
  if(rows.length===0)html='<div style="color:var(--text2);font-size:13px;padding:10px 0">Sin registros</div>';
  html+='<div class="sum-detail-total"><span>Total</span><span>'+fmt(total)+'</span></div>';

  var titleLabel=title;
  if(isSem&&gastoRangeFrom&&gastoRangeTo&&(type==='gastos'||type==='pagado'||type==='pendiente')){
    var MS2=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    var df=new Date(gastoRangeFrom+'T12:00:00'),dt=new Date(gastoRangeTo+'T12:00:00');
    titleLabel=title+' · '+df.getDate()+' '+MS2[df.getMonth()]+' – '+dt.getDate()+' '+MS2[dt.getMonth()];
  } else {
    titleLabel=title+' — '+(isSem?'esta semana':'este mes');
  }
  document.getElementById('sumDetailTitle').textContent=titleLabel;
  // Add date range picker for gastos in sem mode
  var pickerHtml='';
  if(isSem&&(type==='gastos'||type==='pagado'||type==='pendiente')){
    var tNowR=todayISO();
    var fromVal=gastoRangeFrom||tNowR;
    var toVal=gastoRangeTo||tNowR;
    pickerHtml='<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;padding:8px;background:var(--bg3);border-radius:10px">'+
      '<div style="flex:1"><div style="font-size:10px;color:var(--text2);margin-bottom:3px">Desde</div>'+
      '<input type="date" id="gastoFrom" value="'+fromVal+'" style="width:100%;font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text1);font-family:inherit"></div>'+
      '<div style="flex:1"><div style="font-size:10px;color:var(--text2);margin-bottom:3px">Hasta</div>'+
      '<input type="date" id="gastoTo" value="'+toVal+'" style="width:100%;font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text1);font-family:inherit"></div>'+
      '<button id="gastoRangeReset" style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:11px;font-family:inherit;padding:4px;margin-top:12px">Reset</button>'+
    '</div>';
  }
  document.getElementById('sumDetailBody').innerHTML=pickerHtml+html;
  // Attach date range listeners
  var fromInp=document.getElementById('gastoFrom');
  var toInp=document.getElementById('gastoTo');
  var resetBtn2=document.getElementById('gastoRangeReset');
  if(fromInp)fromInp.addEventListener('change',function(){gastoRangeFrom=fromInp.value;gastoRangeTo=toInp?toInp.value:gastoRangeTo;showSumDetail(type);});
  if(toInp)toInp.addEventListener('change',function(){gastoRangeTo=toInp.value;gastoRangeFrom=fromInp?fromInp.value:gastoRangeFrom;showSumDetail(type);});
  if(resetBtn2)resetBtn2.addEventListener('click',function(){gastoRangeFrom=null;gastoRangeTo=null;showSumDetail(type);});
  document.getElementById('sumDetailBg').classList.add('open');
}

// CANCELLED BILLS
function isBillCancelled(id){return (state.cancelledBills||[]).indexOf(id)>=0;}
function isBillSkippedMonth(y,m,id){return !!(state.skippedBills&&state.skippedBills[mk(y,m,1)+'_'+id]);}
function cancelBillPerm(id){if(!state.cancelledBills)state.cancelledBills=[];if(state.cancelledBills.indexOf(id)<0)state.cancelledBills.push(id);save();}
function restoreBill(id){state.cancelledBills=(state.cancelledBills||[]).filter(function(x){return x!==id;});save();}
function skipBillMonth(y,m,id){if(!state.skippedBills)state.skippedBills={};state.skippedBills[mk(y,m,1)+'_'+id]=true;save();}
function unskipBillMonth(y,m,id){if(state.skippedBills)delete state.skippedBills[mk(y,m,1)+'_'+id];save();}
// NOTIFICATION: bills del día siguiente
function getBillsForDay(dy,dm,dd){
  var bills=mBills(dy,dm).filter(function(b){return getBillDay(dy,dm,b)===dd;});
  var custom=getCustomBills(dy,dm).filter(function(b){return b.day===dd;});
  return bills.concat(custom);
}
function showNotif(){
  var today=new Date();
  var toy=today.getFullYear(),tom=today.getMonth(),tod=today.getDate();
  var tomorrow=new Date(today);tomorrow.setDate(today.getDate()+1);
  var ty=tomorrow.getFullYear(),tm=tomorrow.getMonth(),td=tomorrow.getDate();
  var dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var MESES_S=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  function buildBillRows(dy,dm,dd,isOverdue){
    var rows='';
    var bills=getBillsForDay(dy,dm,dd);
    var isMartes=new Date(dy,dm,dd).getDay()===2;
    bills.forEach(function(b){
      var bd=getBD(dy,dm,b);
      if(!bd.paid){
        if(isOverdue){
          rows+='<div class="notif-bill" style="background:var(--red);opacity:0.13;border-radius:8px;margin-bottom:3px;padding:0"></div>'+
            '<div class="notif-bill" style="border-left:3px solid var(--red);padding-left:8px;margin-bottom:4px">'+
            '<span class="notif-bill-name" style="color:var(--red)">'+b.name+' <span style="font-size:9px;background:var(--red);color:#fff;border-radius:4px;padding:1px 5px;font-weight:700">día '+dd+'</span></span>'+
            '<span class="notif-bill-amt" style="color:var(--red)">'+fmt(bd.amount)+'</span></div>';
        } else {
          rows+='<div class="notif-bill"><span class="notif-bill-name">'+b.name+'</span><span class="notif-bill-amt">'+fmt(bd.amount)+'</span></div>';
        }
      }
    });
    if(isMartes){
      WKL.forEach(function(wb){
        var wd=getWD(dy,dm,dd,wb);
        if(!wd.paid){
          if(isOverdue){
            rows+='<div class="notif-bill" style="border-left:3px solid var(--red);padding-left:8px;margin-bottom:4px">'+
              '<span class="notif-bill-name" style="color:var(--red)">'+wb.name+' <span style="font-size:9px;background:var(--red);color:#fff;border-radius:4px;padding:1px 5px;font-weight:700">día '+dd+'</span></span>'+
              '<span class="notif-bill-amt" style="color:var(--red)">'+fmt(wd.amount)+'</span></div>';
          } else {
            rows+='<div class="notif-bill"><span class="notif-bill-name">'+wb.name+'</span><span class="notif-bill-amt">'+fmt(wd.amount)+'</span></div>';
          }
        }
      });
      var rdN=getWD(dy,dm,dd,REGALO);
      if(!rdN.paid){
        if(isOverdue){
          rows+='<div class="notif-bill" style="border-left:3px solid var(--red);padding-left:8px;margin-bottom:4px">'+
            '<span class="notif-bill-name" style="color:var(--red)">🎁 '+REGALO.name+' <span style="font-size:9px;background:var(--red);color:#fff;border-radius:4px;padding:1px 5px;font-weight:700">día '+dd+'</span></span>'+
            '<span class="notif-bill-amt" style="color:var(--red)">'+fmt(rdN.amount)+'</span></div>';
        } else {
          rows+='<div class="notif-bill"><span class="notif-bill-name">🎁 '+REGALO.name+'</span><span class="notif-bill-amt">'+fmt(rdN.amount)+'</span></div>';
        }
      }
    }
    return rows;
  }

  // VENCIDOS: buscar últimos 7 días (sin contar hoy)
  var overdueRows='';
  for(var back=1;back<=7;back++){
    var pd=new Date(today);pd.setDate(today.getDate()-back);
    var py=pd.getFullYear(),pm=pd.getMonth(),pdd=pd.getDate();
    var r=buildBillRows(py,pm,pdd,true);
    if(r)overdueRows+=r;
  }

  var todayRows=buildBillRows(toy,tom,tod,false);
  var tomorrowRows=buildBillRows(ty,tm,td,false);

  var hasAnything=overdueRows||todayRows||tomorrowRows;

  var html='';

  // VENCIDOS
  if(overdueRows){
    html+='<div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">🔴 Vencidos — sin pagar</div>';
    html+=overdueRows;
    html+='<div style="height:4px;border-bottom:0.5px solid var(--border);margin-bottom:10px"></div>';
  }

  // HOY
  html+='<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">📌 Hoy — '+dias[today.getDay()]+' '+tod+' '+MESES_S[tom]+'</div>';
  html+=todayRows||'<div class="notif-empty">Sin bills hoy 🎉</div>';
  // MAÑANA
  html+='<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px">⏰ Mañana — '+dias[tomorrow.getDay()]+' '+td+' '+MESES_S[tm]+'</div>';
  html+=tomorrowRows||'<div class="notif-empty">Sin bills mañana 🎉</div>';

  document.getElementById('notifDate').textContent='';
  document.getElementById('notifBody').innerHTML=html;
  document.getElementById('notifBg').classList.add('open');
}
document.getElementById('notifClose').addEventListener('click',function(){
  document.getElementById('notifBg').classList.remove('open');
});
document.getElementById('notifBg').addEventListener('click',function(e){
  if(e.target===document.getElementById('notifBg'))document.getElementById('notifBg').classList.remove('open');
});

// CUSTOM BILLS
function getCustomBills(y,m){
  var all=state.customBills||[];
  return all.filter(function(b){
    if(b.freq==='monthly')return true;
    if(b.freq==='once')return b.onceY===y&&b.onceM===m;
    if(b.freq==='trimestral')return b.months&&b.months.indexOf(m)>=0;
    return false;
  });
}
function addCustomBill(bill){
  if(!state.customBills)state.customBills=[];
  bill.id='cb_'+Date.now();
  state.customBills.push(bill);save();
}
function delCustomBill(id){
  state.customBills=(state.customBills||[]).filter(function(b){return b.id!==id;});save();
}

// FAB add bill modal
var abFreq='monthly',abMonths=[];
var abReactivateId=null;
var abIsSub=false;

  document.getElementById('ab-months-wrap').style.display=abFreq==='trimestral'?'':'none';
  // Render month buttons with pre-selected months
  var mg=document.getElementById('ab-months');
  var MESES_AB=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  mg.innerHTML=MESES_AB.map(function(mn,i){
    return '<button class="add-month-btn'+(abMonths.indexOf(i)>=0?' sel':'')+'" data-mi="'+i+'">'+mn+'</button>';
  }).join('');
  mg.querySelectorAll('.add-month-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var mi=parseInt(btn.dataset.mi);
      var idx=abMonths.indexOf(mi);
      if(idx>=0)abMonths.splice(idx,1);else abMonths.push(mi);
      btn.classList.toggle('sel',abMonths.indexOf(mi)>=0);
    });
  });
  // Update title
  document.querySelector('.add-modal .modal-title').textContent=prefill?'Reactivar bill':'Agregar bill';
  document.getElementById('ab-save').textContent=prefill?'Reactivar':'Guardar bill';
  document.getElementById('addModalBg').classList.add('open');
}

document.getElementById('ab-save').addEventListener('click',function(){
  var name=document.getElementById('ab-name').value.trim();
  var day=parseInt(document.getElementById('ab-day').value)||0;
  var amt=parseFloat(document.getElementById('ab-amt').value)||0;
  var pay=document.getElementById('ab-pay').value.trim();
  if(!name||!day||!amt){alert('Completa nombre, día y monto.');return;}
  if(day<1||day>31){alert('El día debe ser entre 1 y 31.');return;}
  var bill={name:name,day:day,amount:amt,pay:pay,freq:abFreq,variable:false};
  if(abFreq==='trimestral'){
    if(abMonths.length===0){alert('Selecciona al menos un mes.');return;}
    bill.months=abMonths.slice();
  }
  if(abFreq==='once'){
    bill.onceY=cur.getFullYear();bill.onceM=cur.getMonth();
  }
  // Si estamos reactivando un bill fijo, quitarlo de cancelados y NO agregar como custom
  if(abReactivateId){
    var esFijo=BILLS.some(function(b){return b.id===abReactivateId;});
    if(esFijo){
      // Reactivar bill fijo: solo quitarlo de cancelados
      restoreBill(abReactivateId);
      // Si cambiaron día/monto, guardarlo como override para este mes
      var origBill=BILLS.find(function(b){return b.id===abReactivateId;});
      if(origBill&&day!==origBill.day){setDayOv(cur.getFullYear(),cur.getMonth(),abReactivateId,day);}
      if(origBill&&amt!==origBill.amount){setOv(cur.getFullYear(),cur.getMonth(),abReactivateId,'amount',amt);}
    } else {
      // Era custom: eliminarlo de cancelados y re-agregar con nuevos datos
      restoreBill(abReactivateId);
      delCustomBill(abReactivateId);
      addCustomBill(bill);
    }
    abReactivateId=null;
  } else {
    if(abIsSub)bill.isSub=true;
    addCustomBill(bill);
  }
  closeAddModal();
  render();
  if(abIsSub)setView('subs');
});

// Export/Import data
function exportData(){
  var data=localStorage.getItem(STOR)||'{}';
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='presupuesto_backup_'+todayISO()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importData(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.style.cssText='position:fixed;top:-100px;left:-100px;opacity:0';
  document.body.appendChild(inp);
  inp.addEventListener('change',function(){
    var file=inp.files[0];
    if(!file){document.body.removeChild(inp);return;}
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var text=e.target.result;
        var parsed=JSON.parse(text);
        localStorage.setItem(STOR,JSON.stringify(parsed));
        document.body.removeChild(inp);
        alert('✅ Datos importados correctamente. La app se recargará.');
        window.location.reload();
      }catch(err){
        document.body.removeChild(inp);
        alert('❌ Error: '+err.message);
      }
    };
    reader.onerror=function(){
      document.body.removeChild(inp);
      alert('❌ Error al leer el archivo');
    };
    reader.readAsText(file);
  });
  inp.click();
}
