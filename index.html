.paf{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:0.5px solid #f2f2f7;align-items:center}

<script>
var STOR='gabacs_v16';
var SUELDO=1250;
var MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var INICIO='2026-04-22';

function fmtDate(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+' '+MESES[parseInt(p[1])-1]+' '+p[0];}
function fmtCorto(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+' '+MESES[parseInt(p[1])-1];}
function toISO(d,m,y){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function fmt(v){return'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtS(v){return(v>=0?'+':'')+fmt(v);}
function mk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function addDays(iso,n){var d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function todayISO(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}

function getTues(y,m){var t=[],dim=new Date(y,m+1,0).getDate();for(var d=1;d<=dim;d++)if(new Date(y,m,d).getDay()===2)t.push(d);return t;}
function rentaAmt(y,m){return getTues(y,m).length>=5?600:800;}
function anitaAmt(y,m){if(y<2026||(y===2026&&m<=4))return 190;if(y===2026&&m>=5&&m<=7)return 170;return 125;}

function genAll(){var sems=[],ini=INICIO,lim='2027-12-31';while(ini<=lim){sems.push({inicio:ini,fin:addDays(ini,5)});ini=addDays(ini,7);}return sems;}
function semsForView(y,m){
  var ms=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var dim=new Date(y,m+1,0).getDate();
  var me=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dim).padStart(2,'0');
  return genAll().filter(function(s){return s.inicio>=addDays(ms,-14)&&s.inicio<=me;});
}
function getPayingSem(){
  var t=todayISO(),wa=addDays(t,-7),all=genAll();
  for(var i=0;i<all.length;i++){if(all[i].inicio<=wa&&all[i].fin>=wa)return all[i].inicio;}
  var last=null;for(var i=0;i<all.length;i++){if(all[i].fin<t)last=all[i].inicio;}return last;
}
function getCurPayWeekDays(y,m){
  var today=new Date(),dow=today.getDay();
  var daysFromWed=(dow>=3)?(dow-3):(dow+4);
  var wedStart=new Date(today);wedStart.setDate(today.getDate()-daysFromWed);
  var tueEnd=new Date(wedStart);tueEnd.setDate(wedStart.getDate()+6);
  var days={},dim=new Date(y,m+1,0).getDate();
  for(var d=1;d<=dim;d++){var dd=new Date(y,m,d);if(dd>=wedStart&&dd<=tueEnd)days[d]=true;}
  return days;
}
function buildPS(pfx){
  var now=new Date(),dO='',mO='',yO='';
  for(var i=1;i<=31;i++)dO+='<option value="'+i+'"'+(i===now.getDate()?' selected':'')+'>'+i+'</option>';
  MESES.forEach(function(m,i){mO+='<option value="'+(i+1)+'"'+(i+1===(now.getMonth()+1)?' selected':'')+'>'+m+'</option>';});
  for(var y=2026;y<=2028;y++)yO+='<option value="'+y+'"'+(y===now.getFullYear()?' selected':'')+'>'+y+'</option>';
  return '<select id="'+pfx+'D" style="width:48px">'+dO+'</select><select id="'+pfx+'M" style="flex:1">'+mO+'</select><select id="'+pfx+'Y" style="width:66px">'+yO+'</select>';
}

var BILLS=[
  {id:'asp1255',name:'Aspire 1255',day:1,amount:55,variable:false},
  {id:'tmob1',name:'T-Mobile #1',day:2,amount:240,variable:false},
  {id:'futuretv',name:'Future TV',day:3,amount:15,variable:false},
  {id:'surf',name:'Surfshark VPN',day:5,amount:12,variable:false},
  {id:'telcel',name:'Telcel',day:5,amount:12,variable:false},
  {id:'disney',name:'Disney+ México',day:7,amount:20,variable:false},
  {id:'starlink',name:'Starlink',day:8,amount:120,variable:false},
  {id:'renta',name:'Renta',day:8,amount:800,variable:false,special:'renta'},
  {id:'appstore',name:'App Store',day:11,amount:70,variable:true},
  {id:'amazon',name:'Amazon Prime',day:12,amount:17,variable:false},
  {id:'sewer',name:'Sewer',day:13,amount:50,variable:true},
  {id:'proyq',name:'Proyecto Q.',day:14,amount:100,variable:true},
  {id:'cap1',name:'Capital One',day:15,amount:30,variable:true},
  {id:'tmob2',name:'T-Mobile #2',day:17,amount:240,variable:false},
  {id:'detodotv',name:'DeTodoTV',day:18,amount:35,variable:false,quarterly:true,qMonths:[5,8,11],startYear:2026},
  {id:'agua',name:'Agua',day:20,amount:80,variable:true},
  {id:'amex',name:'AMEX',day:21,amount:30,variable:true},
  {id:'mlane',name:'Mission Lane',day:21,amount:30,variable:true},
  {id:'asp4276',name:'Aspire 4276',day:21,amount:50,variable:true},
  {id:'luz',name:'Luz',day:23,amount:400,variable:true},
  {id:'citi',name:'Citi',day:24,amount:160,variable:true},
  {id:'basura',name:'Basura',day:25,amount:60,variable:true},
  {id:'amazonmx',name:'Amazon Prime MX',day:28,amount:6,variable:false},
  {id:'superlatino',name:'Super Latino TV',day:28,amount:27,variable:false,quarterly:true,qMonths:[4,6,9],startYear:2026},
  {id:'anita',name:'Anita',day:30,amount:190,variable:true,special:'anita'},
];
var WKL=[{id:'despensa',name:'Despensa',amount:250},{id:'gasolina',name:'Gasolina',amount:40}];
var REGALO={id:'regalos',name:'Regalos (CashApp)',amount:40};

function mBills(y,m){
  return BILLS.filter(function(b){
    if(b.quarterly){if(b.startYear&&(y<b.startYear||(y===b.startYear&&m<b.qMonths[0])))return false;return b.qMonths.indexOf(m)>=0;}
    return true;
  }).map(function(b){
    var base=b.amount;
    if(b.special==='anita')base=anitaAmt(y,m);
    if(b.special==='renta')base=rentaAmt(y,m);
    return Object.assign({},b,{baseAmount:base});
  });
}
function getWeeks(y,m){var dim=new Date(y,m+1,0).getDate(),wks=[],wk=[];for(var d=1;d<=dim;d++){wk.push(d);if(new Date(y,m,d).getDay()===6||d===dim){wks.push(wk.slice());wk=[];}}return wks;}

var state={overrides:{},income:{},pagos:{},regalos:{}};
var cur=new Date();cur.setDate(1);
var viewMode='cal',modalDay=null;

function load(){try{var d=localStorage.getItem(STOR);if(d)state=JSON.parse(d);if(!state.pagos)state.pagos={};if(!state.regalos)state.regalos={};}catch(e){}}
function save(){try{localStorage.setItem(STOR,JSON.stringify(state));}catch(e){}}
function getOv(y,m,id,f){var k=mk(y,m,1)+'_'+id;return state.overrides[k]&&state.overrides[k][f];}
function setOv(y,m,id,f,v){var k=mk(y,m,1)+'_'+id;if(!state.overrides[k])state.overrides[k]={};state.overrides[k][f]=v;save();}
function getWOv(y,m,day,id,f){var k='w_'+mk(y,m,day)+'_'+id;return state.overrides[k]&&state.overrides[k][f];}
function setWOv(y,m,day,id,f,v){var k='w_'+mk(y,m,day)+'_'+id;if(!state.overrides[k])state.overrides[k]={};state.overrides[k][f]=v;save();}
function getBD(y,m,b){var a=getOv(y,m,b.id,'amount'),p=getOv(y,m,b.id,'paid');return{amount:Number(a!=null?a:b.baseAmount),paid:p?true:false};}
function getWD(y,m,day,wb){var a=getWOv(y,m,day,wb.id,'amount'),p=getWOv(y,m,day,wb.id,'paid');return{amount:Number(a!=null?a:wb.amount),paid:p?true:false};}
function getRegaloDone(y,m,day){return state.regalos['regalo_'+mk(y,m,day)]?true:false;}
function setRegaloDone(y,m,day,v){state.regalos['regalo_'+mk(y,m,day)]=v;save();}
function getDayInc(y,m,d){return(state.income[mk(y,m,d)]||[]);}
function getDayIncT(y,m,d){return getDayInc(y,m,d).reduce(function(a,e){return a+Number(e.amount);},0);}
function addInc(y,m,d,amt,note,fromCheque,pid){
  var k=mk(y,m,d);if(!state.income[k])state.income[k]=[];
  var e={id:pid||Date.now(),amount:Number(amt),note:note||'',fromCheque:fromCheque?true:false};
  if(pid)e.pagoId=pid;state.income[k].push(e);save();
}
function delInc(y,m,d,id){var k=mk(y,m,d);state.income[k]=(state.income[k]||[]).filter(function(e){return e.id!==id;});save();}
function delByPid(pid){Object.keys(state.income).forEach(function(k){state.income[k]=(state.income[k]||[]).filter(function(e){return e.pagoId!==pid;});});save();}
function getSK(ini){return'sem_'+ini;}
function getSemP(ini){return(state.pagos[getSK(ini)]||[]);}
function addSemP(ini,fecha,amt,nota){
  var k=getSK(ini),pid=Date.now();
  if(!state.pagos[k])state.pagos[k]=[];
  state.pagos[k].push({fecha:fecha,amount:amt,nota:nota,pagoId:pid});
  var p=fecha.split('-'),fy=parseInt(p[0]),fm=parseInt(p[1])-1,fd=parseInt(p[2]);
  var k2=mk(fy,fm,fd);if(!state.income[k2])state.income[k2]=[];
  state.income[k2].push({id:pid,amount:Number(amt),note:(nota?nota+' · ':'')+'Cheque',fromCheque:true,pagoId:pid});save();
}
function delSemP(ini,pi){
  var k=getSK(ini),pagos=state.pagos[k]||[],pago=pagos[pi];
  if(pago&&pago.pagoId)delByPid(pago.pagoId);
  pagos.splice(pi,1);state.pagos[k]=pagos;save();
}

function calcMonth(y,m){
  var tues=getTues(y,m),tb=0,pb=0,ti=0;
  mBills(y,m).forEach(function(b){var d=getBD(y,m,b);tb+=d.amount;if(d.paid)pb+=d.amount;});
  tues.forEach(function(day){WKL.forEach(function(wb){var d=getWD(y,m,day,wb);tb+=d.amount;if(d.paid)pb+=d.amount;});});
  var dim=new Date(y,m+1,0).getDate();
  for(var d=1;d<=dim;d++)ti+=getDayIncT(y,m,d);
  return{tb:tb,pb:pb,pend:tb-pb,ti:ti,bal:ti-tb};
}

function rSummary(){
  var y=cur.getFullYear(),m=cur.getMonth(),c=calcMonth(y,m),tues=getTues(y,m);
  document.getElementById('sg').innerHTML=
    '<div class="stat"><div class="stat-label">Ingresos</div><div class="stat-value info">'+fmt(c.ti)+'</div></div>'+
    '<div class="stat"><div class="stat-label">Gastos</div><div class="stat-value">'+fmt(c.tb)+'</div></div>'+
    '<div class="stat"><div class="stat-label">Balance</div><div class="stat-value '+(c.bal>=0?'ok':'bad')+'">'+fmt(c.bal)+'</div></div>'+
    '<div class="stat"><div class="stat-label">Pagado</div><div class="stat-value ok">'+fmt(c.pb)+'</div></div>'+
    '<div class="stat"><div class="stat-label">Pendiente</div><div class="stat-value '+(c.pend>0?'warn':'')+'">'+fmt(c.pend)+'</div></div>'+
    '<div class="stat"><div class="stat-label">Renta este mes</div><div class="stat-value" style="font-size:13px">'+fmt(rentaAmt(y,m))+'<span style="font-size:9px;color:#8e8e93;font-weight:400"> / '+(tues.length>=5?'5':'4')+' sem</span></div></div>';
}

function rCal(){
  var y=cur.getFullYear(),m=cur.getMonth(),today=new Date();
  var cwDays=getCurPayWeekDays(y,m);
  var days=['D','L','M','Mi','J','V','S'];
  var html='<div class="cal-grid">';
  days.forEach(function(d){html+='<div class="cal-hdr">'+d+'</div>';});
  var first=new Date(y,m,1).getDay();
  for(var i=0;i<first;i++)html+='<div class="cal-day empty"></div>';
  var dim=new Date(y,m+1,0).getDate();
  for(var d=1;d<=dim;d++){
    var isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var isTue=new Date(y,m,d).getDay()===2;
    var isCW=cwDays[d]?true:false;
    var monthly=mBills(y,m).filter(function(b){return b.day===d;});
    var weekly=isTue?WKL:[];
    var incT=getDayIncT(y,m,d),allItems=monthly.concat(weekly);
    var inner='<div class="day-num">'+d+'</div>';
    if(incT>0)inner+='<div class="income-bar">+'+fmt(incT)+'</div>';
    var shown=0,limit=incT>0?1:2;
    allItems.forEach(function(b){
      if(shown>=limit)return;
      var cls,paid;
      if(b.id==='despensa'||b.id==='gasolina'){var wd=getWD(y,m,d,b);paid=wd.paid;cls=paid?'paid':'weekly';}
      else{var bd=getBD(y,m,b);paid=bd.paid;cls=b.quarterly?'quarterly':(paid?'paid':'unpaid');}
      inner+='<div class="bill-dot '+cls+'">'+b.name+'</div>';shown++;
    });
    if(isTue&&shown<limit){var rDone=getRegaloDone(y,m,d);inner+='<div class="bill-dot memo'+(rDone?' paid':'')+'">🎁</div>';shown++;}
    var classes='cal-day';
    if(isToday)classes+=' today';else if(isTue)classes+=' tuesday';
    if(isCW)classes+=' cur-week';
    html+='<div class="'+classes+'" data-day="'+d+'">'+inner+'</div>';
  }
  html+='</div>';
  document.getElementById('calView').innerHTML=html;
  document.querySelectorAll('.cal-day:not(.empty)').forEach(function(el){
    el.addEventListener('click',function(){openModal(parseInt(el.dataset.day));});
  });
}

function rList(){
  var y=cur.getFullYear(),m=cur.getMonth(),tues=getTues(y,m),dim=new Date(y,m+1,0).getDate();
  var html='<div class="list-view"><div class="sec-title">Bills mensuales</div>';
  mBills(y,m).sort(function(a,b){return a.day-b.day;}).forEach(function(b){
    var bd=getBD(y,m,b);
    var qB=b.quarterly?'<span class="badge" style="background:#ede9fe;color:#5b21b6">trimestral</span>':'';
    var vB=b.variable?'<span class="badge" style="background:#fff3cd;color:#856404">variable</span>':'';
    var rB=b.special==='renta'?'<span class="badge" style="background:#dbeafe;color:#1d4ed8">'+(tues.length>=5?'5 sem':'4 sem')+'</span>':'';
    html+='<div class="list-item"><div class="li-day">'+b.day+'</div>'+
      '<div><div class="li-name'+(bd.paid?' done':'')+'">'+b.name+'</div><div class="li-sub">'+qB+vB+rB+'</div></div>'+
      '<div class="li-amt" id="la_'+b.id+'">'+fmt(bd.amount)+'</div>'+
      '<input type="checkbox" class="li-chk" data-id="'+b.id+'"'+(bd.paid?' checked':'')+'></div>';
  });
  html+='<div class="sec-title">Martes — semanal</div>';
  tues.forEach(function(day){
    WKL.forEach(function(wb){
      var wd=getWD(y,m,day,wb);
      html+='<div class="list-item"><div class="li-day">'+day+'</div>'+
        '<div><div class="li-name'+(wd.paid?' done':'')+'">'+wb.name+'</div><div class="li-sub"><span class="badge" style="background:#dcfce7;color:#166534">semanal</span></div></div>'+
        '<div class="li-amt">'+fmt(wd.amount)+'</div>'+
        '<input type="checkbox" class="li-chkw" data-day="'+day+'" data-id="'+wb.id+'"'+(wd.paid?' checked':'')+'></div>';
    });
    var rDone=getRegaloDone(y,m,day);
    html+='<div class="list-item memo-row"><div class="li-day">'+day+'</div>'+
      '<div><div class="li-name'+(rDone?' done':'')+'">🎁 '+REGALO.name+'</div>'+
      '<div class="li-sub"><span class="badge" style="background:#fce7f3;color:#9d174d">recordatorio</span></div></div>'+
      '<div class="li-amt memo">'+fmt(REGALO.amount)+'</div>'+
      '<input type="checkbox" class="li-chk-regalo memo-chk" data-day="'+day+'"'+(rDone?' checked':'')+'></div>';
  });
  html+='<div class="sec-title">Ingresos</div>';
  var hasInc=false;
  for(var d=1;d<=dim;d++){
    getDayInc(y,m,d).forEach(function(e){
      hasInc=true;
      var tag=e.fromCheque?'<span class="badge" style="background:#dcfce7;color:#166534;margin-left:3px">cheque</span>':'';
      html+='<div class="list-item inc-row"><div class="li-day">'+d+'</div>'+
        '<div><div class="li-name">'+(e.note||'Ingreso')+tag+'</div></div>'+
        '<div class="li-amt inc">+'+fmt(e.amount)+'</div><span></span></div>';
    });
  }
  if(!hasInc)html+='<div style="font-size:13px;color:#8e8e93;padding:10px 4px">Sin ingresos. Toca un día en el calendario.</div>';
  html+='</div>';
  document.getElementById('listView').innerHTML=html;
  document.querySelectorAll('.li-chk').forEach(function(chk){
    chk.addEventListener('change',function(){setOv(y,m,chk.dataset.id,'paid',chk.checked);rList();rSummary();rCal();});
  });
  document.querySelectorAll('.li-chkw').forEach(function(chk){
    chk.addEventListener('change',function(){setWOv(y,m,parseInt(chk.dataset.day),chk.dataset.id,'paid',chk.checked);rList();rSummary();rCal();});
  });
  document.querySelectorAll('.li-chk-regalo').forEach(function(chk){
    chk.addEventListener('change',function(){setRegaloDone(y,m,parseInt(chk.dataset.day),chk.checked);rList();rCal();});
  });
}

function rBal(){
  var y=cur.getFullYear(),m=cur.getMonth(),weeks=getWeeks(y,m);
  var html='<div class="tbl-wrap"><table class="wtbl"><thead><tr><th>Semana</th><th>Ingresos</th><th>Gastos</th><th>Bal.</th></tr></thead><tbody>';
  var gIn=0,gOut=0;
  weeks.forEach(function(wDays,i){
    var inc=0,out=0;
    wDays.forEach(function(d){
      inc+=getDayIncT(y,m,d);
      mBills(y,m).filter(function(b){return b.day===d;}).forEach(function(b){out+=getBD(y,m,b).amount;});
      if(new Date(y,m,d).getDay()===2)WKL.forEach(function(wb){out+=getWD(y,m,d,wb).amount;});
    });
    gIn+=inc;gOut+=out;var bal=inc-out,bc=bal>0?'pos':bal<0?'neg':'neu';
    html+='<tr><td>Sem '+(i+1)+' ('+wDays[0]+'–'+wDays[wDays.length-1]+')</td><td class="pos">'+fmt(inc)+'</td><td>'+fmt(out)+'</td><td class="'+bc+'">'+fmtS(bal)+'</td></tr>';
  });
  var gb=gIn-gOut;
  html+='<tr><td>Total</td><td class="pos">'+fmt(gIn)+'</td><td>'+fmt(gOut)+'</td><td class="'+(gb>=0?'pos':'neg')+'">'+fmtS(gb)+'</td></tr>';
  html+='</tbody></table></div>';
  document.getElementById('balView').innerHTML=html;
}

function rPagos(){
  var y=cur.getFullYear(),m=cur.getMonth();
  var sems=semsForView(y,m),payIni=getPayingSem(),t=todayISO();
  var ms=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var html='<div class="pagos-view"><div class="pag-title">Semanas laborales — sueldo '+fmt(SUELDO)+'/sem</div>';
  sems.forEach(function(sem){
    var pagos=getSemP(sem.inicio);
    var cobrado=pagos.reduce(function(a,p){return a+Number(p.amount);},0);
    var falta=Math.max(0,SUELDO-cobrado),pct=Math.min(100,Math.round(cobrado/SUELDO*100));
    var ok=cobrado>=SUELDO,isPaying=sem.inicio===payIni,isPast=sem.fin<t,isPrev=sem.inicio<ms;
    var bc=ok?'ok':cobrado>0?'par':'emp';
    var bt=ok?'Completo':cobrado>0?pct+'% cobrado':(isPast&&!isPaying?'Sin pagos':'Pendiente');
    var pfx='pf_'+sem.inicio.replace(/-/g,'');
    html+='<div class="sc'+(isPaying?' paying':'')+(isPrev?' prev-month':'')+'">'+
      '<div class="sch" data-ini="'+sem.inicio+'">'+
        '<div class="sc-left"><div class="sc-label">'+fmtCorto(sem.inicio)+' – '+fmtDate(sem.fin)+'</div>'+
        '<div class="sc-tags">'+(isPaying?'<span class="sc-tag paying">pagando ahora</span>':'')+
        (isPrev&&!isPaying?'<span class="sc-tag prev">mes anterior</span>':'')+
        '</div></div>'+
        '<div class="sc-right"><span class="sc-prog">'+fmt(cobrado)+' / '+fmt(SUELDO)+'</span><span class="sc-badge '+bc+'">'+bt+'</span></div>'+
      '</div>'+
      '<div class="sb'+(isPaying?' open':'')+'" id="sb_'+sem.inicio+'">'+
        '<div class="pbw"><div class="pbf'+(cobrado>SUELDO?' over':'')+'" style="width:'+pct+'%"></div></div>'+
        (pagos.length===0?'<div style="font-size:12px;color:#8e8e93;padding:4px 0 8px">Sin pagos aún.</div>':'')+
        pagos.map(function(p,pi){return '<div class="pr"><span class="pr-f">'+fmtDate(p.fecha)+'</span><span class="pr-n">'+(p.nota||'Pago')+'</span><span class="pr-a">'+fmt(p.amount)+'</span><button class="pr-d" data-ini="'+sem.inicio+'" data-pi="'+pi+'">×</button></div>';}).join('')+
        '<div class="str"><span style="color:#8e8e93">Falta</span><span style="'+(falta>0?'color:#ff9500':'color:#34c759')+'">'+
        (falta>0?fmt(falta):'✓ Completo')+'</span></div>'+
        '<div class="paf">'+buildPS(pfx)+
          '<input type="number" placeholder="Monto" min="0" step="0.01" id="pa_'+sem.inicio.replace(/-/g,'')+'" style="width:76px">'+
          '<input type="text" placeholder="Nota" id="pn_'+sem.inicio.replace(/-/g,'')+'" style="width:62px">'+
          '<button data-ini2="'+sem.inicio+'">+ Agregar</button></div>'+
        '<div style="font-size:10px;color:#8e8e93;margin-top:6px">Se refleja en el calendario automáticamente.</div>'+
      '</div></div>';
  });
  html+='</div>';
  document.getElementById('pagView').innerHTML=html;
  document.querySelectorAll('.sch').forEach(function(el){el.addEventListener('click',function(){var sb=document.getElementById('sb_'+el.dataset.ini);if(sb)sb.classList.toggle('open');});});
  document.querySelectorAll('[data-ini2]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var ini=btn.dataset.ini2,pfx='pf_'+ini.replace(/-/g,'');
      var pd=document.getElementById(pfx+'D'),pm=document.getElementById(pfx+'M'),py=document.getElementById(pfx+'Y');
      if(!pd||!pm||!py)return;
      var fecha=toISO(pd.value,pm.value,py.value);
      var amt=parseFloat(document.getElementById('pa_'+ini.replace(/-/g,'')).value)||0;
      var nota=document.getElementById('pn_'+ini.replace(/-/g,'')).value.trim();
      if(!amt)return;
      addSemP(ini,fecha,amt,nota);
      var oi=[];document.querySelectorAll('.sb.open').forEach(function(b){oi.push(b.id);});
      rPagos();rSummary();rCal();if(viewMode==='list')rList();if(viewMode==='balance')rBal();
      oi.forEach(function(id){var el=document.getElementById(id);if(el)el.classList.add('open');});
    });
  });
  document.querySelectorAll('.pr-d').forEach(function(btn){
    btn.addEventListener('click',function(){
      delSemP(btn.dataset.ini,parseInt(btn.dataset.pi));
      var oi=[];document.querySelectorAll('.sb.open').forEach(function(b){oi.push(b.id);});
      rPagos();rSummary();rCal();if(viewMode==='list')rList();if(viewMode==='balance')rBal();
      oi.forEach(function(id){var el=document.getElementById(id);if(el)el.classList.add('open');});
    });
  });
}

function openModal(d){
  var y=cur.getFullYear(),m=cur.getMonth(),dow=new Date(y,m,d).getDay();
  var dayNames=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var monthly=mBills(y,m).filter(function(b){return b.day===d;});
  var isTue=dow===2,weekly=isTue?WKL:[];
  var incE=getDayInc(y,m,d),incT=getDayIncT(y,m,d);
  var rDone=isTue?getRegaloDone(y,m,d):false;
  modalDay=d;
  document.getElementById('modalTitle').textContent=dayNames[dow]+' '+d+' '+MESES[m];
  var html='<div class="msec">Ingresos del día</div><div class="inc-section">';
  if(incE.length>0){
    incE.forEach(function(e){
      var tag=e.fromCheque?'<span class="ctag">cheque</span>':'';
      html+='<div class="inc-entry'+(e.fromCheque?' chq':'')+'"><span style="flex:1;font-size:14px;font-weight:500">'+(e.note||'Ingreso')+tag+'</span>'+
        '<span style="font-weight:700;color:#059669;font-size:14px">'+fmt(e.amount)+'</span>'+
        (!e.fromCheque?'<button class="del-btn" data-iid="'+e.id+'">×</button>':'')+
        '</div>';
    });
    html+='<div style="font-size:12px;color:#059669;padding:6px 14px;font-weight:700">Total: '+fmt(incT)+'</div>';
  }
  html+='<div class="inc-add"><input type="text" id="incNote" placeholder="Nota (opcional)"><input type="number" id="incAmt" placeholder="$" min="0" step="0.01" style="max-width:90px"><button id="addIncBtn">+ Agregar</button></div>';
  html+='</div>';
  if(monthly.length>0||weekly.length>0){
    html+='<div class="msec" style="margin-top:8px">Bills / gastos</div>';
    monthly.forEach(function(b){
      var bd=getBD(y,m,b);
      var tag=b.quarterly?'<span style="font-size:9px;background:#ede9fe;color:#5b21b6;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600">trim.</span>':'';
      var rtag=b.special==='renta'?'<span style="font-size:9px;background:#dbeafe;color:#1d4ed8;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600">'+(getTues(y,m).length>=5?'5sem':'4sem')+'</span>':'';
      html+='<div class="mbill"><input type="checkbox" class="mchk" data-type="monthly" data-id="'+b.id+'"'+(bd.paid?' checked':'')+'>'+
        '<span class="mname'+(bd.paid?' done':'')+'">'+b.name+tag+rtag+'</span>'+
        '<div style="display:flex;align-items:center;gap:8px"><span class="mamt" id="ma_'+b.id+'">'+fmt(bd.amount)+'</span>'+
        (b.variable?'<button class="edit-btn" data-id="'+b.id+'">editar</button>':'')+
        '</div></div>';
    });
    if(weekly.length>0){
      html+='<div class="msec" style="margin-top:4px">Martes</div>';
      weekly.forEach(function(wb){
        var wd=getWD(y,m,d,wb);
        html+='<div class="mbill"><input type="checkbox" class="mchk" data-type="weekly" data-day="'+d+'" data-id="'+wb.id+'"'+(wd.paid?' checked':'')+'>'+
          '<span class="mname'+(wd.paid?' done':'')+'">'+wb.name+'</span><span class="mamt">'+fmt(wd.amount)+'</span></div>';
      });
    }
  }
  if(isTue){
    html+='<div class="msec" style="margin-top:8px">Recordatorio</div>'+
      '<div class="mbill memo-bill" style="border:0.5px solid #f9a8d4">'+
      '<input type="checkbox" class="mchk memo" id="regaloChk"'+(rDone?' checked':'')+'>'+
      '<span class="mname'+(rDone?' done':'')+'">🎁 '+REGALO.name+'</span>'+
      '<span class="mamt memo">'+fmt(REGALO.amount)+'</span></div>';
  }
  document.getElementById('modalBody').innerHTML=html;
  if(isTue){
    document.getElementById('regaloChk').addEventListener('change',function(){
      setRegaloDone(y,m,d,this.checked);openModal(d);rCal();if(viewMode==='list')rList();
    });
  }
  document.getElementById('addIncBtn').addEventListener('click',function(){
    var amt=parseFloat(document.getElementById('incAmt').value)||0;
    var note=document.getElementById('incNote').value.trim();
    if(!amt)return;
    addInc(y,m,d,amt,note,false,null);
    openModal(d);rSummary();rCal();if(viewMode==='list')rList();if(viewMode==='balance')rBal();
  });
  document.getElementById('incAmt').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('addIncBtn').click();});
  document.querySelectorAll('.del-btn').forEach(function(btn){
    btn.addEventListener('click',function(){delInc(y,m,d,parseInt(btn.dataset.iid));openModal(d);rSummary();rCal();if(viewMode==='list')rList();if(viewMode==='balance')rBal();});
  });
  document.querySelectorAll('.mchk').forEach(function(chk){
    chk.addEventListener('change',function(){
      if(chk.dataset.type==='monthly')setOv(y,m,chk.dataset.id,'paid',chk.checked);
      else if(chk.dataset.type==='weekly')setWOv(y,m,parseInt(chk.dataset.day),chk.dataset.id,'paid',chk.checked);
      openModal(modalDay);rSummary();rCal();if(viewMode==='list')rList();if(viewMode==='balance')rBal();
    });
  });
  document.querySelectorAll('.edit-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var bill=BILLS.find(function(b){return b.id===btn.dataset.id;});if(!bill)return;
      var ca=getBD(y,m,bill).amount,el=document.getElementById('ma_'+bill.id);
      var inp=document.createElement('input');inp.type='number';inp.className='amt-inp';inp.value=ca;inp.step='0.01';inp.min='0';
      el.replaceWith(inp);inp.focus();inp.select();
      function sv(){var v=parseFloat(inp.value)||0;setOv(y,m,bill.id,'amount',v);openModal(modalDay);rSummary();rCal();if(viewMode==='list')rList();}
      inp.addEventListener('blur',sv);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});
    });
  });
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('modalBg').scrollTop=0;
}

document.getElementById('closeModal').addEventListener('click',function(){document.getElementById('modalBg').classList.remove('open');});
document.getElementById('modalBg').addEventListener('click',function(e){if(e.target===document.getElementById('modalBg'))document.getElementById('modalBg').classList.remove('open');});
document.getElementById('prevM').addEventListener('click',function(){cur.setMonth(cur.getMonth()-1);render();});
document.getElementById('nextM').addEventListener('click',function(){cur.setMonth(cur.getMonth()+1);render();});

function setView(v){
  viewMode=v;
  ['Cal','List','Balance','Pagos'].forEach(function(x){document.getElementById('btn'+x).classList.toggle('active',v===x.toLowerCase());});
  document.getElementById('calView').style.display=v==='cal'?'':'none';
  document.getElementById('listView').style.display=v==='list'?'':'none';
  document.getElementById('balView').style.display=v==='balance'?'':'none';
  document.getElementById('pagView').style.display=v==='pagos'?'':'none';
  document.getElementById('leg').style.display=(v==='balance'||v==='pagos')?'none':'';
  document.getElementById('sg').style.display=v==='pagos'?'none':'';
  if(v==='list')rList();if(v==='balance')rBal();if(v==='pagos')rPagos();
}
document.getElementById('btnCal').addEventListener('click',function(){setView('cal');});
document.getElementById('btnList').addEventListener('click',function(){setView('list');});
document.getElementById('btnBalance').addEventListener('click',function(){setView('balance');});
document.getElementById('btnPagos').addEventListener('click',function(){setView('pagos');});

function render(){
  document.getElementById('modalBg').classList.remove('open');
  var y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById('monthTitle').textContent=MESES[m]+' '+y;
  rSummary();
  if(viewMode==='cal')rCal();
  else if(viewMode==='list')rList();
  else if(viewMode==='balance')rBal();
  else if(viewMode==='pagos')rPagos();
}
load();render();
</script>
</body>
</html>
