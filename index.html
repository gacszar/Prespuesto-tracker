<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="automatic">
<meta name="apple-mobile-web-app-title" content="Presupuesto">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23007aff'/><text y='.9em' font-size='72' x='50%25' text-anchor='middle'>💰</text></svg>">
<title>Presupuesto Tracker</title>
<style>
:root{
  --bg:#f2f2f7;--bg2:#fff;--bg3:#f9f9f9;--bg4:#e5e5ea;--bg5:#f2f2f7;
  --text1:#1c1c1e;--text2:#8e8e93;--text3:#c7c7cc;
  --border:#e5e5ea;--border2:#f2f2f7;--modal-bg:#f2f2f7;
  --green:#34c759;--green-bg:#d1fae5;--green-text:#065f46;
  --red:#ff3b30;--orange:#ff9500;--blue:#007aff;--blue-bg:#f0f6ff;
  --purple-bg:#ede9fe;--purple-text:#5b21b6;
  --yellow-bg:#fff3cd;--yellow-text:#856404;
  --pink-bg:#fce7f3;--pink-text:#9d174d;--pink-border:#f9a8d4;
  --tue-bg:#f9f9f9;--inc-bg:#f0fdf4;--inc-border:#bbf7d0;
  --memo-bg:#fdf2f8;--memo-border:#f9a8d4;
  --shadow:0 1px 3px rgba(0,0,0,.06);--shadow2:0 1px 2px rgba(0,0,0,.05);
  --renta-bg:#fff7ed;--renta-border:#fed7aa;--renta-text:#c2410c;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;--bg5:#1c1c1e;
    --text1:#fff;--text2:#8e8e93;--text3:#48484a;
    --border:#38383a;--border2:#2c2c2e;--modal-bg:#1c1c1e;
    --green:#30d158;--green-bg:#0a2e1a;--green-text:#30d158;
    --red:#ff453a;--orange:#ff9f0a;--blue:#0a84ff;--blue-bg:#001a3d;
    --purple-bg:#1e1040;--purple-text:#bf83ff;
    --yellow-bg:#2e2000;--yellow-text:#ffd60a;
    --pink-bg:#2e0a1a;--pink-text:#ff6b9d;--pink-border:#7a2040;
    --tue-bg:#2c2c2e;--inc-bg:#0a2e1a;--inc-border:#0a5c2a;
    --memo-bg:#2e0a1a;--memo-border:#7a2040;
    --shadow:0 1px 3px rgba(0,0,0,.4);--shadow2:0 1px 2px rgba(0,0,0,.3);
    --renta-bg:#1a0e00;--renta-border:#7c3406;--renta-text:#fb923c;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text1)}
.wrap{padding:.75rem .3rem 5rem;max-width:100%;margin:0 auto;width:100%}
.inner{padding:0 .8rem}
.top-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.month-nav{display:flex;align-items:center;justify-content:space-between}
.nav-btn{background:none;border:0.5px solid var(--border);border-radius:10px;padding:6px 16px;cursor:pointer;font-size:15px;color:var(--text1);min-height:38px;font-family:inherit}
.nav-btn:active{background:var(--bg4)}
.month-title{font-size:17px;font-weight:600;color:var(--text1)}
.view-toggle{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:var(--bg4);border-radius:10px;padding:2px}
.vbtn{background:none;border:none;border-radius:8px;padding:7px 2px;cursor:pointer;font-size:10px;color:var(--text2);text-align:center;min-height:32px;font-family:inherit;font-weight:500}
.vbtn.active{background:var(--bg2);color:var(--text1);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.vbtn:active{opacity:.7}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1rem}
.stat{background:var(--bg2);border-radius:12px;padding:10px 11px;box-shadow:var(--shadow)}
.stat-label{font-size:9px;color:var(--text2);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.stat-value{font-size:15px;font-weight:600;color:var(--text1)}
.stat-value.ok{color:var(--green)}.stat-value.bad{color:var(--red)}.stat-value.warn{color:var(--orange)}.stat-value.info{color:var(--blue)}
.legend{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)}
.leg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;width:calc(100vw - 12px);max-width:calc(100vw - 12px);margin-left:calc(-50vw + 50% + 6px);margin-right:calc(-50vw + 50% + 6px)}
.cal-hdr{font-size:11px;font-weight:600;color:var(--text2);text-align:center;padding:5px 0;text-transform:uppercase}
.cal-day{min-height:66px;border:0.5px solid var(--border);border-radius:8px;padding:4px;cursor:pointer;background:var(--bg2)}
.cal-day:active{opacity:.7}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day.today{border-color:var(--blue);background:var(--blue-bg)}
.cal-day.today .day-num{color:var(--blue);font-weight:700}
.cal-day.tuesday{background:var(--tue-bg)}
.cal-day.cur-week{border:1.5px solid var(--orange)}
.cal-day.cur-week.today{border:1.5px solid var(--blue);background:var(--blue-bg)}
.cal-day.cur-week.tuesday{border:1.5px solid var(--orange);background:var(--tue-bg)}
.day-num{font-size:12px;color:var(--text2);margin-bottom:2px;line-height:1;font-weight:500}
.income-bar{font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px;background:var(--green-bg);color:var(--green-text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bill-dot{font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.4}
.bill-dot.unpaid{background:var(--yellow-bg);color:var(--yellow-text)}
.bill-dot.paid{background:var(--green-bg);color:var(--green-text);text-decoration:line-through;opacity:.7}
.bill-dot.quarterly{background:var(--purple-bg);color:var(--purple-text)}
.bill-dot.weekly{background:var(--green-bg);color:var(--green-text)}
.bill-dot.personal{background:var(--blue-bg);color:var(--blue)}
.bill-dot.memo{background:var(--pink-bg);color:var(--pink-text);font-style:italic}
.more{font-size:8px;color:var(--text2);margin-top:1px}
.extra-dots{display:flex;flex-wrap:wrap;gap:1px;margin-top:2px;padding:1px 0}
.list-view{display:flex;flex-direction:column;gap:2px}
.sec-title{font-size:10px;font-weight:600;color:var(--text2);padding:8px 4px 4px;text-transform:uppercase;letter-spacing:.5px}
.list-item{display:grid;grid-template-columns:26px 1fr auto auto;align-items:center;gap:6px;padding:10px 12px;border-radius:12px;background:var(--bg2);box-shadow:var(--shadow2)}
.list-item.inc-row{background:var(--inc-bg);box-shadow:none;border:0.5px solid var(--inc-border)}
.list-item.memo-row{background:var(--memo-bg);box-shadow:none;border:0.5px solid var(--memo-border)}
.li-day{font-size:11px;font-weight:600;color:var(--text2);text-align:center}
.li-name{font-size:13px;color:var(--text1);font-weight:500}
.li-name.done{text-decoration:line-through;opacity:.4}
.li-sub{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap;align-items:center}
.badge{font-size:9px;border-radius:4px;padding:1px 5px;font-weight:500}
.pay-badge{font-size:9px;border-radius:4px;padding:1px 6px;font-weight:600;background:var(--bg4);color:var(--text2)}
.li-amt{font-size:12px;font-weight:600;color:var(--text1);text-align:right;white-space:nowrap}
.li-amt.inc{color:var(--green)}.li-amt.memo{color:var(--pink-text);font-style:italic}
.li-chk{width:20px;height:20px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.li-chk.memo-chk{accent-color:var(--pink-text)}
.wtbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.wtbl th{font-size:10px;font-weight:600;color:var(--text2);text-align:left;padding:8px 10px;background:var(--bg5);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.3px}
.wtbl th:not(:first-child){text-align:right}
.wtbl td{padding:10px;border-bottom:0.5px solid var(--border2);color:var(--text1);font-weight:500}
.wtbl td:not(:first-child){text-align:right}
.wtbl tr:last-child td{border-bottom:none;font-weight:700}
.wtbl .pos{color:var(--green)}.wtbl .neg{color:var(--red)}.wtbl .neu{color:var(--orange)}
.tbl-wrap{border-radius:14px;overflow:hidden;background:var(--bg2);box-shadow:var(--shadow);margin-bottom:1rem}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.modal-inner{padding:0 1rem 1.5rem}
.modal-handle{width:36px;height:5px;background:var(--bg4);border-radius:3px;margin:12px auto 16px}
.modal-title{font-size:17px;font-weight:700;color:var(--text1);margin-bottom:1rem}
.msec{font-size:11px;font-weight:600;color:var(--text2);padding:8px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.mbill{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border-radius:12px;margin-bottom:2px}
.mbill.memo-bill{background:var(--memo-bg);border:0.5px solid var(--pink-border)}
.mchk{width:20px;height:20px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.mchk.memo{accent-color:var(--pink-text)}
.mbill-info{flex:1;min-width:0}
.mname{font-size:14px;color:var(--text1);font-weight:500}
.mname.done{text-decoration:line-through;opacity:.4}
.mpay{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500}
.mright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mamt{font-size:14px;font-weight:600;color:var(--text1);min-width:56px;text-align:right}
.mamt.memo{color:var(--pink-text);font-style:italic}
.amt-inp{width:80px;font-size:14px;padding:6px 8px;border:1.5px solid var(--blue);border-radius:8px;background:var(--bg2);color:var(--text1);font-family:inherit}
.edit-btn{background:var(--bg5);border:none;border-radius:8px;font-size:11px;padding:5px 10px;cursor:pointer;color:var(--blue);font-weight:600;font-family:inherit}
.inc-section{background:var(--bg2);border-radius:12px;padding:2px 0;margin-bottom:4px}
.inc-add{display:flex;gap:6px;align-items:center;padding:10px 14px;flex-wrap:wrap}
.inc-add input{flex:1;min-width:80px;font-size:14px;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit}
.inc-add input:focus{border-color:var(--blue);outline:none;background:var(--bg2)}
.inc-add button{padding:9px 14px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:13px;cursor:pointer;font-weight:600;font-family:inherit;white-space:nowrap}
.inc-entry{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:0.5px solid var(--border2);font-size:14px}
.inc-entry.chq{background:var(--inc-bg)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:0 4px;min-width:30px;font-family:inherit}
.del-btn:active{color:var(--red)}
.close-btn{width:calc(100% - 2rem);margin:0 1rem;padding:14px;border:none;border-radius:12px;background:var(--bg4);color:var(--text1);font-size:15px;cursor:pointer;font-weight:600;font-family:inherit}
.close-btn:active{opacity:.7}
/* CHEQUES */
.pagos-view{display:flex;flex-direction:column;gap:8px}
.pag-title{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:4px}
.sc{border-radius:14px;background:var(--bg2);overflow:hidden;box-shadow:var(--shadow)}
.sc.paying{box-shadow:0 0 0 2px var(--green)}
.sc.prev-month{opacity:.75}
.sch{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;gap:8px;flex-wrap:wrap}
.sch:active{opacity:.7}
.paying .sch{background:var(--inc-bg)}
.sc-left{display:flex;flex-direction:column;gap:4px}
.sc-label{font-size:13px;font-weight:600;color:var(--text1)}
.paying .sc-label{color:var(--green)}
.sc-tags{display:flex;gap:4px}
.sc-tag{font-size:10px;border-radius:5px;padding:2px 7px;font-weight:600}
.sc-tag.paying{background:var(--green-bg);color:var(--green-text)}
.sc-tag.prev{background:var(--bg4);color:var(--text2)}
.sc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.sc-prog{font-size:11px;color:var(--text2);font-weight:500}
.sc-badge{font-size:11px;border-radius:6px;padding:3px 9px;font-weight:600}
.sc-badge.ok{background:var(--green-bg);color:var(--green-text)}
.sc-badge.par{background:var(--yellow-bg);color:var(--yellow-text)}
.sc-badge.emp{background:var(--bg4);color:var(--text2)}
.sb{padding:0 14px 14px;display:none}
.sb.open{display:block}
.pr{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.pr:last-of-type{border-bottom:none}
.pr-f{color:var(--text2);min-width:105px;font-size:11px;font-weight:500}
.pr-n{flex:1;color:var(--text1);font-weight:500}
.pr-a{font-weight:700;color:var(--green);min-width:60px;text-align:right}
.pr-d{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0 4px;min-width:28px;font-family:inherit}
.pr-d:active{color:var(--red)}
.paf{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border2);align-items:center}
.paf input{font-size:12px;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit}
.paf input:focus{border-color:var(--blue);outline:none;background:var(--bg2)}
.paf select{font-size:12px;padding:8px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);cursor:pointer;font-family:inherit}
.paf button{padding:8px 12px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit;white-space:nowrap}
.str{display:flex;justify-content:space-between;padding:10px 0 4px;font-size:13px;font-weight:600}
.pbw{height:6px;background:var(--bg4);border-radius:3px;margin:4px 0 10px;overflow:hidden}
.pbf{height:100%;border-radius:3px;background:var(--green)}
.pbf.orange{background:var(--orange)}
.pbf.over{background:var(--red)}
.ctag{font-size:9px;background:var(--green-bg);color:var(--green-text);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600}
.cal-tag{font-size:9px;background:var(--blue-bg);color:var(--blue);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600}
/* MI RENTA */
.renta-view{display:flex;flex-direction:column;gap:10px}
.renta-hero{background:var(--bg2);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
.renta-hero-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.renta-meta-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.renta-meta-left{}
.renta-meta-amt{font-size:32px;font-weight:700;color:var(--text1)}
.renta-meta-sub{font-size:12px;color:var(--text2);margin-top:2px}
.renta-meta-right{text-align:right}
.renta-meta-goal{font-size:13px;font-weight:600;color:var(--text2)}
.renta-meta-pct{font-size:22px;font-weight:700}
.pbw2{height:8px;background:var(--bg4);border-radius:4px;margin:0 0 10px;overflow:hidden}
.pbf2{height:100%;border-radius:4px;background:var(--orange);transition:width .3s}
.pbf2.ok{background:var(--green)}
.pbf2.over{background:var(--red)}
.renta-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.renta-stat{background:var(--bg5);border-radius:10px;padding:8px 10px;text-align:center}
.renta-stat-label{font-size:9px;color:var(--text2);font-weight:500;text-transform:uppercase;margin-bottom:4px}
.renta-stat-val{font-size:14px;font-weight:700;color:var(--text1)}
.renta-stat-val.ok{color:var(--green)}
.renta-stat-val.warn{color:var(--orange)}
.renta-stat-val.bad{color:var(--red)}
.renta-semanas{background:var(--bg2);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.renta-sem-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--bg5)}
.renta-sem-title{font-size:13px;font-weight:700;color:var(--text1)}
.renta-sem-sub{font-size:11px;color:var(--text2)}
.renta-sem-row{padding:12px 14px;border-top:0.5px solid var(--border2)}
.renta-sem-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.renta-sem-dates{font-size:12px;font-weight:600;color:var(--text1)}
.renta-sem-disp{font-size:11px;color:var(--text2)}
.renta-sem-pbw{height:4px;background:var(--bg4);border-radius:2px;margin-bottom:8px;overflow:hidden}
.renta-sem-pbf{height:100%;border-radius:2px;background:var(--green)}
.renta-sem-pbf.low{background:var(--orange)}
.renta-sem-pbf.none{background:var(--red)}
.renta-aporte-row{display:flex;align-items:center;gap:8px}
.renta-aporte-lbl{font-size:11px;color:var(--text2);flex:1}
.renta-aporte-val{font-size:13px;font-weight:700;color:var(--text1)}
.renta-aporte-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0 2px;font-family:inherit}
.renta-aporte-del:active{color:var(--red)}
.renta-add-form{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap}
.renta-add-form input{flex:1;min-width:80px;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit}
.renta-add-form input:focus{border-color:var(--orange);outline:none;background:var(--bg2)}
.renta-add-form button{padding:8px 14px;border:none;border-radius:10px;background:var(--orange);color:#fff;font-size:12px;cursor:pointer;font-weight:700;font-family:inherit;white-space:nowrap}
.renta-disp-card{background:var(--bg2);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
.renta-disp-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.renta-disp-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:0.5px solid var(--border2)}
.renta-disp-row:last-child{border-bottom:none;font-weight:700;font-size:14px;padding-top:8px;margin-top:4px}
.renta-disp-row.neg{color:var(--red)}
.renta-disp-row.pos{color:var(--green)}
.renta-tag-cur{font-size:10px;background:var(--orange);color:#fff;border-radius:4px;padding:1px 6px;font-weight:700;margin-left:6px}
</style>
</head>
<body>
<div class="wrap">
<div class="inner">
<div class="top-bar">
  <div class="month-nav">
    <button class="nav-btn" id="prevM">&#8592;</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="nav-btn" id="nextM">&#8594;</button>
  </div>
  <div class="view-toggle">
    <button class="vbtn active" id="btnCal">Cal.</button>
    <button class="vbtn" id="btnList">Lista</button>
    <button class="vbtn" id="btnBalance">Balance</button>
    <button class="vbtn" id="btnPagos">Cheques</button>
    <button class="vbtn" id="btnRenta">Mi Renta</button>
  </div>
</div>
<div class="summary-grid" id="sg"></div>

function fmtDate(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+' '+MESES[parseInt(p[1])-1]+' '+p[0];}
function fmtCorto(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+' '+MESES[parseInt(p[1])-1];}
function toISO(d,m,y){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function fmt(v){return'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtS(v){return(v>=0?'+':'')+fmt(v);}
function mk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function addDays(iso,n){var d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function todayISO(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}

function getTues(y,m){var t=[],dim=new Date(y,m+1,0).getDate();for(var d=1;d<=dim;d++)if(new Date(y,m,d).getDay()===2)t.push(d);return t;}
function rentaAmt(y,m){return getTues(y,m).length>=5?600:800;}
function anitaAmt(y,m){if(y<2026||(y===2026&&m<=4))return 190;if(y===2026&&m>=5&&m<=7)return 170;return 125;}

function genAll(){var sems=[],ini=INICIO,lim='2027-12-31';while(ini<=lim){sems.push({inicio:ini,fin:addDays(ini,5)});ini=addDays(ini,7);}return sems;}
function semsForView(y,m){
  var ms=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var dim=new Date(y,m+1,0).getDate();
  var me=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dim).padStart(2,'0');
  return genAll().filter(function(s){return s.inicio>=addDays(ms,-14)&&s.inicio<=me;});
}
function semsStrictMonth(y,m){
  // Solo semanas cuyo inicio cae en este mes
  var ms=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var dim=new Date(y,m+1,0).getDate();
  var me=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dim).padStart(2,'0');
  return genAll().filter(function(s){return s.inicio>=ms&&s.inicio<=me;});
}
function getPayingSem(){
  var t=todayISO(),wa=addDays(t,-7),all=genAll();
  for(var i=0;i<all.length;i++){if(all[i].inicio<=wa&&all[i].fin>=wa)return all[i].inicio;}
  var last=null;for(var i=0;i<all.length;i++){if(all[i].fin<t)last=all[i].inicio;}return last;
}
function getCurPayWeekDays(y,m){
  var today=new Date(),dow=today.getDay();
  var daysFromWed=(dow>=3)?(dow-3):(dow+4);
  var wedStart=new Date(today);wedStart.setDate(today.getDate()-daysFromWed);
  var tueEnd=new Date(wedStart);tueEnd.setDate(wedStart.getDate()+6);
  var days={},dim=new Date(y,m+1,0).getDate();
  for(var d=1;d<=dim;d++){var dd=new Date(y,m,d);if(dd>=wedStart&&dd<=tueEnd)days[d]=true;}
  return days;
}
function findSemForDate(fechaISO){
  var all=genAll();
  for(var i=0;i<all.length;i++){if(fechaISO>=all[i].inicio&&fechaISO<=all[i].fin)return all[i];}
  return null;
}
function buildPS(pfx){
  var now=new Date(),dO='',mO='',yO='';
  for(var i=1;i<=31;i++)dO+='<option value="'+i+'"'+(i===now.getDate()?' selected':'')+'>'+i+'</option>';
  MESES.forEach(function(m,i){mO+='<option value="'+(i+1)+'"'+(i+1===(now.getMonth()+1)?' selected':'')+'>'+m+'</option>';});
  for(var y=2026;y<=2028;y++)yO+='<option value="'+y+'"'+(y===now.getFullYear()?' selected':'')+'>'+y+'</option>';
  return '<select id="'+pfx+'D" style="width:48px">'+dO+'</select><select id="'+pfx+'M" style="flex:1">'+mO+'</select><select id="'+pfx+'Y" style="width:66px">'+yO+'</select>';
}

function mBills(y,m){
  return BILLS.filter(function(b){
    if(b.quarterly){if(b.startYear&&(y<b.startYear||(y===b.startYear&&m<b.qMonths[0])))return false;return b.qMonths.indexOf(m)>=0;}
    return true;
  }).map(function(b){
    var base=b.amount;
    if(b.special==='anita')base=anitaAmt(y,m);
    if(b.special==='renta')base=rentaAmt(y,m);
    return Object.assign({},b,{baseAmount:base});
  });
}
function getWeeks(y,m){var dim=new Date(y,m+1,0).getDate(),wks=[],wk=[];for(var d=1;d<=dim;d++){wk.push(d);if(new Date(y,m,d).getDay()===6||d===dim){wks.push(wk.slice());wk=[];}}return wks;}

// Bills fijos que caen en una semana (por rango de días)
function billsInRange(y,m,days){
  var out=0;
  mBills(y,m).forEach(function(b){
    // Excluir la renta: ya se cubre con el fondo semanal de Mi Renta
    if(b.special==='renta')return;
    if(days.indexOf(b.day)>=0){
      var bd=getBD(y,m,b);
      out+=bd.amount;
    }
  });
  // weekly en martes que caigan en esos días (ya incluidos en wklFijos, no sumar doble)
  // Los WKL ya están en wklFijos (despensa+gasolina+personal), no se suman aquí
  days.forEach(function(d){
    if(new Date(y,m,d).getDay()===2){
      // no sumar WKL aquí porque ya se restan como fijos en rRenta()
    }
  });
  return out;
}

// Días de la semana laboral (mié-mar) que tocan en el mes
function semDaysInMonth(y,m,sem){
  var ms=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var dim=new Date(y,m+1,0).getDate();
  var me=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dim).padStart(2,'0');
  var days=[];
  for(var d=1;d<=dim;d++){
    var iso=mk(y,m,d);
    if(iso>=sem.inicio&&iso<=sem.fin)days.push(d);
  }
  return days;
}

var state={overrides:{},income:{},pagos:{},regalos:{},renta:{}};
var cur=new Date();cur.setDate(1);
var viewMode='cal',modalDay=null;

function load(){
  try{var d=localStorage.getItem(STOR);if(d)state=JSON.parse(d);
  if(!state.pagos)state.pagos={};
  if(!state.regalos)state.regalos={};
  if(!state.renta)state.renta={};}catch(e){}
}
function save(){try{localStorage.setItem(STOR,JSON.stringify(state));}catch(e){}}
function getOv(y,m,id,f){var k=mk(y,m,1)+'_'+id;return state.overrides[k]&&state.overrides[k][f];}
function setOv(y,m,id,f,v){var k=mk(y,m,1)+'_'+id;if(!state.overrides[k])state.overrides[k]={};state.overrides[k][f]=v;save();}
function getWOv(y,m,day,id,f){var k='w_'+mk(y,m,day)+'_'+id;return state.overrides[k]&&state.overrides[k][f];}
function setWOv(y,m,day,id,f,v){var k='w_'+mk(y,m,day)+'_'+id;if(!state.overrides[k])state.overrides[k]={};state.overrides[k][f]=v;save();}
function getBD(y,m,b){var a=getOv(y,m,b.id,'amount'),p=getOv(y,m,b.id,'paid');return{amount:Number(a!=null?a:b.baseAmount),paid:p?true:false};}
function getWD(y,m,day,wb){var a=getWOv(y,m,day,wb.id,'amount'),p=getWOv(y,m,day,wb.id,'paid');return{amount:Number(a!=null?a:wb.amount),paid:p?true:false};}
function getRegaloDone(y,m,day){return state.regalos['regalo_'+mk(y,m,day)]?true:false;}
function setRegaloDone(y,m,day,v){state.regalos['regalo_'+mk(y,m,day)]=v;save();}
function getDayInc(y,m,d){return(state.income[mk(y,m,d)]||[]);}
function getDayIncT(y,m,d){return getDayInc(y,m,d).reduce(function(a,e){return a+Number(e.amount);},0);}

// RENTA aportaciones
function getRentaKey(y,m){return'renta_'+y+'_'+m;}
function getRentaAportes(y,m){return(state.renta[getRentaKey(y,m)]||[]);}
function addRentaAporte(y,m,semIni,amt){
  var k=getRentaKey(y,m);
  if(!state.renta[k])state.renta[k]=[];
  state.renta[k].push({id:Date.now(),semIni:semIni,amount:Number(amt)});
  save();
}
function delRentaAporte(y,m,id){
  var k=getRentaKey(y,m);
  state.renta[k]=(state.renta[k]||[]).filter(function(a){return a.id!==id;});
  save();
}

function addInc(y,m,d,amt,note,fromCheque,pid){
  var k=mk(y,m,d);if(!state.income[k])state.income[k]=[];
  var id=pid||Date.now();
  var e={id:id,amount:Number(amt),note:note||'',fromCheque:fromCheque?true:false};
  if(pid)e.pagoId=pid;
  state.income[k].push(e);
  if(!fromCheque){
    var fechaISO=mk(y,m,d);
    var sem=findSemForDate(fechaISO);
    if(sem){
      var sk='sem_'+sem.inicio;
      if(!state.pagos[sk])state.pagos[sk]=[];
      var exists=state.pagos[sk].some(function(p){return p.calIncId&&p.calIncId===id;});
      if(!exists)state.pagos[sk].push({fecha:fechaISO,amount:Number(amt),nota:note||'Ingreso calendario',calIncId:id,fromCal:true});
    }
  }
  save();
}
function delInc(y,m,d,id){
  var k=mk(y,m,d);
  var entry=getDayInc(y,m,d).find(function(e){return e.id===id;});
  state.income[k]=(state.income[k]||[]).filter(function(e){return e.id!==id;});
  if(entry&&!entry.fromCheque){
    Object.keys(state.pagos).forEach(function(sk){state.pagos[sk]=(state.pagos[sk]||[]).filter(function(p){return p.calIncId!==id;});});
  }
  save();
}
function delByPid(pid){Object.keys(state.income).forEach(function(k){state.income[k]=(state.income[k]||[]).filter(function(e){return e.pagoId!==pid;});});save();}
function getSK(ini){return'sem_'+ini;}
function getSemP(ini){return(state.pagos[getSK(ini)]||[]);}
function addSemP(ini,fecha,amt,nota){
  var k=getSK(ini),pid=Date.now();
  if(!state.pagos[k])state.pagos[k]=[];
  state.pagos[k].push({fecha:fecha,amount:amt,nota:nota,pagoId:pid});
  var p=fecha.split('-'),fy=parseInt(p[0]),fm=parseInt(p[1])-1,fd=parseInt(p[2]);
  var k2=mk(fy,fm,fd);if(!state.income[k2])state.income[k2]=[];
  state.income[k2].push({id:pid,amount:Number(amt),note:(nota?nota+' · ':'')+'Cheque',fromCheque:true,pagoId:pid});save();
}
function delSemP(ini,pi){
  var k=getSK(ini),pagos=state.pagos[k]||[],pago=pagos[pi];
  if(pago&&pago.pagoId)delByPid(pago.pagoId);
  if(pago&&pago.calIncId){Object.keys(state.income).forEach(function(ik){state.income[ik]=(state.income[ik]||[]).filter(function(e){return e.id!==pago.calIncId;});});}
  pagos.splice(pi,1);state.pagos[k]=pagos;save();
}

function calcMonth(y,m){
  var tues=getTues(y,m),tb=0,pb=0,ti=0;
  mBills(y,m).forEach(function(b){var d=getBD(y,m,b);tb+=d.amount;if(d.paid)pb+=d.amount;});
  tues.forEach(function(day){WKL.forEach(function(wb){var d=getWD(y,m,day,wb);tb+=d.amount;if(d.paid)pb+=d.amount;});});
  var dim=new Date(y,m+1,0).getDate();
  for(var d=1;d<=dim;d++)ti+=getDayIncT(y,m,d);
  return{tb:tb,pb:pb,pend:tb-pb,ti:ti,bal:ti-tb};
}

function rSummary(){

}

function rCal(){
  var y=cur.getFullYear(),m=cur.getMonth(),today=new Date();
  var cwDays=getCurPayWeekDays(y,m);
  var days=['D','L','M','Mi','J','V','S'];
  var html='<div class="cal-grid">';
  days.forEach(function(d){html+='<div class="cal-hdr">'+d+'</div>';});
  var first=new Date(y,m,1).getDay();
  for(var i=0;i<first;i++)html+='<div class="cal-day empty"></div>';
  var dim=new Date(y,m+1,0).getDate();
  for(var d=1;d<=dim;d++){
    var isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var isTue=new Date(y,m,d).getDay()===2;
    var isCW=cwDays[d]?true:false;
    var monthly=mBills(y,m).filter(function(b){return b.day===d;});
    var weekly=isTue?WKL:[];
    var incT=getDayIncT(y,m,d),allItems=monthly.concat(weekly);
    var inner='<div class="day-num">'+d+'</div>';
    if(incT>0)inner+='<div class="income-bar">+'+fmt(incT)+'</div>';
    var shown=0,limit=incT>0?1:2;
    // Recopilar info de todos los items para los puntos
    var allInfo=[];
    allItems.forEach(function(b){
      var cls,paid;
      if(b.id==='despensa'||b.id==='gasolina'){var wd=getWD(y,m,d,b);paid=wd.paid;cls=paid?'paid':'weekly';}
      else if(b.id==='personal'){var wd2=getWD(y,m,d,b);paid=wd2.paid;cls=paid?'paid':'personal';}
      else{var bd=getBD(y,m,b);paid=bd.paid;cls=b.quarterly?'quarterly':(paid?'paid':'unpaid');}
      allInfo.push({name:b.name,cls:cls});
    });
    if(isTue){var rDone=getRegaloDone(y,m,d);allInfo.push({name:'🎁',cls:rDone?'paid':'memo'});}
    // Mostrar hasta el límite
    allInfo.forEach(function(info,i){
      if(i<limit)inner+='<div class="bill-dot '+info.cls+'">'+info.name+'</div>';
    });
    // Puntos de colores para los que no caben
    if(allInfo.length>limit){
      var dots='<div class="extra-dots">';
      for(var ei=limit;ei<allInfo.length;ei++){
        var dc=allInfo[ei].cls;
        var dotClr=dc==='paid'?'#27500a':dc==='quarterly'?'#5b21b6':dc==='weekly'||dc==='personal'?'#166534':dc==='memo'?'#9d174d':'#856404';
        dots+='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+dotClr+';margin-right:2px"></span>';
      }
      dots+='</div>';
      inner+=dots;
    }
    var classes='cal-day';
    if(isToday)classes+=' today';else if(isTue)classes+=' tuesday';
    if(isCW)classes+=' cur-week';
    html+='<div class="'+classes+'" data-day="'+d+'">'+inner+'</div>';
  }
  html+='</div>';
  document.getElementById('calView').innerHTML=html;
  document.querySelectorAll('.cal-day:not(.empty)').forEach(function(el){
    el.addEventListener('click',function(){openModal(parseInt(el.dataset.day));});
  });
}

  var y=cur.getFullYear(),m=cur.getMonth(),tues=getTues(y,m),dim=new Date(y,m+1,0).getDate();
  var html='<div class="list-view"><div class="sec-title">Bills mensuales</div>';
  mBills(y,m).sort(function(a,b){return a.day-b.day;}).forEach(function(b){
    var bd=getBD(y,m,b);

      '<div><div class="li-name'+(bd.paid?' done':'')+'">'+b.name+'</div><div class="li-sub">'+pB+qB+vB+rB+'</div></div>'+

      '<input type="checkbox" class="li-chk" data-id="'+b.id+'"'+(bd.paid?' checked':'')+'></div>';
  });

// ── MI RENTA: semanas LUNES-DOMINGO ──────────────────────────────────────
// Regla: la semana que CONTIENE el día 8 es la ÚLTIMA aportación del mes.
// El lunes ya tienes el cheque completo y puedes pagar el día 8 esa semana.
// La semana SIGUIENTE al día 8 ya empieza el fondo del mes siguiente.

function isoDeDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function lunDomDeIso(iso){
  var d=new Date(iso+'T12:00:00');
  var dow=d.getDay();
  if(dow===0)d.setDate(d.getDate()-6);
  else d.setDate(d.getDate()-(dow-1));
  return d;
}

// Genera semanas lun-dom. La última semana es la que CONTIENE hastaISO.
function genSemsLunDom(desdeISO,hastaISO){
  var d=lunDomDeIso(desdeISO);
  var sems=[];
  while(true){
    var ini=new Date(d);
    var fin=new Date(d);fin.setDate(fin.getDate()+6);
    var iniISO=isoDeDate(ini);
    var finISO=isoDeDate(fin);
    sems.push({inicio:iniISO,fin:finISO});
    if(iniISO<=hastaISO&&hastaISO<=finISO)break;
    if(iniISO>hastaISO)break;
    d.setDate(d.getDate()+7);
    if(sems.length>30)break;
  }
  return sems;
}

// Semanas lun-dom que aportan a la renta de (ry,rm)
// Primera: lunes siguiente al día 8 del mes anterior
// Última: semana que contiene el día 8 de este mes
function semsRentaLunDom(ry,rm){
  // Día 8 de este mes → la semana que lo contiene es la última
  var dia8ISO=isoDeDate(new Date(ry,rm,8));

  // Día 8 del mes anterior → de ahí arranca el fondo (lunes siguiente)
  var prevM=rm-1,prevY=ry;
  if(prevM<0){prevM=11;prevY--;}
  var dia8prev=new Date(prevY,prevM,8);
  // Lunes siguiente al día 8 del mes anterior
  var inicioFondo=new Date(dia8prev);
  inicioFondo.setDate(inicioFondo.getDate()+1);
  var dowI=inicioFondo.getDay();
  if(dowI===0)inicioFondo.setDate(inicioFondo.getDate()+1);
  else if(dowI!==1)inicioFondo.setDate(inicioFondo.getDate()+(8-dowI)%7);
  var inicioISO=isoDeDate(inicioFondo);

  return genSemsLunDom(inicioISO,dia8ISO);
}

// Bills (sin renta) que caen en una semana lun-dom
function billsEnSem(sem){
  var out=0;
  var d=new Date(sem.inicio+'T12:00:00');
  var fin=new Date(sem.fin+'T12:00:00');
  while(d<=fin){
    var dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
    mBills(dy,dm).forEach(function(b){
      if(b.special==='renta')return;
      if(b.day===dd)out+=getBD(dy,dm,b).amount;
    });
    d.setDate(d.getDate()+1);
  }
  return out;
}

  // Semanas lun-dom que aportan a este mes
  var semsRenta=semsRentaLunDom(y,m);
  // Meta: 5+ semanas → $600, 4 o menos → $800
  var meta=semsRenta.length>=5?600:800;

  // Aportes guardados
  var aportes=getRentaAportes(y,m);
  var totalAportado=aportes.reduce(function(a,x){return a+Number(x.amount);},0);
  var falta=Math.max(0,meta-totalAportado);
  var pct=Math.min(100,Math.round(totalAportado/meta*100));

  // Semanas restantes (cuyo fin >= hoy)
  var semsRestantes=semsRenta.filter(function(s){return s.fin>=t;});
  var sugerencia=semsRestantes.length>0?Math.ceil(falta/semsRestantes.length):0;

  // Día 8 info
  var dia8=new Date(y,m,8);
  var dow8=dia8.getDay();
  var dias=['dom','lun','mar','mié','jue','vie','sáb'];

      '</div>'+
      '<div class="renta-meta-right">'+
        '<div class="renta-meta-goal">'+(falta>0?'Faltan':'')+'</div>'+
        '<div class="renta-meta-pct" style="color:'+(falta===0?'var(--green)':falta<meta*0.5?'var(--orange)':'var(--red)')+'">'+

      '</div>'+
    '</div>'+
    '<div class="pbw2"><div class="pbf2'+(pct>=100?' ok':'')+'" style="width:'+pct+'%"></div></div>'+
    '<div class="renta-stats">'+
      '<div class="renta-stat"><div class="renta-stat-label">Aportado</div><div class="renta-stat-val ok">'+fmt(totalAportado)+'</div></div>'+
      '<div class="renta-stat"><div class="renta-stat-label">Meta</div><div class="renta-stat-val">'+fmt(meta)+'</div></div>'+
      '<div class="renta-stat"><div class="renta-stat-label">'+(semsRestantes.length>0?'Sugerido/sem':'Estado')+'</div>'+
      '<div class="renta-stat-val '+(falta===0?'ok':sugerencia>400?'bad':'warn')+'">'+
      (falta===0?'✓':(semsRestantes.length>0?fmt(sugerencia):'—'))+'</div></div>'+
    '</div>'+
  '</div>';

  // SEMANAS
  html+='<div class="renta-semanas">'+
    '<div class="renta-sem-head">'+
      '<div class="renta-sem-title">Semanas lunes a domingo</div>'+

    '</div>';

    var billsS=billsEnSem(sem);

      var bd=getBD(y,m,b);
      var tags='';
      if(b.quarterly)tags+='<span style="font-size:9px;background:var(--purple-bg);color:var(--purple-text);border-radius:4px;padding:1px 5px;font-weight:600">trim.</span> ';
      if(b.special==='renta')tags+='<span style="font-size:9px;background:var(--renta-bg);color:var(--renta-text);border-radius:4px;padding:1px 5px;font-weight:600">'+(getTues(y,m).length>=5?'5sem':'4sem')+'</span>';
      html+='<div class="mbill"><input type="checkbox" class="mchk" data-type="monthly" data-id="'+b.id+'"'+(bd.paid?' checked':'')+'>'+
        '<div class="mbill-info"><div class="mname'+(bd.paid?' done':'')+'">'+b.name+' '+tags+'</div>'+
        (b.pay&&b.pay!=='—'?'<div class="mpay">💳 '+b.pay+'</div>':'')+
        '</div><div class="mright"><span class="mamt" id="ma_'+b.id+'">'+fmt(bd.amount)+'</span>'+
        (b.variable?'<button class="edit-btn" data-id="'+b.id+'">editar</button>':'')+
        '</div></div>';
    });
    if(weekly.length>0){
      html+='<div class="msec" style="margin-top:4px">Martes</div>';
      weekly.forEach(function(wb){
        var wd=getWD(y,m,d,wb);
        var ico=wb.personal?'👤':'🛒';
        html+='<div class="mbill"><input type="checkbox" class="mchk" data-type="weekly" data-day="'+d+'" data-id="'+wb.id+'"'+(wd.paid?' checked':'')+'>'+
          '<div class="mbill-info"><div class="mname'+(wd.paid?' done':'')+'">'+ico+' '+wb.name+'</div>'+
          (wb.pay?'<div class="mpay">💳 '+wb.pay+'</div>':'')+
          '</div><div class="mright"><span class="mamt" id="maw_'+wb.id+'_'+d+'">'+fmt(wd.amount)+'</span>'+
          '<button class="edit-btn edit-wkl" data-wid="'+wb.id+'" data-wday="'+d+'">editar</button>'+
          '</div></div>';
      });
    }
  }
  if(isTue){
    html+='<div class="msec" style="margin-top:8px">Recordatorio</div>'+
      '<div class="mbill memo-bill">'+
      '<input type="checkbox" class="mchk memo" id="regaloChk"'+(rDone?' checked':'')+'>'+
      '<div class="mbill-info"><div class="mname'+(rDone?' done':'')+'">🎁 '+REGALO.name+'</div></div>'+
      '<span class="mamt memo">'+fmt(REGALO.amount)+'</span></div>';
  }
  document.getElementById('modalBody').innerHTML=html;
  if(isTue){
    document.getElementById('regaloChk').addEventListener('change',function(){
      setRegaloDone(y,m,d,this.checked);openModal(d);rCal();if(viewMode==='list')rList();
    });
  }
  document.getElementById('addIncBtn').addEventListener('click',function(){
    var amt=parseFloat(document.getElementById('incAmt').value)||0;
    var note=document.getElementById('incNote').value.trim();
    if(!amt)return;
    addInc(y,m,d,amt,note,false,null);
    openModal(d);rSummary();rCal();
    if(viewMode==='list')rList();if(viewMode==='balance')rBal();if(viewMode==='pagos')rPagos();
  });
  document.getElementById('incAmt').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('addIncBtn').click();});
  document.querySelectorAll('.del-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      delInc(y,m,d,parseInt(btn.dataset.iid));
      openModal(d);rSummary();rCal();
      if(viewMode==='list')rList();if(viewMode==='balance')rBal();if(viewMode==='pagos')rPagos();
    });
  });
  document.querySelectorAll('.mchk').forEach(function(chk){
    chk.addEventListener('change',function(){
      if(chk.dataset.type==='monthly')setOv(y,m,chk.dataset.id,'paid',chk.checked);
      else if(chk.dataset.type==='weekly')setWOv(y,m,parseInt(chk.dataset.day),chk.dataset.id,'paid',chk.checked);
      openModal(modalDay);rSummary();rCal();if(viewMode==='list')rList();if(viewMode==='balance')rBal();
    });
  });
  document.querySelectorAll('.edit-btn:not(.edit-wkl)').forEach(function(btn){
    btn.addEventListener('click',function(){
      var bill=BILLS.find(function(b){return b.id===btn.dataset.id;});if(!bill)return;
      var ca=getBD(y,m,bill).amount,el=document.getElementById('ma_'+bill.id);
      var inp=document.createElement('input');inp.type='number';inp.className='amt-inp';inp.value=ca;inp.step='0.01';inp.min='0';
      el.replaceWith(inp);inp.focus();inp.select();
      function sv(){var v=parseFloat(inp.value)||0;setOv(y,m,bill.id,'amount',v);openModal(modalDay);rSummary();rCal();if(viewMode==='list')rList();}
      inp.addEventListener('blur',sv);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});
    });
  });
  document.querySelectorAll('.edit-wkl').forEach(function(btn){
    btn.addEventListener('click',function(){
      var wid=btn.dataset.wid,wday=parseInt(btn.dataset.wday);
      var wb=WKL.find(function(w){return w.id===wid;});if(!wb)return;
      var ca=getWD(y,m,wday,wb).amount;
      var el=document.getElementById('maw_'+wid+'_'+wday);
      var inp=document.createElement('input');inp.type='number';inp.className='amt-inp';inp.value=ca;inp.step='1';inp.min='0';
      el.replaceWith(inp);inp.focus();inp.select();
      function sv(){var v=parseFloat(inp.value)||0;setWOv(y,m,wday,wid,'amount',v);openModal(modalDay);rSummary();rCal();if(viewMode==='list')rList();if(viewMode==='renta')rRenta();}
      inp.addEventListener('blur',sv);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});
    });
  });
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('modalBg').scrollTop=0;
}

document.getElementById('closeModal').addEventListener('click',function(){document.getElementById('modalBg').classList.remove('open');});
document.getElementById('modalBg').addEventListener('click',function(e){if(e.target===document.getElementById('modalBg'))document.getElementById('modalBg').classList.remove('open');});
document.getElementById('prevM').addEventListener('click',function(){cur.setMonth(cur.getMonth()-1);render();});
document.getElementById('nextM').addEventListener('click',function(){cur.setMonth(cur.getMonth()+1);render();});

function setView(v){
  viewMode=v;
  ['Cal','List','Balance','Pagos','Renta'].forEach(function(x){document.getElementById('btn'+x).classList.toggle('active',v===x.toLowerCase());});
  document.getElementById('calView').style.display=v==='cal'?'':'none';
  document.getElementById('listView').style.display=v==='list'?'':'none';
  document.getElementById('balView').style.display=v==='balance'?'':'none';
  document.getElementById('pagView').style.display=v==='pagos'?'':'none';
  document.getElementById('rentaView').style.display=v==='renta'?'':'none';
  document.getElementById('leg').style.display=(v==='balance'||v==='pagos'||v==='renta')?'none':'';
  document.getElementById('sg').style.display=(v==='pagos'||v==='renta')?'none':'';
  if(v==='list')rList();if(v==='balance')rBal();if(v==='pagos')rPagos();if(v==='renta')rRenta();
}
document.getElementById('btnCal').addEventListener('click',function(){setView('cal');});
document.getElementById('btnList').addEventListener('click',function(){setView('list');});
document.getElementById('btnBalance').addEventListener('click',function(){setView('balance');});
document.getElementById('btnPagos').addEventListener('click',function(){setView('pagos');});
document.getElementById('btnRenta').addEventListener('click',function(){setView('renta');});

function render(){
  document.getElementById('modalBg').classList.remove('open');
  var y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById('monthTitle').textContent=MESES[m]+' '+y;
  rSummary();
  if(viewMode==='cal')rCal();
  else if(viewMode==='list')rList();
  else if(viewMode==='balance')rBal();
  else if(viewMode==='pagos')rPagos();
  else if(viewMode==='renta')rRenta();
}
load();render();
</script>
</body>
</html>
