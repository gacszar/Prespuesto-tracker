<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="automatic">
<meta name="apple-mobile-web-app-title" content="Presupuesto">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23007aff'/><text y='.9em' font-size='72' x='50%25' text-anchor='middle'>💰</text></svg>">
<title>Presupuesto Tracker</title>
<style>
:root{
  --bg:#f2f2f7;--bg2:#fff;--bg3:#f9f9f9;--bg4:#e5e5ea;--bg5:#f2f2f7;
  --text1:#1c1c1e;--text2:#8e8e93;--text3:#c7c7cc;
  --border:#e5e5ea;--border2:#f2f2f7;--modal-bg:#f2f2f7;
  --green:#34c759;--green-bg:#d1fae5;--green-text:#065f46;
  --red:#ff3b30;--orange:#ff9500;--blue:#007aff;--blue-bg:#f0f6ff;
  --purple-bg:#ede9fe;--purple-text:#5b21b6;
  --yellow-bg:#fff3cd;--yellow-text:#856404;
  --pink-bg:#fce7f3;--pink-text:#9d174d;--pink-border:#f9a8d4;
  --tue-bg:#f9f9f9;--inc-bg:#f0fdf4;--inc-border:#bbf7d0;
  --memo-bg:#fdf2f8;--memo-border:#f9a8d4;
  --shadow:0 1px 3px rgba(0,0,0,.06);--shadow2:0 1px 2px rgba(0,0,0,.05);
  --renta-bg:#fff7ed;--renta-border:#fed7aa;--renta-text:#c2410c;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;--bg5:#1c1c1e;
    --text1:#fff;--text2:#8e8e93;--text3:#48484a;
    --border:#38383a;--border2:#2c2c2e;--modal-bg:#1c1c1e;
    --green:#30d158;--green-bg:#0a2e1a;--green-text:#30d158;
    --red:#ff453a;--orange:#ff9f0a;--blue:#0a84ff;--blue-bg:#001a3d;
    --purple-bg:#1e1040;--purple-text:#bf83ff;
    --yellow-bg:#2e2000;--yellow-text:#ffd60a;
    --pink-bg:#2e0a1a;--pink-text:#ff6b9d;--pink-border:#7a2040;
    --tue-bg:#2c2c2e;--inc-bg:#0a2e1a;--inc-border:#0a5c2a;
    --memo-bg:#2e0a1a;--memo-border:#7a2040;
    --shadow:0 1px 3px rgba(0,0,0,.4);--shadow2:0 1px 2px rgba(0,0,0,.3);
    --renta-bg:#1a0e00;--renta-border:#7c3406;--renta-text:#fb923c;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text1)}
.wrap{padding:.75rem .3rem 5rem;max-width:100%;margin:0 auto;width:100%}
.inner{padding:0 .8rem}
.top-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.month-nav{display:flex;align-items:center;justify-content:space-between}
.nav-btn{background:none;border:0.5px solid var(--border);border-radius:10px;padding:6px 16px;cursor:pointer;font-size:15px;color:var(--text1);min-height:38px;font-family:inherit}
.nav-btn:active{background:var(--bg4)}
.month-title{font-size:17px;font-weight:600;color:var(--text1)}
.view-toggle{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:var(--bg4);border-radius:10px;padding:2px}
.vbtn{background:none;border:none;border-radius:8px;padding:7px 2px;cursor:pointer;font-size:10px;color:var(--text2);text-align:center;min-height:32px;font-family:inherit;font-weight:500}
.view-toggle{display:flex;flex-direction:column;gap:3px;background:var(--bg4);border-radius:12px;padding:3px}
.view-row{display:grid;gap:3px}
.view-row-1{grid-template-columns:repeat(3,1fr)}
.view-row-2{grid-template-columns:repeat(2,1fr);max-width:280px;margin:0 auto}
/* Summary toggle */
.sum-toggle{display:flex;gap:4px;margin-bottom:8px}
.sum-tog-btn{flex:1;padding:6px;border:0.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:11px;color:var(--text2);font-family:inherit;font-weight:500}
.sum-tog-btn.active{background:var(--bg2);color:var(--text1);font-weight:700;border-color:var(--blue)}
/* Charts */
.charts-view{display:flex;flex-direction:column;gap:10px}
.chart-seg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:var(--bg4);border-radius:10px;padding:2px;margin-bottom:2px}
.chart-seg-btn{padding:7px 4px;border:none;border-radius:8px;background:none;cursor:pointer;font-size:10px;color:var(--text2);font-family:inherit;font-weight:500;text-align:center}
.chart-seg-btn.active{background:var(--bg2);color:var(--text1);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.chart-card{background:var(--bg2);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:700;color:var(--text1);margin-bottom:14px}
.pie-wrap{position:relative;width:180px;height:180px;margin:0 auto 16px}
.pie-canvas{width:180px;height:180px}
.pie-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.pie-center-val{font-size:16px;font-weight:700;color:var(--text1)}
.pie-center-lbl{font-size:10px;color:var(--text2)}
.cat-legend{display:flex;flex-direction:column;gap:6px}
.cat-leg-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:10px;cursor:pointer}
.cat-leg-row:active{opacity:.7}
.cat-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.cat-name{flex:1;font-size:13px;color:var(--text1);font-weight:500}
.cat-amt{font-size:13px;font-weight:700;color:var(--text1)}
.cat-pct{font-size:10px;color:var(--text2);min-width:32px;text-align:right}
.bar-wrap{display:flex;flex-direction:column;gap:8px}
.bar-select{width:100%;font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit;margin-bottom:10px}
.bar-select:focus{border-color:var(--blue);outline:none}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-size:11px;color:var(--text2);width:36px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:20px;background:var(--bg4);border-radius:5px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:5px;background:var(--blue);transition:width .4s}
.bar-val{font-size:11px;color:var(--text1);font-weight:600;min-width:54px;text-align:right;flex-shrink:0}
/* Vertical bars */
.vbar-wrap{display:flex;align-items:flex-end;justify-content:space-around;gap:8px;height:200px;padding:0 8px}
.vbar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;height:100%}
.vbar-val{font-size:9px;color:var(--text1);font-weight:600;text-align:center;flex-shrink:0}
.vbar-track{width:60%;max-width:28px;flex:1;display:flex;align-items:flex-end;background:var(--bg4);border-radius:6px 6px 0 0;overflow:hidden;position:relative}
.vbar-fill{width:100%;position:absolute;bottom:0;left:0;border-radius:6px 6px 0 0;background:var(--blue);transition:height .4s}
.vbar-lbl{font-size:9px;color:var(--text2);text-align:center;flex-shrink:0}
/* Cat edit modal */
.cat-edit-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:160;align-items:flex-end;justify-content:center}
.cat-edit-bg.open{display:flex}
.cat-edit-box{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.cat-edit-inner{padding:0 1rem 1.5rem}
.cat-bill-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.cat-bill-item:last-child{border-bottom:none}
.cat-bill-chk{width:18px;height:18px;cursor:pointer;accent-color:var(--blue);flex-shrink:0}
.vbtn.active{background:var(--bg2);color:var(--text1);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.vbtn:active{opacity:.7}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1rem}
.stat{background:var(--bg2);border-radius:12px;padding:10px 11px;box-shadow:var(--shadow)}
.stat-label{font-size:9px;color:var(--text2);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.stat-value{font-size:15px;font-weight:600;color:var(--text1)}
.stat-value.ok{color:var(--green)}.stat-value.bad{color:var(--red)}.stat-value.warn{color:var(--orange)}.stat-value.info{color:var(--blue)}
.legend{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)}
.leg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;width:calc(100vw - 24px);max-width:calc(100vw - 24px);margin-left:calc(-50vw + 50% + 12px);margin-right:calc(-50vw + 50% + 12px)}
.cal-hdr{font-size:11px;font-weight:600;color:var(--text2);text-align:center;padding:5px 0;text-transform:uppercase}
.cal-day{min-height:66px;border:0.5px solid var(--border);border-radius:8px;padding:4px;cursor:pointer;background:var(--bg2)}
.cal-day:active{opacity:.7}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day.today{border-color:var(--blue);background:var(--blue-bg)}
.cal-day.today .day-num{color:var(--blue);font-weight:700}
.cal-day.tuesday{background:var(--tue-bg)}
.cal-day.cur-week{border:1.5px solid var(--orange)}
.cal-day.cur-week.today{border:1.5px solid var(--blue);background:var(--blue-bg)}
.cal-day.cur-week.tuesday{border:1.5px solid var(--orange);background:var(--tue-bg)}
.day-num{font-size:12px;color:var(--text2);margin-bottom:2px;line-height:1;font-weight:500}
.income-bar{font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px;background:var(--green-bg);color:var(--green-text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bill-dot{font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.4}
.bill-dot.unpaid{background:var(--yellow-bg);color:var(--yellow-text)}
.bill-dot.paid{background:var(--green-bg);color:var(--green-text);text-decoration:line-through;opacity:.7}
.bill-dot.quarterly{background:var(--purple-bg);color:var(--purple-text)}
.bill-dot.weekly{background:var(--green-bg);color:var(--green-text)}
.bill-dot.personal{background:var(--blue-bg);color:var(--blue)}
.bill-dot.memo{background:var(--pink-bg);color:var(--pink-text);font-style:italic}
.more{font-size:8px;color:var(--text2);margin-top:1px}
.extra-dots{display:flex;flex-wrap:wrap;gap:1px;margin-top:2px;padding:1px 0}
/* METAS */
.meta-card{background:var(--bg2);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.meta-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.meta-card-title{font-size:15px;font-weight:700;color:var(--text1)}
.meta-card-desc{font-size:11px;color:var(--text2);margin-top:2px}
.meta-card-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0 2px;font-family:inherit;flex-shrink:0}
.meta-progress-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.meta-aportado{font-size:22px;font-weight:700;color:var(--text1)}
.meta-objetivo{font-size:12px;color:var(--text2)}
.meta-pbw{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:10px}
.meta-pbf{height:100%;border-radius:3px;background:var(--blue);transition:width .4s}
.meta-pbf.done{background:var(--green)}
.meta-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.meta-stat{background:var(--bg3);border-radius:10px;padding:8px;text-align:center}
.meta-stat-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.meta-stat-val{font-size:13px;font-weight:700;color:var(--text1)}
.meta-aporte-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:0.5px solid var(--border2);font-size:12px}
.meta-aporte-row:last-child{border-bottom:none}
.meta-add-form{display:flex;gap:6px;margin-top:10px}
.meta-add-form input{flex:1;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit}
.meta-add-form input:focus{border-color:var(--blue);outline:none}
.meta-add-btn{background:var(--blue);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.meta-add-btn:active{opacity:.8}
.meta-empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
/* Meta edit modal */
.meta-modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:160;align-items:flex-end;justify-content:center}
.meta-modal-bg.open{display:flex}
.meta-modal-box{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.meta-modal-inner{padding:0 1rem 1.5rem}

/* DELETE OPTIONS */
.del-opts-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:150;align-items:flex-end;justify-content:center}
.del-opts-bg.open{display:flex}
.del-opts-box{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:1rem 1rem calc(1rem + env(safe-area-inset-bottom));width:100%;max-width:430px}
.del-opts-title{font-size:13px;font-weight:600;color:var(--text2);text-align:center;margin-bottom:12px}
.del-opt-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit;margin-bottom:8px;text-align:center}
.del-opt-month{background:var(--yellow-bg);color:var(--yellow-text)}
.del-opt-perm{background:#fef2f2;color:var(--red)}
.del-opt-cancel{background:var(--bg4);color:var(--text2)}
.cancelled-section{margin-top:12px;background:var(--bg2);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.cancelled-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;background:var(--bg5)}
.cancelled-head:active{opacity:.7}
.cancelled-title{font-size:13px;font-weight:600;color:var(--text2)}
.cancelled-body{display:none;padding:0 14px 10px}
.cancelled-body.open{display:block}
.cancelled-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.cancelled-row:last-child{border-bottom:none}
.cancelled-name{color:var(--text2);flex:1;text-decoration:line-through}
.cancelled-restore{background:var(--green-bg);border:none;border-radius:8px;padding:5px 10px;font-size:11px;color:var(--green-text);font-weight:600;cursor:pointer;font-family:inherit}
.cancelled-restore:active{opacity:.7}

/* ADD BILL */
.fab{position:fixed;bottom:calc(1.5rem + env(safe-area-inset-bottom));right:1rem;width:52px;height:52px;border-radius:26px;background:var(--blue);border:none;cursor:pointer;font-size:26px;color:#fff;box-shadow:0 4px 16px rgba(0,122,255,.4);display:flex;align-items:center;justify-content:center;z-index:90;font-family:inherit}
.fab:active{opacity:.8;transform:scale(.95)}
.add-modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:110;align-items:flex-end;justify-content:center}
.add-modal-bg.open{display:flex}
.add-modal{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);width:100%;max-width:430px;max-height:92vh;overflow-y:auto}
.add-modal-inner{padding:0 1rem 1.5rem}
.add-field{margin-bottom:14px}
.add-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.add-input{width:100%;font-size:15px;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg3);color:var(--text1);font-family:inherit}
.add-input:focus{border-color:var(--blue);outline:none;background:var(--bg2)}
.add-seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.add-seg-btn{padding:10px 4px;border:1.5px solid var(--border);border-radius:10px;background:none;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit;font-weight:500;text-align:center}
.add-seg-btn.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);font-weight:700}
.add-seg-btn:active{opacity:.7}
.add-months-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.add-month-btn{padding:8px 4px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:11px;color:var(--text2);font-family:inherit;font-weight:500;text-align:center}
.add-month-btn.sel{border-color:var(--purple-text);background:var(--purple-bg);color:var(--purple-text);font-weight:700}
.add-save-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:16px;cursor:pointer;font-weight:700;font-family:inherit;margin-top:8px}
.add-save-btn:active{opacity:.8}
.add-cancel-btn{width:100%;padding:12px;border:none;border-radius:12px;background:var(--bg4);color:var(--text1);font-size:14px;cursor:pointer;font-weight:600;font-family:inherit;margin-top:6px}
.custom-bill-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;background:var(--blue-bg);border:0.5px solid var(--blue);margin-bottom:3px}
.custom-bill-del{background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;padding:0 2px;font-family:inherit}

/* NOTIFICATION BANNER */
.notif-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding-top:env(safe-area-inset-top)}
.notif-bg.open{display:flex}
.notif-box{background:var(--bg2);border-radius:0 0 20px 20px;width:100%;max-width:430px;padding:16px 18px 20px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.notif-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.notif-title{font-size:14px;font-weight:700;color:var(--orange)}
.notif-date{font-size:11px;color:var(--text2)}
.notif-close{background:var(--bg4);border:none;border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text1);font-family:inherit;font-weight:600}
.notif-close:active{opacity:.7}
.notif-bill{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.notif-bill:last-child{border-bottom:none}
.notif-bill-name{color:var(--text1);font-weight:500}
.notif-bill-amt{color:var(--orange);font-weight:700}
.notif-empty{font-size:13px;color:var(--text2);padding:4px 0}

.list-view{display:flex;flex-direction:column;gap:2px}
.sec-title{font-size:10px;font-weight:600;color:var(--text2);padding:8px 4px 4px;text-transform:uppercase;letter-spacing:.5px}
.list-item{display:grid;grid-template-columns:26px 1fr auto auto;align-items:center;gap:6px;padding:10px 12px;border-radius:12px;background:var(--bg2);box-shadow:var(--shadow2)}
.list-item.inc-row{background:var(--inc-bg);box-shadow:none;border:0.5px solid var(--inc-border)}
.list-item.memo-row{background:var(--memo-bg);box-shadow:none;border:0.5px solid var(--memo-border)}
.li-day{font-size:11px;font-weight:600;color:var(--text2);text-align:center}
.li-name{font-size:13px;color:var(--text1);font-weight:500}
.li-name.done{text-decoration:line-through;opacity:.4}
.li-sub{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap;align-items:center}
.badge{font-size:9px;border-radius:4px;padding:1px 5px;font-weight:500}

var MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var INICIO='2026-04-07';

function fmtDate(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+' '+MESES[parseInt(p[1])-1]+' '+p[0];}
function fmtCorto(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+' '+MESES[parseInt(p[1])-1];}
function toISO(d,m,y){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function fmt(v){return'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtS(v){return(v>=0?'+':'')+fmt(v);}
function mk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function addDays(iso,n){var d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function todayISO(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}

function getTues(y,m){var t=[],dim=new Date(y,m+1,0).getDate();for(var d=1;d<=dim;d++)if(new Date(y,m,d).getDay()===2)t.push(d);return t;}
function rentaAmt(y,m){
  // La renta que se junta en mes (y,m) es para el mes siguiente
  return semsRentaLunDom(y,m).length>=5?600:800;
}
function anitaAmt(y,m){if(y<2026||(y===2026&&m<=4))return 190;if(y===2026&&m>=5&&m<=7)return 170;return 125;}

function genAll(){var sems=[],ini=INICIO,lim='2027-12-31';while(ini<=lim){sems.push({inicio:ini,fin:addDays(ini,6)});ini=addDays(ini,7);}return sems;}
function semsForView(y,m){
  var ms=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var dim=new Date(y,m+1,0).getDate();
  var me=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dim).padStart(2,'0');
  return genAll().filter(function(s){return s.inicio>=addDays(ms,-14)&&s.inicio<=me;});
}
function semsStrictMonth(y,m){
  // Solo semanas cuyo inicio cae en este mes
  var ms=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var dim=new Date(y,m+1,0).getDate();
  var me=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dim).padStart(2,'0');
  return genAll().filter(function(s){return s.inicio>=ms&&s.inicio<=me;});
}
function getPayingSem(){
  // "Pagando ahora" = la semana que TRABAJASTE y que te están pagando ahorita
  // Ciclo: trabajas sem N → te pagan en sem N+1 → pagas bills en sem N+1
  // Entonces "pagando ahora" = sem actual - 2
  var t=todayISO(),all=genAll();
  var curIdx=-1;
  for(var i=0;i<all.length;i++){
    if(all[i].inicio<=t&&all[i].fin>=t){curIdx=i;break;}
  }
  if(curIdx<0){
    for(var i=0;i<all.length;i++){if(all[i].fin<t)curIdx=i;}
  }
  var payIdx=curIdx-2;
  if(payIdx>=0)return all[payIdx].inicio;
  if(curIdx>0)return all[curIdx-1].inicio;
  return all[0].inicio;
}
function getCurPayWeekDays(y,m){
  // Semana actual mar-lun usando ISO strings
  var today=new Date();
  var dow=today.getDay(); // 0=dom,1=lun,2=mar,3=mié,...
  var daysFromTue=(dow-2+7)%7; // días desde el último martes
  var tueStart=new Date(today);tueStart.setDate(today.getDate()-daysFromTue);
  var monEnd=new Date(tueStart);monEnd.setDate(tueStart.getDate()+6);
  var tueISO=tueStart.getFullYear()+'-'+String(tueStart.getMonth()+1).padStart(2,'0')+'-'+String(tueStart.getDate()).padStart(2,'0');
  var monISO=monEnd.getFullYear()+'-'+String(monEnd.getMonth()+1).padStart(2,'0')+'-'+String(monEnd.getDate()).padStart(2,'0');
  var days={},dim=new Date(y,m+1,0).getDate();
  for(var d=1;d<=dim;d++){
    var iso=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(iso>=tueISO&&iso<=monISO)days[d]=true;
  }
  return days;
}
function findSemForDate(fechaISO){
  var all=genAll();
  for(var i=0;i<all.length;i++){if(fechaISO>=all[i].inicio&&fechaISO<=all[i].fin)return all[i];}
  return null;
}

}

function mBills(y,m){
  return BILLS.filter(function(b){
    if(isBillCancelled(b.id))return false;
    if(isBillSkippedMonth(y,m,b.id))return false;
    if(b.quarterly){if(b.startYear&&(y<b.startYear||(y===b.startYear&&m<b.qMonths[0])))return false;return b.qMonths.indexOf(m)>=0;}
    return true;
  }).map(function(b){
    var base=b.amount;
    if(b.special==='anita')base=anitaAmt(y,m);
    if(b.special==='renta')base=rentaAmt(y,m);
    return Object.assign({},b,{baseAmount:base});
  });
}

  days.forEach(function(d){
    if(new Date(y,m,d).getDay()===2){
      // no sumar WKL aquí porque ya se restan como fijos en rRenta()
    }
  });
  return out;
}

// Días de la semana laboral (mié-mar) que tocan en el mes
function semDaysInMonth(y,m,sem){
  var ms=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var dim=new Date(y,m+1,0).getDate();
  var me=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dim).padStart(2,'0');
  var days=[];
  for(var d=1;d<=dim;d++){
    var iso=mk(y,m,d);
    if(iso>=sem.inicio&&iso<=sem.fin)days.push(d);
  }
  return days;
}

function addInc(y,m,d,amt,note,fromCheque,pid){
  var k=mk(y,m,d);if(!state.income[k])state.income[k]=[];
  var id=pid||Date.now();
  var e={id:id,amount:Number(amt),note:note||'',fromCheque:fromCheque?true:false};
  if(pid)e.pagoId=pid;
  state.income[k].push(e);
  if(!fromCheque){
    var fechaISO=mk(y,m,d);
    var sem=findSemForDate(fechaISO);
    if(sem){
      var sk='sem_'+sem.inicio;
      if(!state.pagos[sk])state.pagos[sk]=[];
      var exists=state.pagos[sk].some(function(p){return p.calIncId&&p.calIncId===id;});
      if(!exists)state.pagos[sk].push({fecha:fechaISO,amount:Number(amt),nota:note||'Ingreso calendario',calIncId:id,fromCal:true});
    }
  }
  save();
}
function delInc(y,m,d,id){
  var k=mk(y,m,d);
  var entry=getDayInc(y,m,d).find(function(e){return e.id===id;});
  state.income[k]=(state.income[k]||[]).filter(function(e){return e.id!==id;});
  if(entry&&!entry.fromCheque){
    Object.keys(state.pagos).forEach(function(sk){state.pagos[sk]=(state.pagos[sk]||[]).filter(function(p){return p.calIncId!==id;});});
  }
  save();
}
function delByPid(pid){Object.keys(state.income).forEach(function(k){state.income[k]=(state.income[k]||[]).filter(function(e){return e.pagoId!==pid;});});save();}

function delSemP(ini,pi){
  var k=getSK(ini),pagos=state.pagos[k]||[],pago=pagos[pi];
  if(pago&&pago.pagoId)delByPid(pago.pagoId);
  if(pago&&pago.calIncId){Object.keys(state.income).forEach(function(ik){state.income[ik]=(state.income[ik]||[]).filter(function(e){return e.id!==pago.calIncId;});});}
  pagos.splice(pi,1);state.pagos[k]=pagos;save();
}

function calcMonth(y,m){
  var tues=getTues(y,m),tb=0,pb=0,ti=0;
  mBills(y,m).forEach(function(b){if(b.memo)return;var d=getBD(y,m,b);tb+=d.amount;if(d.paid)pb+=d.amount;});
  tues.forEach(function(day){WKL.forEach(function(wb){var d=getWD(y,m,day,wb);tb+=d.amount;if(d.paid)pb+=d.amount;});var rd=getWD(y,m,day,REGALO);tb+=rd.amount;if(rd.paid)pb+=rd.amount;});
  var dim=new Date(y,m+1,0).getDate();
  for(var d=1;d<=dim;d++)ti+=getDayIncT(y,m,d);
  return{tb:tb,pb:pb,pend:tb-pb,ti:ti,bal:ti-tb};
}

function rCal(){
  var y=cur.getFullYear(),m=cur.getMonth(),today=new Date();

  var dim=new Date(y,m+1,0).getDate();
  for(var d=1;d<=dim;d++){
    var isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var isTue=new Date(y,m,d).getDay()===2;
    var isCW=cwDays[d]?true:false;
    var monthly=mBills(y,m).filter(function(b){return getBillDay(y,m,b)===d;});
  var customDay2=getCustomBills(y,m).filter(function(b){return b.day===d;});
  monthly=monthly.concat(customDay2.map(function(b){return Object.assign({},b,{baseAmount:b.amount,isCustom:true});}));
    var customDay=getCustomBills(y,m).filter(function(b){return b.day===d;});
    monthly=monthly.concat(customDay.map(function(b){return Object.assign({},b,{baseAmount:b.amount,isCustom:true});}));
    var weekly=isTue?WKL:[];
    var incT=getDayIncT(y,m,d),allItems=monthly.concat(weekly);
    var inner='<div class="day-num">'+d+'</div>';
    if(incT>0)inner+='<div class="income-bar">+'+fmt(incT)+'</div>';
    var shown=0,limit=incT>0?1:2;
    // Recopilar info de todos los items para los puntos
    var allInfo=[];
    allItems.forEach(function(b){
      var cls,paid;
      if(b.id==='despensa'||b.id==='gasolina'){var wd=getWD(y,m,d,b);paid=wd.paid;cls=paid?'paid':'weekly';}
      else if(b.id==='personal'){var wd2=getWD(y,m,d,b);paid=wd2.paid;cls=paid?'paid':'personal';}
      else{var bd=getBD(y,m,b);paid=bd.paid;cls=b.memo?'memo':b.quarterly?'quarterly':(paid?'paid':'unpaid');}
      allInfo.push({name:b.name,cls:cls});
    });
    if(isTue){var rDone=getRegaloDone(y,m,d);allInfo.push({name:'🎁',cls:rDone?'paid':'memo'});}
    // Mostrar hasta el límite
    allInfo.forEach(function(info,i){
      if(i<limit)inner+='<div class="bill-dot '+info.cls+'">'+info.name+'</div>';
    });
    // Puntos de colores para los que no caben
    if(allInfo.length>limit){
      var dots='<div class="extra-dots">';
      for(var ei=limit;ei<allInfo.length;ei++){

// ── MI RENTA: semanas LUNES-DOMINGO ──────────────────────────────────────
// Regla: la semana que CONTIENE el día 8 es la ÚLTIMA aportación del mes.
// El lunes ya tienes el cheque completo y puedes pagar el día 8 esa semana.
// La semana SIGUIENTE al día 8 ya empieza el fondo del mes siguiente.

function isoDeDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function lunDomDeIso(iso){
  var d=new Date(iso+'T12:00:00');
  var dow=d.getDay();
  if(dow===0)d.setDate(d.getDate()-6);
  else d.setDate(d.getDate()-(dow-1));
  return d;
}

// Mi Renta: semanas MAR-LUN, pago el día 10 del mes SIGUIENTE
// Cuando estás en mes M, juntas para la renta del mes M+1
// Última semana válida: la que su LUNES (fin) sea < día 10 del mes siguiente
// Primera semana: martes siguiente al último lunes válido del mes actual (que fue para el mes M)

function ultimoLunesAntesDia10(ry,rm){
  // Último lunes estrictamente antes del día 10 de (ry,rm)
  var dia10=new Date(ry,rm,10);
  var d=new Date(dia10);
  d.setDate(d.getDate()-1); // empezar desde día 9
  while(d.getDay()!==1)d.setDate(d.getDate()-1); // retroceder al lunes
  return isoDeDate(d);
}

function semsRentaLunDom(ry,rm){
  // (ry,rm) ES el mes de la renta a pagar
  // Última semana: el martes cuyo lunes (fin) sea < día 10 de (ry,rm)
  var ultLunes=ultimoLunesAntesDia10(ry,rm);
  var ultMartes=addDays(ultLunes,-6);

  // Primera semana: martes siguiente al último lunes antes del día 10 del mes anterior
  var prevM=rm-1,prevY=ry;
  if(prevM<0){prevM=11;prevY--;}
  var ultLunesPrev=ultimoLunesAntesDia10(prevY,prevM);
  var primerMartes=addDays(ultLunesPrev,1);
  // asegurar que sea martes
  var d=new Date(primerMartes+'T12:00:00');
  while(d.getDay()!==2)d.setDate(d.getDate()+1);
  primerMartes=isoDeDate(d);

  // Generar semanas mar-lun
  var sems=[];
  var cur=primerMartes;
  while(cur<=ultMartes){
    var fin=addDays(cur,6);
    sems.push({inicio:cur,fin:fin});
    cur=addDays(cur,7);
    if(sems.length>30)break;
  }
  return sems;
}

// Bills (sin renta) que caen en una semana lun-dom
function billsEnSem(sem){
  var out=0;
  var d=new Date(sem.inicio+'T12:00:00');
  var fin=new Date(sem.fin+'T12:00:00');
  while(d<=fin){
    var dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
    mBills(dy,dm).forEach(function(b){
      if(b.special==='renta')return;
      if(getBillDay(dy,dm,b)===dd)out+=getBD(dy,dm,b).amount;
    });
    d.setDate(d.getDate()+1);
  }
  return out;
}

function rRenta(){
  var y=cur.getFullYear(),m=cur.getMonth();
  var t=todayISO();
  var wklFijos=WKL.reduce(function(a,wb){return a+wb.amount;},0);

  // Determinar qué renta mostrar según fecha de HOY
  // Si hoy <= día 10 → renta del mes actual
  // Si hoy > día 10 → renta del mes siguiente
  var todayD=new Date();
  var nextRentM,nextRentY;
  if(todayD.getDate()<=10){
    nextRentM=todayD.getMonth();
    nextRentY=todayD.getFullYear();
  } else {
    nextRentM=todayD.getMonth()+1;
    nextRentY=todayD.getFullYear();
    if(nextRentM>11){nextRentM=0;nextRentY++;}
  }

  // Semanas mar-lun que aportan a esta renta
  var semsRenta=semsRentaLunDom(nextRentY,nextRentM);
  var meta=semsRenta.length>=5?600:800;

  // Aportes guardados
  var aportes=getRentaAportes(nextRentY,nextRentM);
  var totalAportado=aportes.reduce(function(a,x){return a+Number(x.amount);},0);
  var falta=Math.max(0,meta-totalAportado);
  var pct=Math.min(100,Math.round(totalAportado/meta*100));

  // Semanas restantes
  var semsRestantes=semsRenta.filter(function(s){return s.fin>=t;});
  var sugerencia=semsRestantes.length>0?Math.ceil(falta/semsRestantes.length):0;

  // Día 10 info
  var dia8=new Date(nextRentY,nextRentM,10);
  var dow8=dia8.getDay();
  var dias=['dom','lun','mar','mié','jue','vie','sáb'];
  var diasFull=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var dia10nota='vence día 10 = '+diasFull[dow8];

  var html='<div class="renta-view">';

  // HERO
  html+='<div class="renta-hero">'+
    '<div class="renta-hero-title" style="display:flex;justify-content:space-between;align-items:center">'+

    '</div>'+
    '<div class="renta-meta-row">'+
      '<div class="renta-meta-left">'+
        '<div class="renta-meta-amt">'+fmt(totalAportado)+'</div>'+
        '<div class="renta-meta-sub">de '+fmt(meta)+' meta · '+semsRenta.length+' semanas</div>'+
      '</div>'+
      '<div class="renta-meta-right">'+
        '<div class="renta-meta-goal">'+(falta>0?'Faltan':'')+'</div>'+
        '<div class="renta-meta-pct" style="color:'+(falta===0?'var(--green)':falta<meta*0.5?'var(--orange)':'var(--red)')+'">'+
        (falta===0?'✓ Completo':fmt(falta))+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="pbw2"><div class="pbf2'+(pct>=100?' ok':'')+'" style="width:'+pct+'%"></div></div>'+
    '<div class="renta-stats">'+
      '<div class="renta-stat"><div class="renta-stat-label">Aportado</div><div class="renta-stat-val ok">'+fmt(totalAportado)+'</div></div>'+
      '<div class="renta-stat"><div class="renta-stat-label">Meta</div><div class="renta-stat-val">'+fmt(meta)+'</div></div>'+

function calcSemActual(y,m){
  var t=todayISO();
  var allSems=genAll();

  // Semana actual mar-lun (la que contiene hoy)
  var curSem=null;
  for(var i=0;i<allSems.length;i++){
    if(allSems[i].inicio<=t&&allSems[i].fin>=t){curSem=allSems[i];break;}
  }
  if(!curSem){
    for(var i=0;i<allSems.length;i++){if(allSems[i].fin<t)curSem=allSems[i];}
  }
  if(!curSem)return{tb:0,pb:0,pend:0,ti:0,bal:0,semLabel:'—'};

  var tb=0,pb=0,ti=0;
  // Gastos: bills que caen en la semana mié-mar actual
  var d=new Date(curSem.inicio+'T12:00:00');
  var finD=new Date(curSem.fin+'T12:00:00');
  while(d<=finD){
    var dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
    mBills(dy,dm).forEach(function(b){
      if(getBillDay(dy,dm,b)===dd&&!b.memo){var bd=getBD(dy,dm,b);tb+=bd.amount;if(bd.paid)pb+=bd.amount;}
    });
    if(d.getDay()===2){WKL.forEach(function(wb){var wd=getWD(dy,dm,dd,wb);tb+=wd.amount;if(wd.paid)pb+=wd.amount;});var rd=getWD(dy,dm,dd,REGALO);tb+=rd.amount;if(rd.paid)pb+=rd.amount;}
    d.setDate(d.getDate()+1);
  }
  // Ingresos: lo cobrado en la semana "pagando ahora" (2 atrás de la actual)
  // Esos son los que financian los gastos de esta semana
  var allSemsInc=genAll();
  var curIdxInc=-1;
  for(var i=0;i<allSemsInc.length;i++){
    if(allSemsInc[i].inicio<=t&&allSemsInc[i].fin>=t){curIdxInc=i;break;}
  }
  if(curIdxInc<0){
    for(var i=0;i<allSemsInc.length;i++){if(allSemsInc[i].fin<t)curIdxInc=i;}
  }
  var incSemIdx=curIdxInc-2;
  if(incSemIdx>=0){
    var semP=getSemP(allSemsInc[incSemIdx].inicio);
    ti=semP.reduce(function(a,p){return a+Number(p.amount);},0);
  }

  var MESES_S=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var ls=new Date(curSem.inicio+'T12:00:00'),de=new Date(curSem.fin+'T12:00:00');
  var semLabel=ls.getDate()+' '+MESES_S[ls.getMonth()]+' – '+de.getDate()+' '+MESES_S[de.getMonth()];
  return{tb:tb,pb:pb,pend:tb-pb,ti:ti,bal:ti-tb,semLabel:semLabel};
}

  if(b){
    if(isBillCancelled(b.id)||isBillSkippedMonth(y,m,b.id))return 0;
    var bills=mBills(y,m);
    var found=bills.find(function(x){return x.id===billId;});
    if(!found)return 0;
    return getBD(y,m,found).amount;
  }
  // Try weekly
  var wb=WKL.find(function(x){return x.id===billId;});
  if(wb){
    var tues=getTues(y,m);
    return tues.reduce(function(a,day){return a+getWD(y,m,day,wb).amount;},0);
  }
  // Custom bills
  var cb=(state.customBills||[]).find(function(x){return x.id===billId;});
  if(cb&&getCustomBills(y,m).find(function(x){return x.id===billId;}))return cb.amount;
  return 0;
}

function getAllBillIds(){
  var ids=BILLS.map(function(b){return b.id;});
  WKL.forEach(function(w){ids.push(w.id);});
  (state.customBills||[]).forEach(function(c){ids.push(c.id);});
  return ids;
}
function getAllBillName(id){
  var b=BILLS.find(function(x){return x.id===id;});if(b)return b.name;
  var w=WKL.find(function(x){return x.id===id;});if(w)return w.name;
  var c=(state.customBills||[]).find(function(x){return x.id===id;});if(c)return c.name;
  return id;
}

function drawPie(canvas,data){
  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=Math.min(W,H)/2-4;
  ctx.clearRect(0,0,W,H);
  var total=data.reduce(function(a,d){return a+d.val;},0);
  if(total===0)return;
  var angle=-Math.PI/2;
  data.forEach(function(d){
    var slice=2*Math.PI*(d.val/total);
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath();ctx.fillStyle=d.color;ctx.fill();
    angle+=slice;
  });
  // donut hole
  ctx.beginPath();ctx.arc(cx,cy,r*0.55,0,2*Math.PI);
  ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--bg2')||'#1c1c1e';
  ctx.fill();
}

      var d=new Date(y,m-i,1);
      months.push({y:d.getFullYear(),m:d.getMonth()});
    }
    var maxAmt=0;
    var mData=months.map(function(mp){
      var c=calcMonth(mp.y,mp.m);
      if(c.tb>maxAmt)maxAmt=c.tb;
      return{label:MESES[mp.m].slice(0,3),val:c.tb,paid:c.pb};
    });
    html+='<div class="chart-card"><div class="chart-title">Gastos últimos 6 meses</div><div class="vbar-wrap">';
    mData.forEach(function(d){
      var pct=maxAmt>0?Math.round(d.val/maxAmt*100):0;
      html+='<div class="vbar-col">'+

        '<span class="vbar-lbl">'+d.label+'</span>'+
      '</div>';
    });

}

var META_ICONS=['🏖️','🚗','🏠','🛡️','✈️','🎓','💍','🖥️','📱','🐾','🎯','💰'];

function getMetas(){return state.metas||[];}
function saveMetas(m){state.metas=m;save();}

  var ms=getMetas();

  m.aportes.push({id:Date.now(),fecha:todayISO(),amount:amt,nota:nota||''});

function rMetas(){
  var metas=getMetas();
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
    '<div style="font-size:16px;font-weight:700;color:var(--text1)">Metas de ahorro</div>'+
    '<button id="addMetaBtn" style="background:var(--blue);border:none;border-radius:20px;padding:6px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">+ Nueva</button>'+
  '</div>';

  if(metas.length===0){
    html+='<div class="meta-empty">🎯<br><br>No tienes metas aún.<br>Toca "+ Nueva" para crear una.</div>';
  } else {
    metas.forEach(function(meta){
      var total=( meta.aportes||[]).reduce(function(a,x){return a+Number(x.amount);},0);
      var pct=meta.monto>0?Math.min(100,Math.round(total/meta.monto*100)):0;
      var falta=Math.max(0,meta.monto-total);
      var done=total>=meta.monto;
      // Days remaining
      var diasRestantes='';
      var sugerido='';
      if(meta.fecha){
        var hoy=new Date();
        var fechaObj=new Date(meta.fecha+'T12:00:00');
        var dias=Math.ceil((fechaObj-hoy)/(1000*60*60*24));
        diasRestantes=dias>0?dias+' días':dias===0?'¡Hoy!':'Vencida';
        var semsRest=Math.ceil(dias/7);
        if(semsRest>0&&falta>0)sugerido=fmt(Math.ceil(falta/semsRest))+'/sem';
      }
      html+='<div class="meta-card">'+
        '<div class="meta-card-header">'+
          '<div>'+
            '<div class="meta-card-title">'+(meta.icon||'🎯')+' '+meta.name+'</div>'+
            (meta.desc?'<div class="meta-card-desc">'+meta.desc+'</div>':'')+
          '</div>'+
          '<button class="meta-card-del" data-metaid="'+meta.id+'">✏️</button>'+
        '</div>'+
        '<div class="meta-progress-row">'+
          '<span class="meta-aportado" style="color:'+(done?'var(--green)':'var(--text1)')+'">'+fmt(total)+'</span>'+
          '<span class="meta-objetivo">de '+fmt(meta.monto)+' meta</span>'+
        '</div>'+
        '<div class="meta-pbw"><div class="meta-pbf'+(done?' done':'')+'" style="width:'+pct+'%"></div></div>'+
        '<div class="meta-stats">'+
          '<div class="meta-stat"><div class="meta-stat-lbl">Faltan</div><div class="meta-stat-val" style="color:'+(done?'var(--green)':'var(--orange)')+'">'+( done?'✓':fmt(falta))+'</div></div>'+
          '<div class="meta-stat"><div class="meta-stat-lbl">'+(meta.fecha?'Tiempo':'Progreso')+'</div><div class="meta-stat-val">'+( meta.fecha?diasRestantes:pct+'%')+'</div></div>'+
          '<div class="meta-stat"><div class="meta-stat-lbl">Sugerido</div><div class="meta-stat-val" style="color:var(--orange)">'+(sugerido||pct+'%')+'</div></div>'+
        '</div>';

      // Aportes
      if(meta.aportes&&meta.aportes.length>0){
        html+='<div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px">Aportaciones</div>';
        meta.aportes.slice().reverse().forEach(function(a){
          html+='<div class="meta-aporte-row">'+
            '<span style="color:var(--text2);flex-shrink:0">'+fmtDate(a.fecha)+'</span>'+
            '<span style="flex:1;padding:0 6px;color:var(--text2)">'+( a.nota||'Aporte')+'</span>'+
            '<span style="color:var(--green);font-weight:600">'+fmt(a.amount)+'</span>'+
            '<button style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;margin-left:6px;font-family:inherit" data-metaid="'+meta.id+'" data-aporteid="'+a.id+'">×</button>'+
          '</div>';
        });
      }

      // Add aporte form
      html+='<div class="meta-add-form">'+
        '<input type="number" placeholder="Monto" min="0" step="10" id="mamt_'+meta.id+'">'+
        '<input type="text" placeholder="Nota (opcional)" id="mnota_'+meta.id+'" style="max-width:110px">'+
        '<button class="meta-add-btn" data-metaid2="'+meta.id+'">+ Agregar</button>'+
      '</div>';

      html+='</div>';
    });
  }

  document.getElementById('metasView').innerHTML=html;

  // Add meta button
  document.getElementById('addMetaBtn').addEventListener('click',function(){openMetaModal(null);});

  // Edit meta
  document.querySelectorAll('.meta-card-del').forEach(function(btn){
    btn.addEventListener('click',function(){
      var meta=getMetas().find(function(m){return m.id===btn.dataset.metaid;});
      if(meta)openMetaModal(meta);
    });
  });

  // Delete aporte
  document.querySelectorAll('[data-aporteid]').forEach(function(btn){
    btn.addEventListener('click',function(){
      delMetaAporte(btn.dataset.metaid,parseInt(btn.dataset.aporteid));
      rMetas();
    });
  });

  // Add aporte
  document.querySelectorAll('[data-metaid2]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=btn.dataset.metaid2;
      var amt=parseFloat(document.getElementById('mamt_'+id).value)||0;
      var nota=document.getElementById('mnota_'+id).value.trim();
      if(!amt)return;
      addMetaAporte(id,amt,nota);
      rMetas();
    });
  });
}

// CANCELLED BILLS
function isBillCancelled(id){return (state.cancelledBills||[]).indexOf(id)>=0;}
function isBillSkippedMonth(y,m,id){return !!(state.skippedBills&&state.skippedBills[mk(y,m,1)+'_'+id]);}
function cancelBillPerm(id){if(!state.cancelledBills)state.cancelledBills=[];if(state.cancelledBills.indexOf(id)<0)state.cancelledBills.push(id);save();}
function restoreBill(id){state.cancelledBills=(state.cancelledBills||[]).filter(function(x){return x!==id;});save();}
function skipBillMonth(y,m,id){if(!state.skippedBills)state.skippedBills={};state.skippedBills[mk(y,m,1)+'_'+id]=true;save();}
function unskipBillMonth(y,m,id){if(state.skippedBills)delete state.skippedBills[mk(y,m,1)+'_'+id];save();}
// NOTIFICATION: bills del día siguiente
function getBillsForDay(dy,dm,dd){
  var bills=mBills(dy,dm).filter(function(b){return getBillDay(dy,dm,b)===dd;});
  var custom=getCustomBills(dy,dm).filter(function(b){return b.day===dd;});
  return bills.concat(custom);
}
function showNotif(){
  var today=new Date();
  var toy=today.getFullYear(),tom=today.getMonth(),tod=today.getDate();
  var tomorrow=new Date(today);tomorrow.setDate(today.getDate()+1);
  var ty=tomorrow.getFullYear(),tm=tomorrow.getMonth(),td=tomorrow.getDate();
  var dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var MESES_S=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  function buildBillRows(dy,dm,dd){
    var rows='';
    var bills=getBillsForDay(dy,dm,dd);
    var isMartes=new Date(dy,dm,dd).getDay()===2;
    bills.forEach(function(b){
      var bd=getBD(dy,dm,b);
      if(!bd.paid)rows+='<div class="notif-bill"><span class="notif-bill-name">'+b.name+'</span><span class="notif-bill-amt">'+fmt(bd.amount)+'</span></div>';
    });
    if(isMartes){
      WKL.forEach(function(wb){
        var wd=getWD(dy,dm,dd,wb);
        if(!wd.paid)rows+='<div class="notif-bill"><span class="notif-bill-name">'+wb.name+'</span><span class="notif-bill-amt">'+fmt(wd.amount)+'</span></div>';
      });
    }
    return rows;
  }

  var todayRows=buildBillRows(toy,tom,tod);
  var tomorrowRows=buildBillRows(ty,tm,td);

  var html='';
  // HOY
  html+='<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">📌 Hoy — '+dias[today.getDay()]+' '+tod+' '+MESES_S[tom]+'</div>';
  html+=todayRows||'<div class="notif-empty">Sin bills hoy 🎉</div>';
  // MAÑANA
  html+='<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px">⏰ Mañana — '+dias[tomorrow.getDay()]+' '+td+' '+MESES_S[tm]+'</div>';
  html+=tomorrowRows||'<div class="notif-empty">Sin bills mañana 🎉</div>';

  document.getElementById('notifDate').textContent='';
  document.getElementById('notifBody').innerHTML=html;
  document.getElementById('notifBg').classList.add('open');
}
document.getElementById('notifClose').addEventListener('click',function(){
  document.getElementById('notifBg').classList.remove('open');
});
document.getElementById('notifBg').addEventListener('click',function(e){
  if(e.target===document.getElementById('notifBg'))document.getElementById('notifBg').classList.remove('open');
});

// CUSTOM BILLS
function getCustomBills(y,m){
  var all=state.customBills||[];
  return all.filter(function(b){
    if(b.freq==='monthly')return true;
    if(b.freq==='once')return b.onceY===y&&b.onceM===m;
    if(b.freq==='trimestral')return b.months&&b.months.indexOf(m)>=0;
    return false;
  });
}
function addCustomBill(bill){
  if(!state.customBills)state.customBills=[];
  bill.id='cb_'+Date.now();
  state.customBills.push(bill);save();
}
function delCustomBill(id){
  state.customBills=(state.customBills||[]).filter(function(b){return b.id!==id;});save();
}


// DELETE BILL OPTIONS
var delOptsCurId=null,delOptsCurName='',delOptsCurCustom=false;
function openDelOpts(id,name,isCustom,y,m){

  document.getElementById('delOptMonth').dataset.m=m;
}
document.getElementById('delOptCancel').addEventListener('click',function(){
  document.getElementById('delOptsBg').classList.remove('open');
});
document.getElementById('delOptsBg').addEventListener('click',function(e){
  if(e.target===document.getElementById('delOptsBg'))document.getElementById('delOptsBg').classList.remove('open');
});
document.getElementById('delOptMonth').addEventListener('click',function(){
  var y=parseInt(this.dataset.y),m=parseInt(this.dataset.m);

document.getElementById('delOptPerm').addEventListener('click',function(){

  }
  document.getElementById('delOptsBg').classList.remove('open');
  document.getElementById('modalBg').classList.remove('open');
  render();
});
// FAB add bill modal
var abFreq='monthly',abMonths=[];
var abReactivateId=null; // ID of bill being reactivated (to remove from cancelled first)

function openAddModal(prefill){
  // Reset
  abReactivateId=prefill?prefill.id:null;
  document.getElementById('ab-name').value=prefill?prefill.name:'';
  document.getElementById('ab-day').value=prefill?prefill.day:'';
  document.getElementById('ab-amt').value=prefill?prefill.amount:'';
  document.getElementById('ab-pay').value=prefill?prefill.pay||'':'';
  abFreq=prefill?prefill.freq||'monthly':'monthly';
  abMonths=prefill&&prefill.months?prefill.months.slice():[];
  document.querySelectorAll('.add-seg-btn').forEach(function(b){b.classList.toggle('sel',b.dataset.freq===abFreq);});
  document.getElementById('ab-months-wrap').style.display=abFreq==='trimestral'?'':'none';
  // Render month buttons with pre-selected months
  var mg=document.getElementById('ab-months');
  var MESES_AB=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  mg.innerHTML=MESES_AB.map(function(mn,i){
    return '<button class="add-month-btn'+(abMonths.indexOf(i)>=0?' sel':'')+'" data-mi="'+i+'">'+mn+'</button>';
  }).join('');
  mg.querySelectorAll('.add-month-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var mi=parseInt(btn.dataset.mi);
      var idx=abMonths.indexOf(mi);
      if(idx>=0)abMonths.splice(idx,1);else abMonths.push(mi);
      btn.classList.toggle('sel',abMonths.indexOf(mi)>=0);
    });
  });
  // Update title
  document.querySelector('.add-modal .modal-title').textContent=prefill?'Reactivar bill':'Agregar bill';
  document.getElementById('ab-save').textContent=prefill?'Reactivar':'Guardar bill';
  document.getElementById('addModalBg').classList.add('open');
}
var MESES_AB=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

document.getElementById('fabAdd').addEventListener('click',function(){
  openAddModal(null);
});

document.querySelectorAll('.add-seg-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    abFreq=btn.dataset.freq;
    document.querySelectorAll('.add-seg-btn').forEach(function(b){b.classList.toggle('sel',b===btn);});
    document.getElementById('ab-months-wrap').style.display=abFreq==='trimestral'?'':'none';
  });
});

function closeAddModal(){document.getElementById('addModalBg').classList.remove('open');}
document.getElementById('ab-cancel').addEventListener('click',closeAddModal);
document.getElementById('addModalBg').addEventListener('click',function(e){if(e.target===document.getElementById('addModalBg'))closeAddModal();});

document.getElementById('ab-save').addEventListener('click',function(){
  var name=document.getElementById('ab-name').value.trim();
  var day=parseInt(document.getElementById('ab-day').value)||0;
  var amt=parseFloat(document.getElementById('ab-amt').value)||0;
  var pay=document.getElementById('ab-pay').value.trim();
  if(!name||!day||!amt){alert('Completa nombre, día y monto.');return;}
  if(day<1||day>31){alert('El día debe ser entre 1 y 31.');return;}
  var bill={name:name,day:day,amount:amt,pay:pay,freq:abFreq,variable:false};
  if(abFreq==='trimestral'){
    if(abMonths.length===0){alert('Selecciona al menos un mes.');return;}
    bill.months=abMonths.slice();
  }
  if(abFreq==='once'){
    bill.onceY=cur.getFullYear();bill.onceM=cur.getMonth();
  }
  // Si estamos reactivando un bill fijo, quitarlo de cancelados y NO agregar como custom
  if(abReactivateId){
    var esFijo=BILLS.some(function(b){return b.id===abReactivateId;});
    if(esFijo){
      // Reactivar bill fijo: solo quitarlo de cancelados
      restoreBill(abReactivateId);
      // Si cambiaron día/monto, guardarlo como override para este mes
      var origBill=BILLS.find(function(b){return b.id===abReactivateId;});
      if(origBill&&day!==origBill.day){setDayOv(cur.getFullYear(),cur.getMonth(),abReactivateId,day);}
      if(origBill&&amt!==origBill.amount){setOv(cur.getFullYear(),cur.getMonth(),abReactivateId,'amount',amt);}
    } else {
      // Era custom: eliminarlo de cancelados y re-agregar con nuevos datos
      restoreBill(abReactivateId);
      delCustomBill(abReactivateId);
      addCustomBill(bill);
    }
    abReactivateId=null;
  } else {
    addCustomBill(bill);
  }
  closeAddModal();
  render();
});
load();render();showNotif();
</script>
